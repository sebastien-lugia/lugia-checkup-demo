    charge: "Vous avez démarré ce check-up pour identifier ce qui pèse le plus dans votre semaine. Voici ce qui ressort.",
    evenement: "Vous avez démarré ce check-up pour préparer un événement à venir dans votre cabinet. Voici ce que ce diagnostic met en lumière.",
    risque: "Vous avez démarré ce check-up pour sécuriser un risque identifié. Voici les points sur lesquels concentrer votre attention.",
    curiosite: "Voici la lecture que ce check-up produit de votre cabinet.",
  };
  out.tonality.motivation_intro = motivIntros[p.motivation] || motivIntros.curiosite;
  if (p.status === 'recent') out.tonality.status_msg = "C'est courant à ce stade d'installation — la plupart des cabinets prennent 2 à 3 ans à construire leurs routines.";
  else if (p.status === 'senior' || p.status === 'approche_transmission') out.tonality.status_msg = "À votre stade, les chantiers utiles sont souvent ceux qui rendent le cabinet transmissible — pas ceux qui le complexifient.";
  if (p.cabinet_type === 'solo' && scores.B && scores.B.pct <= 34) out.benchmarks.push({ id: 'R-bench-solo-charge', message: "À votre profil, sans équipe formalisée, vous portez seul l'équivalent d'1,5 ETP d'organisation." });
  if (p.volume === 'gt_120' && scores.C && scores.C.pct <= 54) out.benchmarks.push({ id: 'R-bench-volume-admin', message: "À votre volume hebdomadaire, la moyenne du temps administratif est de 2 h 45 par jour — vous êtes probablement au-dessus." });
  if (p.status === 'approche_transmission' && scores.B && scores.B.pct <= 54) out.benchmarks.push({ id: 'R-bench-transmission', message: "Un cabinet bien organisé se valorise 30 à 40 % mieux à la transmission." });
  if (p.cabinet_type === 'solo' && p.paramedical_team === 'non' && scores.A && scores.A.pct >= 55 && scores.B && scores.B.pct <= 34) out.benchmarks.push({ id: 'R-bench-soloHero', message: "Vous tenez votre cabinet à bout de bras, et vous le tenez bien. La question : pour combien de temps encore, sans relai ?" });
  return out;
}

function setStep(step) {
  state.step = step;
  if (step !== 'module_detail') state.moduleId = null;
  render();
  window.scrollTo({ top: 0, behavior: 'instant' });
}

function escapeHtml(s) {
  if (s == null) return '';
  return String(s).replace(/[&<>"']/g, c => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' })[c]);
}

function renderIntro() {
  return `
    <main class="intro">
      <div class="intro-eyebrow">Diagnostic organisationnel</div>
      <h1 class="serif intro-h1">Comment fonctionne <em>vraiment</em> votre cabinet ?</h1>
      <p class="intro-sub">25 minutes. 18 questions adaptées à votre profil. Une analyse qui se construit en temps réel — pas un formulaire muet qui promet un résultat à la fin.</p>
      <div class="axis-chips">
        <span class="axis-chip a">Parcours patient</span>
        <span class="axis-chip b">Équipe & secrétariat</span>
        <span class="axis-chip c">Outils & dossiers</span>
      </div>
      <div class="promesses">
        <div class="promesse"><h3 class="serif">Adaptatif</h3><p>Questions calibrées selon votre type de cabinet, votre logiciel et votre territoire.</p></div>
        <div class="promesse"><h3 class="serif">Terrain</h3><p>Reformulations en langage praticien, pas consultant. Reflets immédiats à chaque réponse.</p></div>
        <div class="promesse"><h3 class="serif">Croisé</h3><p>Détection de signaux entre les 3 axes organisationnels — ce que les scores isolés ne montrent pas.</p></div>
        <div class="promesse"><h3 class="serif">Actionnable</h3><p>Plan d'action en 4 étapes pour le chantier que vous choisirez d'engager en priorité.</p></div>
      </div>
      <button class="btn-primary" onclick="setStep('profil_step1')">Commencer →</button>
    </main>
  `;
}

function selectChip(fieldId, optionId) {
  state.profile[fieldId] = optionId;
  if (fieldId === 'logiciel_metier' && optionId !== 'autre') state.profile.logiciel_metier_other = '';
  render();
}
function updateOtherInput(value) { state.profile.logiciel_metier_other = value; }

function renderChips(field) {
  const cur = state.profile[field.id];
  const buttons = field.options.map(o => `<button class="chip ${cur === o.id ? 'sel' : ''}" onclick="selectChip('${field.id}', '${o.id}')">${escapeHtml(o.label)}</button>`).join('');
  let extra = '';
  if (cur === 'autre' && field.options.find(o => o.id === 'autre' && o.free_text_field)) {
    const other = state.profile.logiciel_metier_other || '';
    extra = `<input type="text" class="other-input" placeholder="Précisez…" value="${escapeHtml(other)}" oninput="updateOtherInput(this.value)">`;
  }
  return `<div class="field"><div class="field-label">${escapeHtml(field.label)}</div><div class="chips-row">${buttons}</div>${extra}</div>`;
}

function isStep1Complete() {
  const p = state.profile;
  if (!p.cabinet_type || !p.volume || !p.paramedical_team || !p.logiciel_metier || !p.rdv_canal) return false;
  if (p.logiciel_metier === 'autre' && !(p.logiciel_metier_other || '').trim()) return false;
  return true;
}
function isStep2Complete() {
  const p = state.profile;
  return p.status && p.territoire && p.horizon && p.motivation;
}

function renderProfilStep1() {
  const fields = PROTOCOL.profile.step1.fields.map(f => renderChips(f)).join('');
  const ready = isStep1Complete();
  return `
    <div class="topbar"><div class="topbar-inner"><span class="chapter-num">1/5</span><span class="chapter-label">Profil</span></div></div>
    <main class="profil">
      <div class="small-eyebrow">Profil — étape 1 sur 2</div>
      <h1 class="serif">Quelques informations sur votre cabinet</h1>
      <p class="profil-intro">${escapeHtml(PROTOCOL.profile.step1.intro)}</p>
      ${fields}
      <div class="cta-row">
        <button class="btn-primary" ${ready ? '' : 'disabled'} onclick="setStep('profil_step2')">Étape suivante →</button>
        ${ready ? '' : '<span class="cta-hint">Complétez les 5 champs pour continuer</span>'}
      </div>
    </main>
  `;
}

function renderProfilStep2() {
  const fields = PROTOCOL.profile.step2.fields.map(f => renderChips(f)).join('');
  const ready = isStep2Complete();
  return `
    <div class="topbar"><div class="topbar-inner"><span class="chapter-num">1/5</span><span class="chapter-label">Profil</span></div></div>
    <main class="profil">
      <div class="small-eyebrow">Profil — étape 2 sur 2</div>
      <h1 class="serif">Votre regard sur la situation</h1>
      <p class="profil-intro">${escapeHtml(PROTOCOL.profile.step2.intro)}</p>
      ${fields}
      <div class="cta-row">
        <button class="btn-link" onclick="setStep('profil_step1')">← Retour</button>
        <button class="btn-primary" ${ready ? '' : 'disabled'} onclick="setStep('energy')">Commencer le check-up →</button>

}

function pickEnergy(optId, label) {
  state.answers.energy = { selected_option: optId, selected_option_label: label, scored: false };
  render();
}

function renderEnergy() {
  const energy = PROTOCOL.energy;
  const cur = state.answers.energy ? state.answers.energy.selected_option : null;
  const opts = energy.options.map(o => `
    <button class="opt-big ${cur === o.id ? 'sel' : ''}" onclick='pickEnergy("${o.id}", ${JSON.stringify(o.label)})'>
      <span class="opt-big-inner">
        <span class="radio"><svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M4 8l3 3 5-6" stroke-linecap="round" stroke-linejoin="round"/></svg></span>
        ${escapeHtml(o.label)}
      </span>
    </button>
  `).join('');
  return `
    <div class="topbar"><div class="topbar-inner"><span class="chapter-num">2/5</span><span class="chapter-label">Ancrage</span></div></div>
    <main class="energie">

      <h1 class="serif energie-q">${escapeHtml(energy.label)}</h1>
      <p class="energie-note">Ce repère n'entre pas dans le calcul. Il sert juste à mieux situer ce qui ressortira du diagnostic.</p>

function pickOption(questionId, optionId, label) {
  state.answers[questionId] = { selected_option: optionId, selected_option_label: label, scored: true };
  render();
  setTimeout(() => {
    if (window.matchMedia('(prefers-reduced-motion: reduce)').matches) return;
    const el = document.getElementById('q-' + questionId);
    if (!el) return;
    const rect = el.getBoundingClientRect();
    const target = window.innerHeight * 0.7;
    const delta = rect.bottom - target;
    if (Math.abs(delta) > 24) window.scrollBy({ top: delta, behavior: 'smooth' });
  }, 250);
}

function renderBenchmark(b) {
  return `
    <div class="benchmark">
      <div class="b-eyebrow">Repère terrain</div>
      <div class="b-text">${escapeHtml(b.texte)}</div>
      ${b.source_status === 'to_confirm' ? `<div class="b-source">[À confirmer${b.source_hint ? ' — source : ' + escapeHtml(b.source_hint) : ''}]</div>` : ''}
    </div>
  `;
}

function renderQuestion(q, idx, total) {
  const ans = state.answers[q.id];
  const sel = ans ? ans.selected_option : null;
  const opts = q.options.map(o => {
    const isSel = sel === o.id;
    const refl = isSel ? `<div class="reformulation">${escapeHtml(o.reformulation)}</div>` : '';
    const bench = (isSel && o.benchmark) ? renderBenchmark(o.benchmark) : '';
    return `
      <button class="opt ${isSel ? 'sel' : ''}" onclick='pickOption("${q.id}", "${o.id}", ${JSON.stringify(o.label)})'>
        <div class="opt-flex">
          <span class="opt-radio"><svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M4 8l3 3 5-6" stroke-linecap="round" stroke-linejoin="round"/></svg></span>
          <span class="opt-text">${escapeHtml(o.label)}</span>
        </div>
      </button>
      ${refl}${bench}
    `;
  }).join('');
  return `
    <div class="question" id="q-${q.id}">
      <div class="q-eyebrow">Question ${idx} sur ${total}</div>
      <h2 class="serif q-title">${escapeHtml(q.label)}</h2>
      ${q.context ? `<p class="q-context">${escapeHtml(q.context)}</p>` : ''}
      ${opts}
    </div>
  `;
}

function polar(angleDeg, r, cx, cy) {
  const rad = (angleDeg * Math.PI) / 180;
  return { x: cx + r * Math.cos(rad), y: cy - r * Math.sin(rad) };
}
function ringPath(level, R, cx, cy) {
  const angles = { A: 0, C: 120, B: 240 };
  return 'M ' + ['A','C','B'].map(a => { const p = polar(angles[a], R * level, cx, cy); return `${p.x.toFixed(2)},${p.y.toFixed(2)}`; }).join(' L ') + ' Z';
}
function polyPath(scores, R, cx, cy) {
  const angles = { A: 0, C: 120, B: 240 };
  return 'M ' + ['A','C','B'].map(a => {
    const pct = scores[a] ? scores[a].pct / 100 : 0.04;
    const p = polar(angles[a], R * pct, cx, cy);
    return `${p.x.toFixed(2)},${p.y.toFixed(2)}`;
  }).join(' L ') + ' Z';
}

function renderRadarAside() {
  const scores = computeAllScores();
  const SVG = 150, CX = 75, CY = 75, R = 60;
  const colors = { A: '#2e7d4f', B: '#a85d2b', C: '#1a56a0' };
  const labels = { A: 'Parcours patient', B: 'Équipe & secrétariat', C: 'Outils & dossiers' };
  const angles = { A: 0, C: 120, B: 240 };
  return `
    <aside class="radar-aside">
      <div class="radar-svg-wrap">
        <svg viewBox="0 0 ${SVG} ${SVG}" width="100%" style="max-width: ${SVG}px;">
          ${[0.25, 0.5, 0.75, 1].map((l, i) => `<path d="${ringPath(l, R, CX, CY)}" fill="none" stroke="${i === 3 ? '#d4cfbf' : '#e8e3d3'}" stroke-width="${i === 3 ? 1.2 : 0.8}"/>`).join('')}
          ${['A','C','B'].map(a => { const p = polar(angles[a], R, CX, CY); return `<line x1="${CX}" y1="${CY}" x2="${p.x}" y2="${p.y}" stroke="#e0dccc" stroke-width="0.8"/>`; }).join('')}
          <path d="${polyPath(scores, R, CX, CY)}" fill="rgba(26,86,160,.08)" stroke="#1a56a0" stroke-width="1.5"/>
          ${['A','C','B'].map(a => {
            const pct = scores[a] ? scores[a].pct / 100 : 0.04;
            const p = polar(angles[a], R * pct, CX, CY);
            return `<circle cx="${p.x.toFixed(2)}" cy="${p.y.toFixed(2)}" r="4" fill="${colors[a]}" stroke="#faf9f5" stroke-width="1.5"/>`;
          }).join('')}
        </svg>
      </div>
      <div class="radar-axes">
        ${['A','B','C'].map(a => {
          const block = scores[a];
          const niveau = block ? block.label : 'À évaluer';
          const pct = block ? block.pct : 0;
          return `
            <div class="radar-axis-row">
              <div class="axis-line1"><span class="axis-dot ${a.toLowerCase()}"></span><span class="axis-name">${labels[a]}</span></div>
              <div class="axis-niveau">${niveau}</div>
              <div class="axis-bar"><div class="axis-bar-fill" style="width: ${pct}%; background: ${colors[a]};"></div></div>
            </div>
          `;
        }).join('')}
      </div>
    </aside>
  `;
}

function renderTopbarMiniRadar() {
  const scores = computeAllScores();
  const labels = { A: 'Parcours patient', B: 'Équipe', C: 'Outils & dossiers' };
  return `
    <div class="topbar-mini-radar">
      <div class="topbar-mini-radar-inner">
        ${['A','B','C'].map(a => {
          const block = scores[a];
          return `
            <div class="mini-axis-row">
              <div class="axis-line1"><span class="axis-dot ${a.toLowerCase()}"></span><span class="axis-name">${labels[a]}</span></div>
              <div class="mini-axis-niveau">${block ? block.label : '—'}</div>
            </div>
          `;
        }).join('')}
      </div>
    </div>
  `;
}

function completeBlock(blockId) {
  if (blockId === 'A') setStep('transition_A');
  else if (blockId === 'B') setStep('transition_B');
  else setStep('transition_C');
}

function renderBloc(blockId) {
  const visible = getVisibleQuestions(blockId);
  const chapter = { A: 3, B: 4, C: 5 }[blockId];
  const chapterLabel = { A: 'Parcours patient', B: 'Équipe & secrétariat', C: 'Outils & dossiers' }[blockId];
  const questionsHtml = visible.map((q, idx) => renderQuestion(q, idx + 1, visible.length)).join('');
  const allAnswered = visible.every(q => state.answers[q.id]);
  const nbMissing = visible.filter(q => !state.answers[q.id]).length;
  return `
    <div class="topbar"><div class="topbar-inner"><span class="chapter-num">${chapter}/5</span><span class="chapter-label">${chapterLabel}</span></div></div>
    ${renderTopbarMiniRadar()}
    <div class="bloc-layout">
      <main class="bloc-main">
        <div class="bloc-section-header">
          <div class="small-eyebrow">Bloc en cours</div>
          <h1 class="serif">${chapterLabel}</h1>
        </div>
        ${questionsHtml}
        <div class="bloc-footer">
          <button class="btn-primary" ${allAnswered ? '' : 'disabled'} onclick="completeBlock('${blockId}')">Bloc suivant →</button>
          ${allAnswered ? '' : `<span class="cta-hint">Répondez aux ${nbMissing} question${nbMissing > 1 ? 's' : ''} restante${nbMissing > 1 ? 's' : ''}</span>`}
        </div>
      </main>
      ${renderRadarAside()}
    </div>
  `;
}

function renderTransition(blockId) {
  const scores = computeAllScores();
  const block = scores[blockId];
  const labelBloc = { A: 'Parcours patient', B: 'Équipe & secrétariat', C: 'Outils & dossiers' }[blockId];
  const isFinal = blockId === 'C';
  const nextLabel = isFinal ? 'Vos résultats du diagnostic' : (blockId === 'A' ? 'Bloc 2 — Équipe & secrétariat' : 'Bloc 3 — Outils & dossiers');
  const nextStep = isFinal ? 'resultats' : (blockId === 'A' ? 'bloc_B' : 'bloc_C');
  const cta = isFinal ? 'Voir vos résultats →' : 'Continuer →';
  return `
    <main class="transition-screen">
      <div class="transition-eyebrow">Bloc ${blockId} terminé</div>
      <h1 class="serif transition-h1">${labelBloc}</h1>
      ${block ? `<p class="transition-niveau">Niveau de maturité : <strong>${block.label}</strong></p>` : ''}
      ${block ? `<p class="serif transition-quote">« ${escapeHtml(block.title)} »</p>` : ''}
      <div class="transition-suite">
        <div class="ts-eyebrow">${isFinal ? 'Parcours terminé' : 'Suite'}</div>
        <div class="ts-label">${nextLabel}</div>
        <button class="btn-primary" onclick="setStep('${nextStep}')">${cta}</button>
      </div>
    </main>
  `;
}

function signalToneClass(t) {
  if (t === 'alerte_forte' || t === 'alerte') return 'alerte';
  if (t === 'positif') return 'positif';
  if (t === 'recadrage' || t === 'opportunite') return 'recadrage';
  return '';
}
function impactLabel(i) { return ({ immediat: 'Impact immédiat', court_terme: 'Impact court terme', moyen_terme: 'Impact moyen terme' })[i] || i; }
function effortPipsHtml(e) { return `<span class="effort-pips">${[1,2,3].map(n => `<span class="pip ${n <= e ? 'on' : ''}"></span>`).join('')}</span>`; }
function tagLabel(t) { return ({ quick: 'Action rapide — < 1 semaine', medium: 'Projet court — 1 à 4 semaines', invest: 'Investissement — 1 à 3 mois' })[t] || t; }
function effortLabel(e) { return ['Effort léger', 'Effort modéré', 'Effort significatif'][e - 1] || `Effort ${e}/3`; }

function openModule(id) { state.moduleId = id; setStep('module_detail'); }

function renderResultats() {
  const scores = computeAllScores();
  const signal = evaluateSignal(scores);
  const rules = applyRules(scores);
  const opportunities = computeOpportunities(scores);
  const top4 = opportunities.slice(0, 4);
  const SVG = 340, CX = 170, CY = 170, R = 120;
  const colors = { A: '#2e7d4f', B: '#a85d2b', C: '#1a56a0' };
  const angles = { A: 0, C: 120, B: 240 };
  const labelsRadar = { A: 'Parcours patient', C: 'Outils & dossiers', B: 'Équipe & secrétariat' };
  const radarSvg = `
    <svg viewBox="0 0 ${SVG} ${SVG}" width="100%" style="max-width: ${SVG}px;">
      ${[0.25, 0.5, 0.75, 1].map((l, i) => `<path d="${ringPath(l, R, CX, CY)}" fill="none" stroke="${i === 3 ? '#d4cfbf' : '#e8e3d3'}" stroke-width="${i === 3 ? 1.5 : 1}"/>`).join('')}
      ${['A','C','B'].map(a => { const p = polar(angles[a], R, CX, CY); return `<line x1="${CX}" y1="${CY}" x2="${p.x}" y2="${p.y}" stroke="#d4cfbf" stroke-width="1"/>`; }).join('')}
      <path d="${polyPath(scores, R, CX, CY)}" fill="rgba(26,86,160,.10)" stroke="#1a56a0" stroke-width="2"/>
      ${['A','C','B'].map(a => {
        const pct = scores[a] ? scores[a].pct / 100 : 0.04;
        const p = polar(angles[a], R * pct, CX, CY);
        return `<circle cx="${p.x.toFixed(2)}" cy="${p.y.toFixed(2)}" r="6" fill="${colors[a]}" stroke="#faf9f5" stroke-width="2"/>`;
      }).join('')}
      ${['A','C','B'].map(a => {
        const labelP = polar(angles[a], R + 32, CX, CY);
        const anchor = a === 'A' ? 'start' : 'end';
        return `<text x="${labelP.x.toFixed(2)}" y="${labelP.y.toFixed(2)}" text-anchor="${anchor}" dominant-baseline="middle" font-size="12" font-weight="500" fill="${colors[a]}">${labelsRadar[a]}</text>`;
      }).join('')}
    </svg>
  `;
  const facetCards = ['A','B','C'].map(a => {
    const b = scores[a]; if (!b) return '';
    const showBadge = b.level === 'a_surveiller' || b.level === 'a_risque';
    const badgeClass = b.level === 'a_risque' ? 'risque' : 'surveiller';
    return `
      <div class="facet-card">
        <div class="facet-card-row">
          <span class="axis-dot ${a.toLowerCase()}" style="margin-top: 10px;"></span>
          <div style="flex: 1;">
            <div class="facet-meta">
              <span class="facet-axe">${b.axe_label}</span>
              ${showBadge ? `<span class="facet-badge ${badgeClass}">${b.label}</span>` : ''}
            </div>
            <h3 class="serif facet-title">${escapeHtml(b.title)}</h3>
            ${showBadge ? '' : `<div class="facet-level-soft">${b.label}</div>`}
          </div>
        </div>
      </div>
    `;
  }).join('');
  const benchCombiCards = rules.benchmarks.length > 0 ? rules.benchmarks.map(b => `
    <div class="bench-combi-box">
      <p style="margin: 0; font-size: 14px; line-height: 1.55; color: var(--bench-text);">${escapeHtml(b.message)}</p>
    </div>
  `).join('') : '';
  const opportunityCards = top4.map((m, idx) => `
    <a class="chantier-card ${idx === 0 ? 'reco' : ''}" onclick="openModule('${m.id}')">
      <div class="chantier-row">
        <span class="serif chantier-num">${String(idx + 1).padStart(2, '0')}</span>
        <div style="flex: 1;">
          ${idx === 0 ? `<div class="chantier-reco-tag">Recommandé pour vous</div>` : ''}
          <h3 class="serif chantier-title">${m.icone} ${escapeHtml(m.label)}</h3>
          <div class="chantier-meta">
            ${effortPipsHtml(m.effort)}
            <span>·</span><span>${impactLabel(m.impact)}</span>
            <span>·</span><span>${m.etapes.length} étapes</span>
          </div>
          <div class="chantier-cta">Voir le détail →</div>
        </div>
      </div>
    </a>
  `).join('');
  const allModulesGrid = MODULES_DATA.modules.map(m => `
    <a class="module-tile" onclick="openModule('${m.id}')">
      <div class="module-tile-title">${m.icone} ${escapeHtml(m.label)}</div>
      <div class="module-tile-meta">${effortPipsHtml(m.effort)}<span>· ${m.etapes.length} étapes</span></div>
    </a>
  `).join('');
  let secCounter = 1;
  return `
    <main class="resultats">
      <div class="res-eyebrow">Résultats — diagnostic V2</div>
      <h1 class="serif res-h1">Votre cabinet, vu du diagnostic</h1>
      <p class="serif res-intro">« ${escapeHtml(rules.tonality.motivation_intro)} »</p>
      <div class="radar-result">${radarSvg}</div>
      ${signal ? `
        <div class="signal-banner ${signalToneClass(signal.tonalite)}">
          <div class="signal-eyebrow">Signal croisé</div>
          <h3 class="serif signal-title">${escapeHtml(signal.titre)}</h3>
          <p class="signal-msg">${escapeHtml(signal.message)}</p>
        </div>
      ` : ''}
      ${rules.tonality.status_msg ? `<p class="tonalite-aside">${escapeHtml(rules.tonality.status_msg)}</p>` : ''}
      <section>
        <div class="section-title"><span class="serif section-number">I</span><h2 class="serif">Les trois axes</h2></div>
        <div style="margin-top: 24px;">${facetCards}</div>

          <div style="margin-top: 24px;">${benchCombiCards}</div>

      <section>
        <div class="section-title"><span class="serif section-number">${rules.benchmarks.length > 0 ? 'III' : 'II'}</span><h2 class="serif">Opportunités d'action</h2></div>
        <p class="section-intro">Sélection ordonnée selon votre profil et votre niveau d'énergie. La première carte est la plus alignée avec ce que vous avez déclaré.</p>
        <div style="margin-top: 24px;">${opportunityCards}</div>
      </section>
      <section>
        <div class="section-title"><span class="serif section-number">${rules.benchmarks.length > 0 ? 'IV' : 'III'}</span><h2 class="serif">Tous les chantiers</h2></div>
        <div class="modules-grid" style="margin-top: 24px;">${allModulesGrid}</div>
      </section>
    </main>
  `;
}

    <article class="module-etape">
      <span class="serif module-etape-num">${e.num}</span>

        <p class="module-etape-body">${escapeHtml(e.body)}</p>

        <div class="b-eyebrow">Repère terrain</div>
        <p class="b-text" style="margin: 0; font-size: 14px; line-height: 1.6;">${escapeHtml(m.benchmark_conclusion.texte)}</p>
        ${m.benchmark_conclusion.source_status === 'to_confirm' ? `<div class="b-source" style="margin-top: 12px;">[À confirmer${m.benchmark_conclusion.source_hint ? ' — source : ' + escapeHtml(m.benchmark_conclusion.source_hint) : ''}]</div>` : ''}
      </div>
      <p class="module-share">Vous pouvez partager ce module avec un membre de votre équipe ou l'un de vos associés — l'adresse <code>/modules/${m.id}</code> est publique et ne nécessite pas de connexion.</p>
    </main>
  `;
}

function render() {
  const app = document.getElementById('app');
  let html = '';
  switch (state.step) {
    case 'intro': html = renderIntro(); break;
    case 'profil_step1': html = renderProfilStep1(); break;
    case 'profil_step2': html = renderProfilStep2(); break;
    case 'energy': html = renderEnergy(); break;
    case 'bloc_A': html = renderBloc('A'); break;
    case 'bloc_B': html = renderBloc('B'); break;
    case 'bloc_C': html = renderBloc('C'); break;
    case 'transition_A': html = renderTransition('A'); break;
    case 'transition_B': html = renderTransition('B'); break;
    case 'transition_C': html = renderTransition('C'); break;
    case 'resultats': html = renderResultats(); break;
    case 'module_detail': html = renderModuleDetail(); break;
    default: html = renderIntro();
  }
  app.innerHTML = html;
}

render();
</script>
</body>
</html>

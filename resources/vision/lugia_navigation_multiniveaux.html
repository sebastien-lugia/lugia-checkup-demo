<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lugia & Co — Navigation multi-niveaux</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,600;9..144,900&family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap');

:root {
  --bg:       #0a0c11;
  --bg2:      #11141b;
  --bg3:      #1a1e27;
  --line:     #242a34;
  --txt:      #eceef2;
  --txt2:     #8e96a4;
  --txt3:     #4e5663;
  --optimal:  #34d399;
  --fonct:    #6ee7b7;
  --degrade:  #fbbf24;
  --risque:   #fb7185;
  --bloque:   #ef4444;
  --accent:   #818cf8;
  --accent2:  #a5b4fc;
  /* lentilles */
  --l-conf:   #fb7185;
  --l-data:   #22d3ee;
  --l-matur:  #a78bfa;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'Inter', sans-serif;
  background: var(--bg);
  color: var(--txt);
  height: 100vh;
  overflow: hidden;
  display: flex;
  flex-direction: column;
}

/* HEADER */
.header {
  padding: 14px 28px;
  border-bottom: 1px solid var(--line);
  display: flex;
  align-items: center;
  gap: 20px;
  flex-shrink: 0;
}
.h-logo {
  font-family: 'Fraunces', serif;
  font-size: 18px;
  font-weight: 900;
}
.h-logo span { color: var(--accent2); }

/* Breadcrumb de zoom */
.breadcrumb {
  display: flex;
  align-items: center;
  gap: 6px;
  font-size: 12px;
  flex: 1;
}
.bc-item {
  padding: 4px 10px;
  border-radius: 6px;
  cursor: pointer;
  color: var(--txt3);
  transition: all 0.2s;
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px;
}
.bc-item:hover { color: var(--txt2); background: var(--bg3); }
.bc-item.active { color: var(--accent2); background: rgba(129,140,248,0.1); }
.bc-sep { color: var(--txt3); font-size: 10px; }

/* Lentilles */
.lens-bar {
  display: flex;
  gap: 4px;
  background: var(--bg2);
  padding: 4px;
  border-radius: 9px;
  border: 1px solid var(--line);
}
.lens-btn {
  padding: 6px 13px;
  border-radius: 6px;
  font-size: 11px;
  cursor: pointer;
  border: none;
  background: none;
  color: var(--txt3);
  font-family: 'Inter', sans-serif;
  transition: all 0.2s;
}
.lens-btn:hover { color: var(--txt2); }
.lens-btn.active { background: var(--bg3); color: var(--txt); }

/* ZOOM CONTROL */
.zoom-control {
  display: flex;
  align-items: center;
  gap: 8px;
}
.zoom-slider {
  -webkit-appearance: none;
  width: 120px;
  height: 4px;
  background: var(--bg3);
  border-radius: 2px;
  outline: none;
}
.zoom-slider::-webkit-slider-thumb {
  -webkit-appearance: none;
  width: 14px; height: 14px;
  border-radius: 50%;
  background: var(--accent);
  cursor: pointer;
}
.zoom-label {
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px;
  color: var(--txt3);
  width: 70px;
}

/* STAGE */
.stage {
  flex: 1;
  position: relative;
  overflow: hidden;
  background:
    radial-gradient(ellipse at 50% 45%, rgba(129,140,248,0.04) 0%, transparent 60%),
    var(--bg);
}

.level {
  position: absolute;
  inset: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.5s ease, transform 0.5s cubic-bezier(0.4,0,0.2,1);
  transform: scale(0.9);
}
.level.active {
  opacity: 1;
  pointer-events: auto;
  transform: scale(1);
}

/* NIVEAU 0 — VIGNETTE */
#level-0 .vignette {
  text-align: center;
}
.vig-light {
  width: 80px; height: 80px;
  border-radius: 50%;
  margin: 0 auto 24px;
  display: flex; align-items: center; justify-content: center;
  font-size: 32px;
  position: relative;
}
.vig-light::after {
  content: '';
  position: absolute;
  inset: -8px;
  border-radius: 50%;
  border: 2px solid currentColor;
  opacity: 0.3;
  animation: vigPulse 2.5s infinite;
}
@keyframes vigPulse {
  0%,100% { transform: scale(1); opacity: 0.3; }
  50% { transform: scale(1.15); opacity: 0.1; }
}
.vig-title {
  font-family: 'Fraunces', serif;
  font-size: 26px;
  font-weight: 600;
  margin-bottom: 8px;
}
.vig-sub { font-size: 14px; color: var(--txt2); margin-bottom: 28px; }
.vig-hint {
  font-size: 11px;
  color: var(--txt3);
  font-family: 'JetBrains Mono', monospace;
}

/* NIVEAU 1 — CARTE */
#level-1 svg, #level-2 svg, #level-3 svg { width: 100%; height: 100%; }

.region-bubble {
  cursor: pointer;
  transition: all 0.3s;
}
.region-bubble:hover { filter: brightness(1.2); }
.region-circle { transition: all 0.4s; }
.region-name {
  font-family: 'Inter', sans-serif;
  font-size: 12px;
  font-weight: 500;
  text-anchor: middle;
  pointer-events: none;
}
.region-pct {
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px;
  text-anchor: middle;
  pointer-events: none;
  fill: var(--txt3);
}
.region-link { stroke: #2a3340; stroke-width: 1.5; opacity: 0.4; }

/* NIVEAU 2-3 nodes */
.obj-node { cursor: pointer; transition: all 0.3s; }
.obj-node:hover { filter: brightness(1.25); }
.obj-rect { transition: all 0.3s; }
.obj-label {
  font-size: 11px; font-weight: 500; fill: var(--txt);
  text-anchor: middle; pointer-events: none; dominant-baseline: middle;
}
.obj-sublabel {
  font-size: 8px; fill: var(--txt3);
  text-anchor: middle; pointer-events: none;
  font-family: 'JetBrains Mono', monospace;
}
.obj-edge { fill: none; stroke: #2a3340; stroke-width: 1.3; opacity: 0.5; }
.obj-edge-label { font-size: 8px; fill: var(--txt3); text-anchor: middle; font-family: 'JetBrains Mono', monospace; }

/* NIVEAU 4 — FICHE OBJET */
#level-4 .fiche {
  width: 480px;
  background: var(--bg2);
  border: 1px solid var(--line);
  border-radius: 16px;
  padding: 0;
  overflow: hidden;
  box-shadow: 0 20px 60px rgba(0,0,0,0.5);
}
.fiche-header {
  padding: 24px;
  border-bottom: 1px solid var(--line);
  position: relative;
}
.fiche-comp {
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px;
  text-transform: uppercase;
  letter-spacing: 0.1em;
  color: var(--txt3);
  margin-bottom: 6px;
}
.fiche-title {
  font-family: 'Fraunces', serif;
  font-size: 24px;
  font-weight: 600;
}
.fiche-state {
  position: absolute;
  top: 24px; right: 24px;
  padding: 5px 12px;
  border-radius: 14px;
  font-size: 11px;
  font-weight: 600;
}
.fiche-body { padding: 24px; }
.fiche-row {
  display: flex;
  gap: 14px;
  padding: 10px 0;
  border-bottom: 1px solid var(--line);
  font-size: 13px;
}
.fiche-row:last-of-type { border-bottom: none; }
.fiche-key { color: var(--txt3); width: 130px; flex-shrink: 0; }
.fiche-val { color: var(--txt); flex: 1; }
.fiche-chantier {
  margin: 16px 24px 24px;
  padding: 14px;
  background: rgba(251,113,133,0.08);
  border: 1px solid rgba(251,113,133,0.25);
  border-radius: 10px;
}
.fc-label { font-size: 10px; color: var(--risque); font-family: 'JetBrains Mono', monospace; text-transform: uppercase; margin-bottom: 6px; }
.fc-text { font-size: 13px; margin-bottom: 12px; }
.fc-btn {
  background: var(--accent); color: #fff; border: none;
  padding: 9px 16px; border-radius: 8px; font-size: 12px;
  font-weight: 600; cursor: pointer; width: 100%;
  font-family: 'Inter', sans-serif;
}
.fc-btn:hover { background: var(--accent2); }

/* hint navigation */
.nav-hint {
  position: absolute;
  bottom: 16px;
  left: 50%;
  transform: translateX(-50%);
  font-size: 11px;
  color: var(--txt3);
  font-family: 'JetBrains Mono', monospace;
  background: var(--bg2);
  border: 1px solid var(--line);
  padding: 6px 14px;
  border-radius: 16px;
}

/* lens legend */
.lens-legend {
  position: absolute;
  top: 16px; right: 16px;
  background: var(--bg2);
  border: 1px solid var(--line);
  border-radius: 9px;
  padding: 10px 14px;
  font-size: 10px;
  display: none;
}
.lens-legend.visible { display: block; }
.ll-title { color: var(--txt3); font-family: 'JetBrains Mono', monospace; text-transform: uppercase; margin-bottom: 6px; }
.ll-item { display: flex; align-items: center; gap: 6px; margin-bottom: 3px; color: var(--txt2); }
.ll-dot { width: 8px; height: 8px; border-radius: 2px; }
</style>
</head>
<body>

<div class="header">
  <div class="h-logo">Lugia <span>&</span> Co</div>
  <div class="breadcrumb" id="breadcrumb"></div>
  <div class="lens-bar">
    <button class="lens-btn active" onclick="setLens('sante')">Santé</button>
    <button class="lens-btn" onclick="setLens('conformite')">Conformité</button>
    <button class="lens-btn" onclick="setLens('donnees')">Données</button>
    <button class="lens-btn" onclick="setLens('maturite')">Maturité</button>
  </div>
  <div class="zoom-control">
    <span style="color:var(--txt3);font-size:14px">−</span>
    <input type="range" class="zoom-slider" id="zoom" min="0" max="4" value="1" step="1" oninput="setLevel(parseInt(this.value))">
    <span style="color:var(--txt3);font-size:14px">+</span>
    <span class="zoom-label" id="zoom-label">Carte</span>
  </div>
</div>

<div class="stage">
  <div class="lens-legend" id="lens-legend"></div>

  <!-- NIVEAU 0 — VIGNETTE -->
  <div class="level" id="level-0">
    <div class="vignette">
      <div class="vig-light" style="background:rgba(52,211,153,0.12);color:var(--optimal)" id="vig-light">●</div>
      <div class="vig-title" id="vig-title">Cabinet en bonne santé</div>
      <div class="vig-sub" id="vig-sub">2 points de vigilance · cartographié à 64%</div>
      <div class="vig-hint">↑ Zoomez pour explorer votre cabinet</div>
    </div>
  </div>

  <!-- NIVEAU 1 — CARTE -->
  <div class="level" id="level-1">
    <svg viewBox="0 0 700 560" id="svg-1"></svg>
  </div>

  <!-- NIVEAU 2 — DOMAINE -->
  <div class="level" id="level-2">
    <svg viewBox="0 0 700 560" id="svg-2"></svg>
  </div>

  <!-- NIVEAU 3 — FLUX -->
  <div class="level" id="level-3">
    <svg viewBox="0 0 700 560" id="svg-3"></svg>
  </div>

  <!-- NIVEAU 4 — FICHE -->
  <div class="level" id="level-4">
    <div class="fiche" id="fiche"></div>
  </div>

  <div class="nav-hint" id="nav-hint">Glissez le zoom ou cliquez sur un élément pour entrer</div>
</div>

<script>
// ════════════════════════════════════════════
// DONNÉES
// ════════════════════════════════════════════
const LEVELS = ['Vignette', 'Carte', 'Domaine', 'Flux', 'Objet'];

const regions = [
  { id:'participants', label:'Participants', cx:200, cy:130, sante:0.80, conf:0.6, data:0.3, matur:0.7 },
  { id:'technologies', label:'Technologies', cx:500, cy:150, sante:0.55, conf:0.4, data:0.7, matur:0.9 },
  { id:'information',  label:'Information',  cx:150, cy:320, sante:0.45, conf:0.3, data:1.0, matur:0.5 },
  { id:'processus',    label:'Processus',    cx:380, cy:340, sante:0.60, conf:0.7, data:0.5, matur:0.4 },
  { id:'environnement',label:'Environ.',     cx:560, cy:380, sante:0.40, conf:0.2, data:0.2, matur:0.6 },
  { id:'produits',     label:'Produits',     cx:280, cy:480, sante:0.75, conf:0.8, data:0.4, matur:0.6 },
  { id:'clients',      label:'Clients',      cx:480, cy:500, sante:0.85, conf:0.9, data:0.3, matur:0.8 },
];
const regionLinks = [
  ['participants','technologies'],['participants','processus'],['technologies','information'],
  ['information','processus'],['processus','produits'],['produits','clients'],
  ['environnement','technologies'],['environnement','processus'],
];

// Objets du domaine "technologies" (niveau 2 exemple)
const domainObjects = {
  technologies: {
    label: 'Technologies',
    nodes: [
      { id:'dpi', label:'Logiciel DPI', etat:'FONCTIONNEL', x:200, y:200 },
      { id:'ia',  label:'Outil IA',     etat:'A_RISQUE',    x:430, y:200 },
      { id:'mss', label:'Messagerie',   etat:'FONCTIONNEL', x:200, y:380 },
      { id:'agenda',label:'Agenda',     etat:'OPTIMAL',     x:430, y:380 },
    ],
    edges: [['dpi','ia'],['dpi','mss'],['ia','agenda']]
  }
};

// Flux de valeur (niveau 3)
const valueFlow = {
  label: 'Flux : du patient au compte-rendu',
  nodes: [
    { id:'pat',  label:'Patient',      etat:'FONCTIONNEL', x:90,  y:280, type:'acteur' },
    { id:'cons', label:'Consultation', etat:'FONCTIONNEL', x:240, y:280, type:'action' },
    { id:'data', label:'Données',      etat:'A_RISQUE',    x:390, y:200, type:'stock' },
    { id:'redac',label:'Rédaction IA', etat:'DEGRADE',     x:390, y:360, type:'action' },
    { id:'cr',   label:'Compte-rendu', etat:'FONCTIONNEL', x:540, y:280, type:'flux' },
    { id:'env',  label:'Envoi',        etat:'OPTIMAL',     x:650, y:280, type:'acteur' },
  ],
  edges: [['pat','cons'],['cons','data'],['cons','redac'],['data','redac'],['redac','cr'],['cr','env']]
};

// Détail objet (niveau 4)
const objectDetails = {
  ia: {
    composante:'TECHNOLOGIE', label:'Outil IA', etat:'A_RISQUE', color:'#fb7185',
    rows: [
      ['Type', 'Outil externe (ChatGPT)'],
      ['État', 'À risque'],
      ['Criticité', 'Important'],
      ['Données traitées', 'Noms patients (non protégés)'],
      ['Utilisé par', 'Médecin'],
      ['Contraint par', 'RGPD / AI Act'],
      ['Première détection', 'Inféré depuis vos usages'],
    ],
    chantier: { label:'Chantier recommandé', text:'Sécuriser cet outil : tokeniser les données avant tout envoi. Élimine le risque RGPD.' }
  }
};

const ETAT_COLOR = {
  OPTIMAL:'#34d399', FONCTIONNEL:'#6ee7b7', DEGRADE:'#fbbf24',
  A_RISQUE:'#fb7185', BLOQUE:'#ef4444'
};
const ETAT_LABEL = {
  OPTIMAL:'Optimal', FONCTIONNEL:'Fonctionnel', DEGRADE:'Dégradé',
  A_RISQUE:'À risque', BLOQUE:'Bloqué'
};

// ÉTAT
let currentLevel = 1;
let currentLens = 'sante';
let selectedRegion = 'technologies';
let selectedObject = 'ia';

const LENS_VALUE = {
  sante: r => r.sante, conformite: r => r.conf, donnees: r => r.data, maturite: r => r.matur
};
const LENS_COLOR = {
  sante: v => v>=0.7?'#34d399':v>=0.5?'#fbbf24':'#fb7185',
  conformite: v => v>=0.7?'#34d399':v>=0.4?'#fbbf24':'#fb7185',
  donnees: v => `rgba(34,211,238,${0.3+v*0.7})`,
  maturite: v => `rgba(167,139,250,${0.3+v*0.7})`
};

// ════════════════════════════════════════════
// NAVIGATION
// ════════════════════════════════════════════
function setLevel(lvl) {
  currentLevel = lvl;
  document.getElementById('zoom').value = lvl;
  document.getElementById('zoom-label').textContent = LEVELS[lvl];
  document.querySelectorAll('.level').forEach(l => l.classList.remove('active'));
  document.getElementById(`level-${lvl}`).classList.add('active');
  renderBreadcrumb();
  renderLevel(lvl);
  updateNavHint(lvl);
}

function updateNavHint(lvl) {
  const hints = [
    'Zoomez pour explorer votre cabinet',
    'Cliquez sur un domaine pour entrer · ou zoomez',
    'Cliquez sur un objet pour voir son flux · ou zoomez',
    'Cliquez sur un objet pour son détail complet',
    'Dézoomez pour revenir à la vue d\'ensemble',
  ];
  document.getElementById('nav-hint').textContent = hints[lvl];
}

function renderBreadcrumb() {
  const crumbs = [];
  crumbs.push({ lvl:0, label:'Cabinet' });
  if (currentLevel >= 1) crumbs.push({ lvl:1, label:'Carte WSF' });
  if (currentLevel >= 2) crumbs.push({ lvl:2, label:domainObjects[selectedRegion]?.label || 'Domaine' });
  if (currentLevel >= 3) crumbs.push({ lvl:3, label:'Flux de valeur' });
  if (currentLevel >= 4) crumbs.push({ lvl:4, label:objectDetails[selectedObject]?.label || 'Objet' });

  document.getElementById('breadcrumb').innerHTML = crumbs.map((c,i) =>
    `${i>0?'<span class="bc-sep">›</span>':''}<span class="bc-item ${c.lvl===currentLevel?'active':''}" onclick="setLevel(${c.lvl})">${c.label}</span>`
  ).join('');
}

function setLens(lens) {
  currentLens = lens;
  document.querySelectorAll('.lens-btn').forEach(b => b.classList.remove('active'));
  event.target.classList.add('active');
  renderLevel(currentLevel);
  renderLensLegend();
}

function renderLensLegend() {
  const legend = document.getElementById('lens-legend');
  if (currentLens === 'sante' || currentLevel === 0 || currentLevel >= 3) {
    legend.classList.remove('visible');
    return;
  }
  legend.classList.add('visible');
  const legends = {
    conformite: { title:'Lentille Conformité', items:[['#34d399','Conforme'],['#fbbf24','À surveiller'],['#fb7185','À risque']] },
    donnees: { title:'Lentille Données', items:[['#22d3ee','Sensibilité élevée'],['rgba(34,211,238,0.4)','Faible']] },
    maturite: { title:'Lentille Maturité', items:[['#a78bfa','Bien cartographié'],['rgba(167,139,250,0.4)','À explorer']] }
  };
  const l = legends[currentLens];
  if (!l) { legend.classList.remove('visible'); return; }
  legend.innerHTML = `<div class="ll-title">${l.title}</div>` +
    l.items.map(([c,t]) => `<div class="ll-item"><span class="ll-dot" style="background:${c}"></span>${t}</div>`).join('');
}

// ════════════════════════════════════════════
// RENDU PAR NIVEAU
// ════════════════════════════════════════════
function renderLevel(lvl) {
  if (lvl === 0) renderVignette();
  if (lvl === 1) renderCarte();
  if (lvl === 2) renderDomaine();
  if (lvl === 3) renderFlux();
  if (lvl === 4) renderFiche();
}

function renderVignette() {
  const avg = regions.reduce((s,r)=>s+r.sante,0)/regions.length;
  const light = document.getElementById('vig-light');
  const color = avg>=0.7?'var(--optimal)':avg>=0.5?'var(--degrade)':'var(--risque)';
  light.style.color = color;
  light.style.background = avg>=0.7?'rgba(52,211,153,0.12)':avg>=0.5?'rgba(251,191,36,0.12)':'rgba(251,113,133,0.12)';
  document.getElementById('vig-title').textContent =
    avg>=0.7?'Cabinet en bonne santé':avg>=0.5?'Cabinet à surveiller':'Points d\'attention';
}

function renderCarte() {
  const svg = document.getElementById('svg-1');
  let html = '';
  // links
  regionLinks.forEach(([a,b]) => {
    const ra = regions.find(r=>r.id===a), rb = regions.find(r=>r.id===b);
    html += `<line class="region-link" x1="${ra.cx}" y1="${ra.cy}" x2="${rb.cx}" y2="${rb.cy}"/>`;
  });
  // bubbles
  regions.forEach(r => {
    const v = LENS_VALUE[currentLens](r);
    const color = LENS_COLOR[currentLens](v);
    const radius = 32 + v * 16;
    html += `<g class="region-bubble" onclick="enterRegion('${r.id}')">
      <circle class="region-circle" cx="${r.cx}" cy="${r.cy}" r="${radius}" fill="${color}" opacity="0.18"/>
      <circle cx="${r.cx}" cy="${r.cy}" r="${radius}" fill="none" stroke="${color}" stroke-width="2" opacity="0.7"/>
      <text class="region-name" x="${r.cx}" y="${r.cy-2}" fill="${color}">${r.label}</text>
      <text class="region-pct" x="${r.cx}" y="${r.cy+14}">${Math.round(v*100)}%</text>
    </g>`;
  });
  svg.innerHTML = html;
}

function renderDomaine() {
  const dom = domainObjects[selectedRegion] || domainObjects.technologies;
  const svg = document.getElementById('svg-2');
  let html = `<text x="350" y="50" text-anchor="middle" font-family="Fraunces,serif" font-size="20" fill="${'#eceef2'}">${dom.label}</text>`;
  dom.edges.forEach(([a,b]) => {
    const na = dom.nodes.find(n=>n.id===a), nb = dom.nodes.find(n=>n.id===b);
    html += `<line class="obj-edge" x1="${na.x}" y1="${na.y}" x2="${nb.x}" y2="${nb.y}"/>`;
  });
  dom.nodes.forEach(n => {
    const color = ETAT_COLOR[n.etat];
    html += `<g class="obj-node" onclick="enterObject('${n.id}')">
      <rect class="obj-rect" x="${n.x-55}" y="${n.y-22}" width="110" height="44" rx="9"
        fill="#11141b" stroke="${color}" stroke-width="1.6"/>
      <text class="obj-label" x="${n.x}" y="${n.y-3}">${n.label}</text>
      <text class="obj-sublabel" x="${n.x}" y="${n.y+12}">${ETAT_LABEL[n.etat]}</text>
    </g>`;
  });
  svg.innerHTML = html;
}

function renderFlux() {
  const f = valueFlow;
  const svg = document.getElementById('svg-3');
  let html = `<text x="350" y="50" text-anchor="middle" font-family="Fraunces,serif" font-size="18" fill="#eceef2">${f.label}</text>
    <defs><marker id="fa" markerWidth="8" markerHeight="8" refX="7" refY="3" orient="auto"><path d="M0,0 L0,6 L7,3 z" fill="#4e5663"/></marker></defs>`;
  f.edges.forEach(([a,b]) => {
    const na = f.nodes.find(n=>n.id===a), nb = f.nodes.find(n=>n.id===b);
    html += `<line class="obj-edge" x1="${na.x}" y1="${na.y}" x2="${nb.x}" y2="${nb.y}" marker-end="url(#fa)" opacity="0.6"/>`;
  });
  f.nodes.forEach(n => {
    const color = ETAT_COLOR[n.etat];
    const isRound = n.type === 'action';
    html += `<g class="obj-node" onclick="enterObject('${n.id}')">
      <rect class="obj-rect" x="${n.x-48}" y="${n.y-20}" width="96" height="40" rx="${isRound?20:8}"
        fill="#11141b" stroke="${color}" stroke-width="1.6"/>
      <text class="obj-label" x="${n.x}" y="${n.y}" font-size="10">${n.label}</text>
    </g>`;
  });
  svg.innerHTML = html;
}

function renderFiche() {
  const o = objectDetails[selectedObject] || objectDetails.ia;
  const html = `
    <div class="fiche-header">
      <div class="fiche-comp">${o.composante}</div>
      <div class="fiche-title">${o.label}</div>
      <div class="fiche-state" style="background:${o.color}22;color:${o.color}">${ETAT_LABEL[o.etat]}</div>
    </div>
    <div class="fiche-body">
      ${o.rows.map(([k,v]) => `<div class="fiche-row"><div class="fiche-key">${k}</div><div class="fiche-val">${v}</div></div>`).join('')}
    </div>
    ${o.chantier ? `<div class="fiche-chantier">
      <div class="fc-label">${o.chantier.label}</div>
      <div class="fc-text">${o.chantier.text}</div>
      <button class="fc-btn">Je me lance →</button>
    </div>` : ''}
  `;
  document.getElementById('fiche').innerHTML = html;
}

function enterRegion(regionId) {
  selectedRegion = domainObjects[regionId] ? regionId : 'technologies';
  setLevel(2);
}
function enterObject(objId) {
  if (objectDetails[objId]) {
    selectedObject = objId;
    setLevel(4);
  } else {
    // si pas de détail, montrer le flux
    setLevel(3);
  }
}

setLevel(1);

            <div class=\"fiche-title\">Outil IA · <em>diagnostic<\u002Fem><\u002Fdiv>\n              <div class=\"fiche-state\">Critique<\u002Fdiv>\n            <\u002Fdiv>\n            <div class=\"fiche-body\">\n              <div class=\"fiche-row\"><div class=\"fiche-key\">Fournisseur<\u002Fdiv><div class=\"fiche-val\">Provider non documenté <span class=\"meta\">à renseigner<\u002Fspan><\u002Fdiv><\u002Fdiv>\n              <div class=\"fiche-row\"><div class=\"fiche-key\">Manipule<\u002Fdiv><div class=\"fiche-val\"><em>Données patient<\u002Fem> · I-03 · sensibilité critique<\u002Fdiv><\u002Fdiv>\n              <div class=\"fiche-row\"><div class=\"fiche-key\">Tokenisation<\u002Fdiv><div class=\"fiche-val\">Aucune trace · <span class=\"meta\">⨯<\u002Fspan><\u002Fdiv><\u002Fdiv>\n              <div class=\"fiche-row\"><div class=\"fiche-key\">Utilisé par<\u002Fdiv><div class=\"fiche-val\">Médecin (P-04) · Secrétaire (P-07)<\u002Fdiv><\u002Fdiv>\n              <div class=\"fiche-row\"><div class=\"fiche-key\">Contraintes<\u002Fdiv><div class=\"fiche-val\">AI Act · RGPD art. 22 · <em>conformité non démontrée<\u002Fem><\u002Fdiv><\u002Fdiv>\n              <div class=\"fiche-row\"><div class=\"fiche-key\">Dernière revue<\u002Fdiv><div class=\"fiche-val\"><span class=\"meta\">12.05.2026 · Cabinet pilote<\u002Fspan><\u002Fdiv><\u002Fdiv>\n            <\u002Fdiv>\n            <div class=\"fiche-action\">\n              <span class=\"fa-kicker\">Chantier proposé<\u002Fspan>\n              <p class=\"fa-text\">Documenter le fournisseur, vérifier la tokenisation des prompts, <em>cadrer l'usage par une charte interne<\u002Fem>.<\u002Fp>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"z-footer\">\n          <span><b>Outil IA · T-12<\u002Fb><\u002Fspan> <span class=\"z-footer-sep\">·<\u002Fspan>\n          <span>Composant Technologies<\u002Fspan> <span class=\"z-footer-sep\">·<\u002Fspan>\n          <span>Dernière maj <b>12.05.2026<\u002Fb><\u002Fspan>\n          <span class=\"z-keys\"><span><kbd>↑<\u002Fkbd> Z3<\u002Fspan> <span><kbd>E<\u002Fkbd> Éditer<\u002Fspan> <span><kbd>Esc<\u002Fkbd><\u002Fspan><\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div class=\"graphe-side\">\n        <div class=\"gs-tag\">16 · A · Z4 — Vue objet<\u002Fdiv>\n        <div class=\"gs-name\">Une <em>identité<\u002Fem>, un état<\u002Fdiv>\n        <p class=\"gs-desc\">La fiche est <em>la seule surface ivoire<\u002Fem> du jumeau. Elle ramène l'objet du système au document — au sens éditorial du terme.<\u002Fp>\n        <div class=\"gs-rules\">\n          <div class=\"gs-rule\"><div class=\"k\">Surface<\u002Fdiv><div class=\"v\">Ivoire éditorial qui <strong>flotte sur la scène navy<\u002Fstrong>. La fiche se lit comme un encart de presse.<\u002Fdiv><\u002Fdiv>\n          <div class=\"gs-rule\"><div class=\"k\">Titre<\u002Fdiv><div class=\"v\">Onest 500 + <strong>qualificatif en Lora regular<\u002Fstrong>. C'est le moment où la serif parle.<\u002Fdiv><\u002Fdiv>\n          <div class=\"gs-rule\"><div class=\"k\">État<\u002Fdiv><div class=\"v\">Badge en haut à droite, <strong>seule occurrence colorée<\u002Fstrong> de la fiche. Le reste est en encre.<\u002Fdiv><\u002Fdiv>\n          <div class=\"gs-rule\"><div class=\"k\">Lignes<\u002Fdiv><div class=\"v\">Clé en mono / valeur en sans. Les références d'autres objets (P-04, I-03) sont cliquables — chacune ouvre sa propre Z4.<\u002Fdiv><\u002Fdiv>\n          <div class=\"gs-rule\"><div class=\"k\">Chantier<\u002Fdiv><div class=\"v\">Si état ≠ optimal : encart d'action <strong>en patine correspondante<\u002Fstrong>, jamais ailleurs.<\u002Fdiv><\u002Fdiv>\n          <div class=\"gs-rule\"><div class=\"k\">Édition<\u002Fdiv><div class=\"v\"><kbd>E<\u002Fkbd> ou clic sur une ligne ouvre le formulaire de modélisation.<\u002Fdiv><\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ============== RÉVÉLATION ============== -->\n<section id=\"revelation\">\n  <div class=\"wrap\">\n    <div class=\"head\">\n      <p class=\"eyebrow\">17 · Révélation<\u002Fp>\n      <div>\n        <h2 class=\"title\">Le jumeau qui <em>se révèle<\u002Fem><\u002Fh2>\n        <p class=\"lead\">Le modèle n'est pas un formulaire à remplir d'un coup. <em>C'est une carte qui se révèle au fil de l'usage.<\u002Fem> Chaque objet du jumeau traverse trois états de connaissance — <em>inconnu, inféré, confirmé<\u002Fem>. Le manager n'a jamais à tout déclarer : il agit, et le jumeau déduit. Il documente, et le jumeau confirme.<\u002Fp>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- les 3 états -->\n    <div class=\"reveal-states\">\n      <div class=\"rs-card\">\n        <div class=\"rs-stage\">\n          <svg viewBox=\"0 0 200 130\" preserveAspectRatio=\"xMidYMid meet\">\n            <circle cx=\"100\" cy=\"65\" r=\"3\" fill=\"rgba(244,239,229,0.20)\"><\u002Fcircle>\n          <\u002Fsvg>\n        <\u002Fdiv>\n        <div class=\"rs-num\">État 00<\u002Fdiv>\n        <div class=\"rs-name\">Inconnu<\u002Fdiv>\n        <p class=\"rs-desc\">L'objet existe peut-être dans le système, mais le jumeau n'en a pas connaissance. <em>Un point discret tient l'emplacement<\u002Fem>, mais ni nom, ni état, ni lien. C'est l'attente.<\u002Fp>\n        <div class=\"rs-spec\"><b>3 px<\u002Fb> · ivoire 20 % · sans label<\u002Fdiv>\n      <\u002Fdiv>\n\n      <div class=\"rs-card\">\n        <div class=\"rs-stage\">\n          <svg viewBox=\"0 0 200 130\" preserveAspectRatio=\"xMidYMid meet\">\n            <circle cx=\"100\" cy=\"65\" r=\"22\" fill=\"none\" stroke=\"rgba(196,184,112,0.55)\" stroke-width=\"1\" stroke-dasharray=\"3 3\"><\u002Fcircle>\n            <text x=\"100\" y=\"108\" text-anchor=\"middle\" font-family=\"Onest\" font-size=\"10\" font-weight=\"500\" fill=\"rgba(244,239,229,0.45)\">Outil IA<\u002Ftext>\n          <\u002Fsvg>\n        <\u002Fdiv>\n        <div class=\"rs-num\">État 01<\u002Fdiv>\n        <div class=\"rs-name\">Inféré<\u002Fdiv>\n        <p class=\"rs-desc\">Le jumeau a <em>déduit son existence<\u002Fem> depuis un usage observable, un autre objet, un audit. Le contour est en pointillés sage — reconnu, mais non confirmé par un humain. Son état est <em>en attente de précision<\u002Fem>.<\u002Fp>\n        <div class=\"rs-spec\"><b>36 px<\u002Fb> · trait pointillé sage · label atténué<\u002Fdiv>\n      <\u002Fdiv>\n\n      <div class=\"rs-card\">\n        <div class=\"rs-stage\">\n          <div class=\"rt-node confirmed s-risque\" style=\"position:relative; transform: none; width: 44px; height: 44px;\"><\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"rs-num\">État 02<\u002Fdiv>\n        <div class=\"rs-name\">Confirmé<\u002Fdiv>\n        <p class=\"rs-desc\">L'objet est documenté par un humain ou par un audit machine. Bulle de verre pleine, bordure en patine de son <em>état<\u002Fem> (santé, conformité…). C'est la seule étape où l'objet entre dans les calculs de gravité.<\u002Fp>\n        <div class=\"rs-spec\"><b>44 px<\u002Fb> · bulle de verre · bordure en patine<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- Mécanisme : action opérationnelle → révélation -->\n    <p class=\"eyebrow\" style=\"margin-top:64px;margin-bottom:14px;\">L'action révèle · mécanisme central<\u002Fp>\n    <div class=\"mech-frame\">\n      <div class=\"mech-head\">\n        <div class=\"mech-head-name\">Chaque <em>tâche opérationnelle<\u002Fem> complète le jumeau<\u002Fdiv>\n        <div class=\"mech-head-meta\">Cabinet Renaud · 10 derniers jours<\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"mech-table\">\n        <div class=\"mh\">Date<\u002Fdiv>\n        <div class=\"mh\">Action utile réalisée<\u002Fdiv>\n        <div class=\"mh\" style=\"justify-content:center;\"><\u002Fdiv>\n        <div class=\"mh\">Objets révélés par le jumeau<\u002Fdiv>\n        <div class=\"mh\">Carto<\u002Fdiv>\n\n        <div class=\"mech-num\">03.05<\u002Fdiv>\n        <div class=\"mech-action\">Rédiger un <em>courrier au confrère<\u002Fem><\u002Fdiv>\n        <div class=\"mech-arrow\">→<\u002Fdiv>\n        <div class=\"mech-reveals\">\n          <span class=\"mech-rev confirmed\">Service signature<\u002Fspan>\n          <span class=\"mech-rev inferred\">Modèle de lettre<\u002Fspan>\n        <\u002Fdiv>\n        <div class=\"mech-gain\"><span class=\"pos\">+8 %<\u002Fspan><\u002Fdiv>\n\n        <div class=\"mech-num\">05.05<\u002Fdiv>\n        <div class=\"mech-action\">Soumettre un compte-rendu à <em>l'outil IA<\u002Fem><\u002Fdiv>\n        <div class=\"mech-arrow\">→<\u002Fdiv>\n        <div class=\"mech-reveals\">\n          <span class=\"mech-rev confirmed\">Outil IA<\u002Fspan>\n          <span class=\"mech-rev inferred\">Fournisseur<\u002Fspan>\n          <span class=\"mech-rev inferred\">Tokenisation<\u002Fspan>\n        <\u002Fdiv>\n        <div class=\"mech-gain\"><span class=\"pos\">+14 %<\u002Fspan><\u002Fdiv>\n\n        <div class=\"mech-num\">08.05<\u002Fdiv>\n        <div class=\"mech-action\">Recevoir un <em>résultat de labo<\u002Fem> via DPI<\u002Fdiv>\n        <div class=\"mech-arrow\">→<\u002Fdiv>\n        <div class=\"mech-reveals\">\n          <span class=\"mech-rev confirmed\">Laboratoire partenaire<\u002Fspan>\n          <span class=\"mech-rev inferred\">Canal de transmission<\u002Fspan>\n        <\u002Fdiv>\n        <div class=\"mech-gain\"><span class=\"pos\">+11 %<\u002Fspan><\u002Fdiv>\n\n        <div class=\"mech-num\">09.05<\u002Fdiv>\n        <div class=\"mech-action\">Demander un <em>audit HDS annuel<\u002Fem><\u002Fdiv>\n        <div class=\"mech-arrow\">→<\u002Fdiv>\n        <div class=\"mech-reveals\">\n          <span class=\"mech-rev confirmed\">Hébergeur HDS<\u002Fspan>\n          <span class=\"mech-rev confirmed\">Politique de sauvegarde<\u002Fspan>\n          <span class=\"mech-rev confirmed\">DPO<\u002Fspan>\n        <\u002Fdiv>\n        <div class=\"mech-gain\"><span class=\"pos\">+22 %<\u002Fspan><\u002Fdiv>\n\n        <div class=\"mech-num\">12.05<\u002Fdiv>\n        <div class=\"mech-action\">Accueillir un <em>médecin remplaçant<\u002Fem><\u002Fdiv>\n        <div class=\"mech-arrow\">→<\u002Fdiv>\n        <div class=\"mech-reveals\">\n          <span class=\"mech-rev confirmed\">Convention<\u002Fspan>\n          <span class=\"mech-rev inferred\">Charte d'accès<\u002Fspan>\n        <\u002Fdiv>\n        <div class=\"mech-gain\"><span class=\"pos\">+9 %<\u002Fspan><\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"display:flex; justify-content: space-between; padding-top: 18px; font-family: var(--mono); font-size: 10.5px; color: var(--ink-on-navy-400); letter-spacing: 0.10em;\">\n        <span>5 tâches opérationnelles · 11 confirmés · 5 inférés<\u002Fspan>\n        <span>Complétion globale <b style=\"color:var(--ink-on-navy);\">+64 %<\u002Fb> · 17 % → 81 %<\u002Fspan>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- timeline de révélation -->\n    <div class=\"reveal-timeline\">\n      <div class=\"rt-head\">\n        <div>\n          <div class=\"rt-head-name\">Cabinet Renaud · composant <em>Technologies<\u002Fem><\u002Fdiv>\n          <div class=\"rt-head-meta\" style=\"margin-top:4px;\">Découverte progressive · 6 objets potentiels<\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"rt-head-meta\">Évolution dans le temps ›<\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"rt-grid\">\n        <div class=\"rt-step\">\n          <div class=\"rt-step-head\">\n            <span class=\"rt-step-tag\">T0 · onboarding<\u002Fspan>\n            <div class=\"rt-step-pct\">17<small>%<\u002Fsmall><\u002Fdiv>\n          <\u002Fdiv>\n          <div class=\"rt-step-scene\">\n            <div class=\"rt-node confirmed s-fonctionnel\" style=\"left:30%; top:38%;\"><span class=\"rt-node-label\">DPI<\u002Fspan><\u002Fdiv>\n            <div class=\"rt-node unknown\" style=\"left:62%; top:25%;\"><\u002Fdiv>\n            <div class=\"rt-node unknown\" style=\"left:78%; top:50%;\"><\u002Fdiv>\n            <div class=\"rt-node unknown\" style=\"left:62%; top:72%;\"><\u002Fdiv>\n            <div class=\"rt-node unknown\" style=\"left:32%; top:75%;\"><\u002Fdiv>\n            <div class=\"rt-node unknown\" style=\"left:18%; top:62%;\"><\u002Fdiv>\n          <\u002Fdiv>\n          <div class=\"rt-step-action\">Le cabinet a déclaré son <b>DPI<\u002Fb> au questionnaire initial. Le jumeau attend que l'usage révèle le reste.<\u002Fdiv>\n        <\u002Fdiv>\n\n        <div class=\"rt-step\">\n          <div class=\"rt-step-head\">\n            <span class=\"rt-step-tag\">T+3 jours · usage<\u002Fspan>\n            <div class=\"rt-step-pct\">58<small>%<\u002Fsmall><\u002Fdiv>\n          <\u002Fdiv>\n          <div class=\"rt-step-scene\">\n            <div class=\"rt-node confirmed s-fonctionnel\" style=\"left:30%; top:38%;\"><span class=\"rt-node-label\">DPI<\u002Fspan><\u002Fdiv>\n            <div class=\"rt-node confirmed s-vigilance\" style=\"left:62%; top:25%;\"><span class=\"rt-node-label\">Hébergement<\u002Fspan><\u002Fdiv>\n            <div class=\"rt-node inferred\" style=\"left:78%; top:50%;\"><span class=\"rt-node-label\">Outil IA<\u002Fspan><\u002Fdiv>\n            <div class=\"rt-node inferred\" style=\"left:62%; top:72%;\"><span class=\"rt-node-label\">Service signature<\u002Fspan><\u002Fdiv>\n            <div class=\"rt-node unknown\" style=\"left:32%; top:75%;\"><\u002Fdiv>\n            <div class=\"rt-node unknown\" style=\"left:18%; top:62%;\"><\u002Fdiv>\n          <\u002Fdiv>\n          <div class=\"rt-step-action\">Le médecin a rédigé un courrier via le DPI. Le jumeau a <b>inferé<\u002Fb> deux outils additionnels (IA de relecture, signature électronique) depuis les flux observés. <em>L'hébergement est confirmé par audit<\u002Fem>.<\u002Fdiv>\n        <\u002Fdiv>\n\n        <div class=\"rt-step\">\n          <div class=\"rt-step-head\">\n            <span class=\"rt-step-tag\">T+10 jours · atelier<\u002Fspan>\n            <div class=\"rt-step-pct\">92<small>%<\u002Fsmall><\u002Fdiv>\n          <\u002Fdiv>\n          <div class=\"rt-step-scene\">\n            <div class=\"rt-node confirmed s-fonctionnel\" style=\"left:30%; top:38%;\"><span class=\"rt-node-label\">DPI<\u002Fspan><\u002Fdiv>\n            <div class=\"rt-node confirmed s-vigilance\" style=\"left:62%; top:25%;\"><span class=\"rt-node-label\">Hébergement<\u002Fspan><\u002Fdiv>\n            <div class=\"rt-node confirmed s-critique\" style=\"left:78%; top:50%;\"><span class=\"rt-node-label\">Outil IA<\u002Fspan><\u002Fdiv>\n            <div class=\"rt-node confirmed s-fonctionnel\" style=\"left:62%; top:72%;\"><span class=\"rt-node-label\">Signature<\u002Fspan><\u002Fdiv>\n            <div class=\"rt-node confirmed s-vigilance\" style=\"left:32%; top:75%;\"><span class=\"rt-node-label\">Sauvegarde<\u002Fspan><\u002Fdiv>\n            <div class=\"rt-node inferred\" style=\"left:18%; top:62%;\"><span class=\"rt-node-label\">VPN<\u002Fspan><\u002Fdiv>\n          <\u002Fdiv>\n          <div class=\"rt-step-action\">Atelier de 30 min avec le cabinet. Les 4 outils inférés sont <b>confirmés<\u002Fb> ; l'Outil IA révèle un fournisseur non documenté → <b>critique<\u002Fb>. <em>Un dernier objet reste inféré.<\u002Fem><\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <div class=\"echelle-rules\" style=\"margin-top:32px;\">\n      <div class=\"echelle-rule\">\n        <div class=\"er-num\">RG-25<\u002Fdiv>\n        <div class=\"er-text\"><strong>L'action quotidienne nourrit le jumeau.<\u002Fstrong> Chaque tâche opérationnelle réelle — rédiger un courrier, soumettre à l'IA, recevoir un labo — <em>révèle des objets du système<\u002Fem>. L'utilisateur ne modélise jamais explicitement : il <em>fait son travail<\u002Fem>, le jumeau apprend.<\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"echelle-rule\">\n        <div class=\"er-num\">RG-26<\u002Fdiv>\n        <div class=\"er-text\"><strong>Trois états, jamais plus.<\u002Fstrong> Inconnu · Inféré · Confirmé. Grammaire de la <em>connaissance<\u002Fem> du jumeau, distincte de celle des états de santé.<\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"echelle-rule\">\n        <div class=\"er-num\">RG-27<\u002Fdiv>\n        <div class=\"er-text\"><strong>Le score de cartographie est pondéré.<\u002Fstrong> Inconnu = 0 · Inféré = 0.5 · Confirmé = 1. C'est cette agrégation qui pilote la barre de cartographie en Z0 et Z1.<\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"echelle-rule\">\n        <div class=\"er-num\">RG-28<\u002Fdiv>\n        <div class=\"er-text\"><strong>L'inféré ne déclenche pas d'alerte.<\u002Fstrong> Un objet inféré ne peut pas peser dans la gravité du système. Le jumeau ne crie pas sur ce qu'il <em>suppose<\u002Fem>, il signale seulement ce qu'il <em>connaît<\u002Fem>.<\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"echelle-rule\">\n        <div class=\"er-num\">RG-29<\u002Fdiv>\n        <div class=\"er-text\"><strong>L'usage révèle plus que la déclaration.<\u002Fstrong> Le formulaire de modélisation ne sert pas à déclarer tous les objets ; il sert à <em>confirmer ce qui est déjà inféré<\u002Fem>. C'est le travail qui modélise, pas l'inverse.<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ============== ICONOGRAPHIE ============== -->\n<section id=\"icones\">\n  <div class=\"wrap\">\n    <div class=\"head\">\n      <p class=\"eyebrow\">18 · Iconographie<\u002Fp>\n      <div>\n        <h2 class=\"title\">Un vocabulaire <em>de traits<\u002Fem><\u002Fh2>\n        <p class=\"lead\">La marque Lugia n'utilise pas d'icônes. Le produit en a besoin — pour repérer une lentille, un composant WSF, une action. <em>Une seule grammaire<\u002Fem> : trait fin (1.5 px), 20 px de base, dessin géométrique. Pas d'aplats, pas d'ombres, pas de couleur. L'icône suit l'encre.<\u002Fp>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <div class=\"ico-grammar\">\n      <div class=\"ico-grammar-cell\">\n        <div class=\"ico-grammar-tag\">18 · A — Grammaire<\u002Fdiv>\n        <div class=\"ico-grammar-name\">Trois <em>tailles<\u002Fem><\u002Fdiv>\n        <div class=\"ico-grammar-desc\">L'icône s'utilise à trois échelles canoniques : <em>inline<\u002Fem> dans une ligne de texte (14 px), <em>UI<\u002Fem> dans un bouton ou une cellule (20 px), <em>display<\u002Fem> en vignette de section (32 px). Au-delà, on utilise une illustration ou un mark Lugia patiné.<\u002Fdiv>\n        <div class=\"ico-grammar-stage\">\n          <div class=\"ico-sizes\">\n            <div class=\"ico-size-item\">\n              <svg width=\"14\" height=\"14\" viewBox=\"0 0 20 20\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.5\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><rect x=\"3\" y=\"3\" width=\"14\" height=\"14\"><\u002Frect><line x1=\"3\" y1=\"10\" x2=\"17\" y2=\"10\"><\u002Fline><line x1=\"10\" y1=\"3\" x2=\"10\" y2=\"17\"><\u002Fline><\u002Fsvg>\n              <div class=\"ico-size-label\">14 · inline<\u002Fdiv>\n            <\u002Fdiv>\n            <div class=\"ico-size-item\">\n              <svg width=\"20\" height=\"20\" viewBox=\"0 0 20 20\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.5\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><rect x=\"3\" y=\"3\" width=\"14\" height=\"14\"><\u002Frect><line x1=\"3\" y1=\"10\" x2=\"17\" y2=\"10\"><\u002Fline><line x1=\"10\" y1=\"3\" x2=\"10\" y2=\"17\"><\u002Fline><\u002Fsvg>\n              <div class=\"ico-size-label\">20 · UI<\u002Fdiv>\n            <\u002Fdiv>\n            <div class=\"ico-size-item\">\n              <svg width=\"32\" height=\"32\" viewBox=\"0 0 20 20\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><rect x=\"3\" y=\"3\" width=\"14\" height=\"14\"><\u002Frect><line x1=\"3\" y1=\"10\" x2=\"17\" y2=\"10\"><\u002Fline><line x1=\"10\" y1=\"3\" x2=\"10\" y2=\"17\"><\u002Fline><\u002Fsvg>\n              <div class=\"ico-size-label\">32 · display<\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"ico-grammar-spec\"><b>Base 20<\u002Fb> · stroke 1.5px (1.2 à 32 px) · cap &amp; join arrondis<\u002Fdiv>\n      <\u002Fdiv>\n\n      <div class=\"ico-grammar-cell dark\">\n        <div class=\"ico-grammar-tag\">18 · B — Traits<\u002Fdiv>\n        <div class=\"ico-grammar-name\">L'icône <em>suit l'encre<\u002Fem><\u002Fdiv>\n        <div class=\"ico-grammar-desc\">Pas de couleur propre. L'icône hérite la couleur du texte qui l'accompagne via <strong>currentColor<\u002Fstrong>. Elle s'allume en patine d'état quand elle accompagne un signal, en encre faible quand elle est neutre.<\u002Fdiv>\n        <div class=\"ico-grammar-stage\">\n          <div class=\"ico-stroke-demo\">\n            <div class=\"ico-stroke-item\" style=\"color:var(--ink-on-navy);\">\n              <svg width=\"24\" height=\"24\" viewBox=\"0 0 20 20\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.5\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><circle cx=\"10\" cy=\"10\" r=\"7\"><\u002Fcircle><circle cx=\"10\" cy=\"10\" r=\"2.5\"><\u002Fcircle><\u002Fsvg>\n              <div class=\"ico-size-label\" style=\"color:var(--ink-on-navy-400);\">Encre<\u002Fdiv>\n            <\u002Fdiv>\n            <div class=\"ico-stroke-item\" style=\"color:var(--ink-on-navy-400);\">\n              <svg width=\"24\" height=\"24\" viewBox=\"0 0 20 20\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.5\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><circle cx=\"10\" cy=\"10\" r=\"7\"><\u002Fcircle><circle cx=\"10\" cy=\"10\" r=\"2.5\"><\u002Fcircle><\u002Fsvg>\n              <div class=\"ico-size-label\" style=\"color:var(--ink-on-navy-400);\">Atténuée<\u002Fdiv>\n            <\u002Fdiv>\n            <div class=\"ico-stroke-item\" style=\"color:var(--etat-vigilance-night);\">\n              <svg width=\"24\" height=\"24\" viewBox=\"0 0 20 20\" fill=\"none\" stroke=\"currentColor\" stro -block-tag\">État projeté<\u002Fdiv>\n          <div class=\"form-projection\">\n            <div class=\"form-proj-arrow\">\n              <span class=\"form-proj-cur\">Critique<\u002Fspan>\n              <span style=\"color:var(--argent-d);\">→<\u002Fspan>\n              <span class=\"form-proj-tgt\">Risque<\u002Fspan>\n            <\u002Fdiv>\n            <p class=\"form-proj-text\">Si tu complètes les 2 champs requis de <em>Provenance<\u002Fem>, l'objet quitte le palier critique. Pour atteindre <em>fonctionnel<\u002Fem>, il manque encore les garanties techniques.<\u002Fp>\n          <\u002Fdiv>\n        <\u002Fdiv>\n\n        <div>\n          <div class=\"form-side-block-tag\">Complétion<\u002Fdiv>\n          <div class=\"form-completion\">\n            <div class=\"form-completion-bar\"><div class=\"form-completion-fill\" style=\"width:62%;\"><\u002Fdiv><\u002Fdiv>\n            <div class=\"form-completion-meta\"><span>9 / 14 champs<\u002Fspan><span><b>62 %<\u002Fb><\u002Fspan><\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n\n        <div>\n          <div class=\"form-side-block-tag\">Sections<\u002Fdiv>\n          <div class=\"form-eval\">\n            <div class=\"form-eval-row ok\"><span>01 · Identité<\u002Fspan><span class=\"v\">Complet<\u002Fspan><\u002Fdiv>\n            <div class=\"form-eval-row todo\"><span>02 · Provenance<\u002Fspan><span class=\"v\">2 requis<\u002Fspan><\u002Fdiv>\n            <div class=\"form-eval-row partial\"><span>03 · Garanties<\u002Fspan><span class=\"v\">1 / 3<\u002Fspan><\u002Fdiv>\n            <div class=\"form-eval-row ok\"><span>04 · Liens<\u002Fspan><span class=\"v\">4 liens<\u002Fspan><\u002Fdiv>\n            <div class=\"form-eval-row partial\"><span>05 · Notes<\u002Fspan><span class=\"v\">optionnel<\u002Fspan><\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n\n        <div style=\"margin-top:auto; padding-top: 20px; border-top: 1px solid var(--line); font-family: var(--mono); font-size: 10px; letter-spacing: 0.10em; color: var(--ink-400);\">\n          Créé le 09.05.2026<br>\n          Modifié il y a <b style=\"color:var(--ink);\">4 s<\u002Fb>\n        <\u002Fdiv>\n      <\u002Faside>\n    <\u002Fdiv>\n\n    <div class=\"echelle-rules\" style=\"margin-top:32px;\">\n      <div class=\"echelle-rule\">\n        <div class=\"er-num\">RG-25<\u002Fdiv>\n        <div class=\"er-text\"><strong>Le formulaire dit ce qui change.<\u002Fstrong> Sa colonne de droite ne sert pas à décorer : elle montre l'état actuel, l'état projeté si on documente, et la complétion. Saisir devient une <em>conversation avec le jumeau<\u002Fem>.<p><\u002Fp><\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"echelle-rule\">\n        <div class=\"er-num\">RG-26<\u002Fdiv>\n        <div class=\"er-text\"><strong>Sections numérotées, statut explicite.<\u002Fstrong> Chaque bloc affiche son état en mono — Complet, 1 / 3, 2 requis. On lit le formulaire comme une checklist éditoriale, pas comme un mur de champs.<\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"echelle-rule\">\n        <div class=\"er-num\">RG-27<\u002Fdiv>\n        <div class=\"er-text\"><strong>L'étoile précède la patine.<\u002Fstrong> Un champ requis s'allume en terracotta quand il manque (RG-21 reste : pas de rouge vif). Les optionnels restent en encre neutre, jamais marqués.<\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"echelle-rule\">\n        <div class=\"er-num\">RG-28<\u002Fdiv>\n        <div class=\"er-text\"><strong>Sauvegarde automatique.<\u002Fstrong> Pas de « brouillon » explicite à maintenir : le formulaire enregistre seul. Le bouton <em>Valider<\u002Fem> change l'état de l'objet, jamais sa présence dans le modèle.<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ============== TIMELINE ============== -->\n<section id=\"timeline\">\n  <div class=\"wrap\">\n    <div class=\"head\">\n      <p class=\"eyebrow\">21 · Timeline<\u002Fp>\n      <div>\n        <h2 class=\"title\">L'<em>historique<\u002Fem> des chantiers<\u002Fh2>\n        <p class=\"lead\">L'axe temporel du jumeau. Chaque événement — ouverture de chantier, audit clos, dégradation, ajout d'information — s'inscrit dans une chronique verticale. La couleur du marqueur dit la gravité, la chronologie va du <em>maintenant<\u002Fem> vers le passé. Lecture éditoriale, pas tableau de bord.<\u002Fp>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <div class=\"graphes-row\">\n      <div class=\"timeline-stage\">\n        <div class=\"ts-topbar\">\n          <div class=\"ts-lens\">\n            <button class=\"active\">Santé<\u002Fbutton>\n            <button>Conformité<\u002Fbutton>\n            <button>Charge<\u002Fbutton>\n            <button>Maturité<\u002Fbutton>\n          <\u002Fdiv>\n          <div class=\"ts-lens\">\n            <button class=\"active\">7 jours<\u002Fbutton>\n            <button>30 jours<\u002Fbutton>\n            <button>3 mois<\u002Fbutton>\n            <button>Tout<\u002Fbutton>\n          <\u002Fdiv>\n          <div class=\"ts-sort\">12 événements<\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"tl-axis-wrap\">\n          <div class=\"tl-event\">\n            <div class=\"tl-marker s-critique\"><\u002Fdiv>\n            <div class=\"tl-date\">13 mai 2026 · 14:32<\u002Fdiv>\n            <div class=\"tl-title\">Outil IA · diagnostic — <em>signalé critique<\u002Fem><\u002Fdiv>\n            <p class=\"tl-desc\">Fournisseur non documenté détecté lors de l'audit RGPD du Cabinet Mercier. Tokenisation des prompts à vérifier.<\u002Fp>\n            <div class=\"tl-action t-critique\">Chantier ouvert · Cabinet Mercier<\u002Fdiv>\n          <\u002Fdiv>\n          <div class=\"tl-event\">\n            <div class=\"tl-marker s-risque\"><\u002Fdiv>\n            <div class=\"tl-date\">12 mai 2026 · 16:08<\u002Fdiv>\n            <div class=\"tl-title\">Données patient — <em>sensibilité élevée<\u002Fem><\u002Fdiv>\n            <p class=\"tl-desc\">Volume de données traitées par Outil IA dépasse le seuil mensuel défini par la charte interne.<\u002Fp>\n            <div class=\"tl-action t-risque\">Notification envoyée · DPO<\u002Fdiv>\n          <\u002Fdiv>\n          <div class=\"tl-event\">\n            <div class=\"tl-marker s-vigilance\"><\u002Fdiv>\n            <div class=\"tl-date\">11 mai 2026 · 09:14<\u002Fdiv>\n            <div class=\"tl-title\">RGPD art. 22 — <em>nouvelle exigence applicable<\u002Fem><\u002Fdiv>\n            <p class=\"tl-desc\">Décision automatisée individuelle : justification désormais exigée. Impact évalué sur 3 cabinets.<\u002Fp>\n            <div class=\"tl-action t-vigilance\">Veille juridique · Lugia<\u002Fdiv>\n          <\u002Fdiv>\n          <div class=\"tl-event\">\n            <div class=\"tl-marker s-fonctionnel\"><\u002Fdiv>\n            <div class=\"tl-date\">9 mai 2026 · 11:42<\u002Fdiv>\n            <div class=\"tl-title\">Hébergement HDS — <em>audit annuel clos<\u002Fem><\u002Fdiv>\n            <p class=\"tl-desc\">Conformité confirmée, certificat 2026 obtenu sans réserve.<\u002Fp>\n            <div class=\"tl-action t-fonct\">Audit clos · Provider HDS<\u002Fdiv>\n          <\u002Fdiv>\n          <div class=\"tl-event\">\n            <div class=\"tl-marker s-optimal\"><\u002Fdiv>\n            <div class=\"tl-date\">7 mai 2026 · 15:25<\u002Fdiv>\n            <div class=\"tl-title\">Processus consultation — <em>cartographie complétée<\u002Fem><\u002Fdiv>\n            <p class=\"tl-desc\">9 / 9 composants documentés sur le Cabinet Solaris. Lecture sereine.<\u002Fp>\n            <div class=\"tl-action t-optimal\">Documentation 100 % · Cabinet Solaris<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div class=\"graphe-side\">\n        <div class=\"gs-tag\">21 · A — Timeline<\u002Fdiv>\n        <div class=\"gs-name\">Chroniques <em>du chantier<\u002Fem><\u002Fdiv>\n        <p class=\"gs-desc\">L'axe temporel du jumeau, lu comme un journal de bord. Chaque événement = un marqueur sur la verticale d'argent, qualifié par sa <em>patine d'état<\u002Fem> et sa <em>nature<\u002Fem> (chantier ouvert, audit clos, dégradation, ajout d'info).<\u002Fp>\n        <div class=\"gs-rules\">\n          <div class=\"gs-rule\"><div class=\"k\">Axe<\u002Fdiv><div class=\"v\">Verticale en <strong>filament d'argent<\u002Fstrong>, du maintenant (haut) au passé (bas). Le temps coule comme une chronique éditoriale, pas comme un graphique.<\u002Fdiv><\u002Fdiv>\n          <div class=\"gs-rule\"><div class=\"k\">Marqueur<\u002Fdiv><div class=\"v\">Cercle creux en patine d'état. <strong>Halo coloré<\u002Fstrong> proportionnel à la gravité — le critique pulse en terre brûlée.<\u002Fdiv><\u002Fdiv>\n          <div class=\"gs-rule\"><div class=\"k\">Titre<\u002Fdiv><div class=\"v\">Onest medium pour l'objet concerné + <strong>Lora regular pour le verbe<\u002Fstrong> (« signé critique », « audit clos »). C'est là que la serif parle.<\u002Fdiv><\u002Fdiv>\n          <div class=\"gs-rule\"><div class=\"k\">Action<\u002Fdiv><div class=\"v\">Mono uppercase en patine d'état. Précisé par l'émetteur (DPO, Provider, Cabinet, Lugia…).<\u002Fdiv><\u002Fdiv>\n          <div class=\"gs-rule\"><div class=\"k\">Topbar<\u002Fdiv><div class=\"v\">Sélection de <strong>lentille<\u002Fstrong> + <strong>période<\u002Fstrong> (7j par défaut). Le compteur donne le volume.<\u002Fdiv><\u002Fdiv>\n          <div class=\"gs-rule\"><div class=\"k\">Zoom<\u002Fdiv><div class=\"v\">Clic sur un événement → Z4 (fiche de l'objet concerné, ouverte sur l'onglet historique).<\u002Fdiv><\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ============== APPENDICE ============== -->\n<section class=\"footnote\" style=\"border-top:none;\">\n  <div class=\"wrap\">\n    <div class=\"footnote-grid\">\n      <p class=\"eyebrow\">22 · Suite<\u002Fp>\n      <div>\n        <h4>Ce qui n'est <em>pas encore<\u002Fem> traité ici<\u002Fh4>\n        <p>Cette v1 fixe la grammaire — surfaces, encre, argent, patine, typographie, traitements graphiques. Reste à creuser, dans cet ordre :<\u002Fp>\n        <div class=\"next\">\n          <div class=\"next-item\"><div class=\"n\">A<\u002Fdiv><div><strong>Formulaires de modélisation.<\u002Fstrong> Comment on saisit un objet, un lien, une contrainte sans casser le calme. Champ, label, validation, erreur.<\u002Fdiv><\u002Fdiv>\n          <div class=\"next-item\"><div class=\"n\">B<\u002Fdiv><div><strong>Timeline &amp; historique.<\u002Fstrong> L'axe temporel des chantiers — comment on visualise un état qui s'améliore ou se dégrade dans le temps.<\u002Fdiv><\u002Fdiv>\n          <div class=\"next-item\"><div class=\"n\">C<\u002Fdiv><div><strong>Vue territoire (Z0).<\u002Fstrong> Le niveau de zoom le plus large — plusieurs cabinets, plusieurs systèmes en parallèle. Carto vs grille ?<\u002Fdiv><\u002Fdiv>\n          <div class=\"next-item\"><div class=\"n\">D<\u002Fdiv><div><strong>Iconographie.<\u002Fstrong> La marque n'utilise pas d'icônes. Le produit en a besoin. À cadrer : trait seul, monochrome, taille fixe.<\u002Fdiv><\u002Fdiv>\n          <div class=\"next-item\"><div class=\"n\">E<\u002Fdiv><div><strong>Composants d'interaction.<\u002Fstrong> Boutons, champs, switches, dropdowns — la grammaire des contrôles dans les deux scènes (jour et instrument).<\u002Fdiv><\u002Fdiv>\n          <div class=\"next-item\"><div class=\"n\">F<\u002Fdiv><div><strong>Densité &amp; responsive.<\u002Fstrong> Comportement sur écran de salle de revue (1920×1080) versus poste individuel (1440×900). La pyramide est l'enjeu principal.<\u002Fdiv><\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n\n\n<\u002Fbody><\u002Fhtml>"

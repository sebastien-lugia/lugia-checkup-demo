var(--ink-on-navy-400);\n  }\n  .rt-grid {\n    display: grid; grid-template-columns: repeat(3, 1fr);\n    background: var(--line-navy);\n    gap: 1px;\n  }\n  .rt-step {\n    background: var(--navy);\n    padding: 26px 24px 26px;\n    display: flex; flex-direction: column;\n    gap: 16px;\n  }\n  .rt-step-head {\n    display: flex; align-items: baseline; justify-content: space-between;\n    gap: 12px;\n  }\n  .rt-step-tag {\n    font-family: var(--mono); font-size: 10px;\n    letter-spacing: 0.18em; text-transform: uppercase;\n    color: var(--ink-on-navy-400);\n  }\n  .rt-step-pct {\n    font-family: var(--serif); font-weight: 500;\n    font-size: 28px; letter-spacing: -0.02em;\n    color: var(--ink-on-navy); line-height: 1;\n  }\n  .rt-step-pct small {\n    font-family: var(--mono); font-size: 11px;\n    color: var(--ink-on-navy-400);\n    margin-left: 3px;\n  }\n  .rt-step-action {\n    font-family: var(--sans); font-size: 12.5px;\n    color: var(--ink-on-navy-600);\n    line-height: 1.5;\n    padding-top: 12px;\n    border-top: 1px solid var(--line-navy);\n  }\n  .rt-step-action b { color: var(--ink-on-navy); font-weight: 500; }\n  .rt-step-scene {\n    position: relative;\n    height: 260px;\n    background: rgba(244,239,229,0.02);\n    border: 1px solid var(--line-navy);\n    overflow: hidden;\n  }\n  .rt-step-scene svg {\n    position: absolute; inset: 0;\n    width: 100%; height: 100%;\n  }\n  /* bulles selon état de découverte */\n  .rt-node { position: absolute; transform: translate(-50%, -50%); display: flex; align-items: center; justify-content: center; }\n  .rt-node.confirmed {\n    width: 44px; height: 44px;\n    border-radius: 50%;\n    border: 1.2px solid rgba(255,255,255,0.30);\n    backdrop-filter: blur(8px) saturate(140%);\n    -webkit-backdrop-filter: blur(8px) saturate(140%);\n    box-shadow:\n      0 6px 14px rgba(0,0,0,0.28),\n      inset 0 1.5px 1px rgba(255,255,255,0.38),\n      inset 0 -1px 1px rgba(255,255,255,0.08);\n  }\n  .rt-node.confirmed.s-fonctionnel { border-color: rgba(201,201,204,0.55); }\n  .rt-node.confirmed.s-vigilance   { border-color: rgba(196,184,112,0.65); }\n  .rt-node.confirmed.s-risque      { border-color: rgba(196,160,85,0.72); }\n  .rt-node.confirmed.s-critique    { border-color: rgba(196,104,80,0.78); border-width: 1.4px; }\n  .rt-node.inferred {\n    width: 36px; height: 36px;\n    border-radius: 50%;\n    border: 1px dashed rgba(196,184,112,0.55);\n  }\n  .rt-node.unknown {\n    width: 6px; height: 6px;\n    border-radius: 50%;\n    background: rgba(244,239,229,0.20);\n  }\n  .rt-node-label {\n    position: absolute;\n    top: calc(100% + 4px);\n    left: 50%;\n    transform: translateX(-50%);\n    white-space: nowrap;\n    font-family: var(--sans); font-size: 10px; font-weight: 500;\n    color: var(--ink-on-navy);\n    text-shadow: 0 1px 3px rgba(0,0,0,0.5);\n  }\n  .rt-node.inferred .rt-node-label { color: var(--ink-on-navy-400); }\n  .rt-node.unknown .rt-node-label { display: none; }\n\n  /* ============== MÉCANISME ACTION → RÉVÉLATION ============== */\n  .mech-frame {\n    margin-top: 40px;\n    background: var(--navy);\n    border: 1px solid var(--line-navy-mid);\n    color: var(--ink-on-navy);\n    padding: 32px 30px;\n  }\n  .mech-head {\n    display: flex; align-items: baseline; justify-content: space-between;\n    padding-bottom: 18px;\n    border-bottom: 1px solid var(--line-navy);\n    margin-bottom: 4px;\n  }\n  .mech-head-name {\n    font-family: var(--sans); font-weight: 500;\n    font-size: 18px; letter-spacing: -0.015em;\n  }\n  .mech-head-name em { font-family: var(--serif); font-weight: 400; color: var(--ink-on-navy-600); }\n  .mech-head-meta {\n    font-family: var(--mono); font-size: 10px;\n    letter-spacing: 0.14em; text-transform: uppercase;\n    color: var(--ink-on-navy-400);\n  }\n  .mech-table {\n    display: grid;\n    grid-template-columns: 60px 1.4fr 28px 1.6fr 80px;\n    gap: 0;\n  }\n  .mech-table > div {\n    padding: 18px 12px;\n    border-bottom: 1px solid var(--line-navy);\n    display: flex; align-items: center;\n  }\n  .mech-table > div:nth-child(5n+5) { justify-content: flex-end; }\n  .mech-table .mh {\n    padding-top: 8px; padding-bottom: 10px;\n    font-family: var(--mono); font-size: 10px;\n    letter-spacing: 0.16em; text-transform: uppercase;\n    color: var(--ink-on-navy-400);\n  }\n  .mech-num {\n    font-family: var(--mono); font-size: 11px;\n    letter-spacing: 0.14em;\n    color: var(--ink-on-navy-400);\n  }\n  .mech-action {\n    font-family: var(--sans); font-size: 13.5px; font-weight: 500;\n    color: var(--ink-on-navy);\n    line-height: 1.4;\n  }\n  .mech-action em { font-family: var(--serif); font-weight: 400; color: var(--ink-on-navy-600); }\n  .mech-arrow {\n    color: var(--argent);\n    font-family: var(--mono); font-size: 16px;\n    justify-content: center !important;\n  }\n  .mech-reveals {\n    display: flex; flex-wrap: wrap; gap: 6px;\n    font-family: var(--mono); font-size: 10.5px;\n    line-height: 1;\n  }\n  .mech-rev {\n    display: inline-flex; align-items: center; gap: 6px;\n    padding: 4px 8px;\n    background: rgba(244,239,229,0.04);\n    border: 1px solid rgba(244,239,229,0.18);\n    color: var(--ink-on-navy);\n    letter-spacing: 0.04em;\n  }\n  .mech-rev::before {\n    content: \"\"; width: 5px; height: 5px;\n  }\n  .mech-rev.inferred { border-color: rgba(196,184,112,0.45); border-style: dashed; color: var(--etat-vigilance-night); }\n  .mech-rev.inferred::before { background: rgba(196,184,112,0.65); }\n  .mech-rev.confirmed::before { background: rgba(244,239,229,0.55); }\n  .mech-gain {\n    font-family: var(--mono); font-size: 11px; font-weight: 500;\n    color: var(--ink-on-navy);\n    letter-spacing: 0.04em;\n  }\n  .mech-gain .pos { color: var(--argent-l); }\n\n  /* small responsive concession */\n  @media (max-width: 1100px) {\n    h1.hero-h { font-size: 88px; }\n    .title { font-size: 48px; }\n    .echelle { grid-template-columns: 1fr 1fr 1fr; }\n    .echelle-rules { grid-template-columns: 1fr 1fr; }\n    .lens-grid { grid-template-columns: 1fr 1fr; }\n    .axioms, .typo-grid, .surf-grid, .argent-row, .graphes-row, .arb-grid { grid-template-columns: 1fr; }\n    .ref-body { grid-template-columns: 1fr; }\n    .ref-side { border-top: 1px solid var(--line-navy); }\n    .poly-row { grid-template-columns: repeat(3, 1fr); }\n    .verre-row { grid-template-columns: 1fr; }\n  }\n<\u002Fstyle>\n<\u002Fhead>\n<body>\n\n\n\n<!-- ============== TOPNAV ============== -->\n<nav class=\"topnav\">\n  <div class=\"topnav-inner\">\n    <div class=\"brand\">\n      <img src=\"89f5258d-2dc2-4736-a4f8-53b6d0714c76\" alt=\"Lugia\">\n      <span>Lugia — Charte Produit · v2<\u002Fspan>\n    <\u002Fdiv>\n    <ul>\n      <li><a href=\"#manifeste\">Manifeste<\u002Fa><\u002Fli>\n      <li><a href=\"#axiomes\">Axiomes<\u002Fa><\u002Fli>\n      <li><a href=\"#surfaces\">Surfaces<\u002Fa><\u002Fli>\n      <li><a href=\"#etats\">États<\u002Fa><\u002Fli>\n      <li><a href=\"#polychrome\">Polychrome<\u002Fa><\u002Fli>\n      <li><a href=\"#verre\">Verre<\u002Fa><\u002Fli>\n      <li><a href=\"#graphes\">Graphes<\u002Fa><\u002Fli>\n      <li><a href=\"#lentilles\">Lentilles<\u002Fa><\u002Fli>\n      <li><a href=\"#ref\">Référence<\u002Fa><\u002Fli>\n    <\u002Ful>\n    <span class=\"version\">v2 · polychrome &amp; verre<\u002Fspan>\n  <\u002Fdiv>\n<\u002Fnav>\n\n<!-- ============== HERO ============== -->\n<section class=\"hero\" id=\"manifeste\">\n  <div class=\"hero-pre\">\n    <span class=\"dot\"><\u002Fspan>\n    <span>Charte Produit — Jumeau Numérique<\u002Fspan>\n    <span style=\"color:var(--ink-200);\">·<\u002Fspan>\n    <span>Application des principes de marque au logiciel<\u002Fspan>\n  <\u002Fdiv>\n  <h1 class=\"hero-h\">L'instrument<br><em>du calme.<\u002Fem><\u002Fh1>\n  <div class=\"hero-tag\">\n    <p class=\"hero-tag-text\">\n      La marque promet de la <em>sérénité<\u002Fem>. Le produit doit la tenir\n      même quand il révèle des problèmes. Cette charte décrit\n      comment <em>traduire le silence éditorial de Lugia<\u002Fem> en\n      un instrument de pilotage dense, précis, et fidèle.\n    <\u002Fp>\n    <div class=\"hero-spec\">\n      <div>Hérite de<strong>Brand Master v3<\u002Fstrong><\u002Fdiv>\n      <div>Spécifie<strong>graphes, états, fiche, lentilles<\u002Fstrong><\u002Fdiv>\n      <div>Statut<strong>v2 — polychrome &amp; verre<\u002Fstrong><\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ============== ARBITRAGE ============== -->\n<section class=\"arbitrage\" id=\"arbitrage\" style=\"padding-top:100px;padding-bottom:100px;border-top:none;\">\n  <div class=\"wrap\">\n    <div class=\"head\">\n      <p class=\"eyebrow\">00 · Note de cadrage<\u002Fp>\n      <div>\n        <h2 class=\"title\">Quatre <em>arbitrages<\u002Fem> structurants<\u002Fh2>\n        <p class=\"lead\">Avant de poser des tokens, on tranche les tensions. Chaque ligne ci-dessous est une décision défendable autrement — donc une décision à valider.<\u002Fp>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <div class=\"arb-grid\">\n      <div><\u002Fdiv>\n      <div class=\"arb-col\">\n\n        <h3>1. Fond <em>hybride<\u002Fem><\u002Fh3>\n        <p>Le produit garde l'<strong>ivoire éditorial<\u002Fstrong> pour les surfaces de lecture, de fiche et de travail. Il passe au <strong>navy<\u002Fstrong> dès qu'il s'agit de <em>visualiser un système<\u002Fem> (graphes, pyramides, cartes). Le navy devient l'<strong>écran de l'instrument<\u002Fstrong>, pas un thème global.<\u002Fp>\n\n        <div class=\"arb-tension\">\n          <div class=\"pole dimmed\"><strong>Tout clair<\u002Fstrong>Risque : graphes denses peu lisibles, signaux noyés.<\u002Fdiv>\n          <div class=\"sep\">↔<\u002Fdiv>\n          <div class=\"pole dimmed\"><strong>Tout sombre<\u002Fstrong>Risque : on perd l'éditorial, on devient générique cockpit.<\u002Fdiv>\n        <\u002Fdiv>\n\n        <h3 style=\"margin-top:40px;\">2. Patine <em>plutôt que feux tricolores<\u002Fem><\u002Fh3>\n        <p>Pas de vert pomme ni de rouge vermillon. Une <strong>chaîne tonale qui dérive du signal-or<\u002Fstrong> existant de la marque vers la terre brûlée. Six paliers, dont <em>l'optimal qui est silencieux<\u002Fem> — pas de couleur, juste de l'encre.<\u002Fp>\n\n        <div class=\"arb-tension\">\n          <div class=\"pole dimmed\"><strong>Feux tricolores<\u002Fstrong>Lisible mais générique. Trahit la marque.<\u002Fdiv>\n          <div class=\"sep\">↔<\u002Fdiv>\n          <div class=\"pole dimmed\"><strong>Monochrome strict<\u002Fstrong>Élégant mais aveugle aux gradations de risque.<\u002Fdiv>\n        <\u002Fdiv>\n\n      <\u002Fdiv>\n      <div class=\"arb-col\">\n\n        <h3>3. <em>Argent<\u002Fem> pour la connexion<\u002Fh3>\n        <p>Le shimmer argent — signature de la marque — devient dans le produit le <strong>matériau des liens<\u002Fstrong>. Les filaments entre objets, l'état <em>sélectionné<\u002Fem>, le focus actif. Tout ce qui dit <em>« cette entité est reliée à »<\u002Fem> ou <em>« vous êtes ici »<\u002Fem>.<\u002Fp>\n\n        <div class=\"arb-tension\">\n          <div class=\"pole dimmed\"><strong>Argent décoratif uniquement<\u002Fstrong>Gâchis : on perd un signifiant fort.<\u002Fdiv>\n          <div class=\"sep\">↔<\u002Fdiv>\n          <div class=\"pole dimmed\"><strong>Argent partout<\u002Fstrong>Devient bruit, dilue la marque.<\u002Fdiv>\n        <\u002Fdiv>\n\n        <h3 style=\"margin-top:40px;\">4. Lora <em>pour le chiffre<\u002Fem><\u002Fh3>\n        <p>La serif Lora (regular, jamais italique) se réserve à <strong>trois rôles produit<\u002Fstrong> : KPI chiffrés (un quotidien financier), titres de fiches objets, et observations qualitatives / verbatim utilisateur. <em>Pas dans les libellés répétés, pas dans la nav, pas dans les tableaux.<\u002Fem><\u002Fp>\n\n        <div class=\"arb-tension\">\n          <div class=\"pole dimmed\"><strong>Lora partout<\u002Fstrong>Devient illisible en dense.<\u002Fdiv>\n          <div class=\"sep\">↔<\u002Fdiv>\n          <div class=\"pole dimmed\"><strong>Pas de Lora<\u002Fstrong>On perd la couture marque/produit.<\u002Fdiv>\n        <\u002Fdiv>\n\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ============== AXIOMES ============== -->\n<section id=\"axiomes\" style=\"padding:120px 0;\">\n  <div class=\"wrap\">\n    <div class=\"head\">\n      <p class=\"eyebrow\">01 · Principes<\u002Fp>\n      <div>\n        <h2 class=\"title\">Trois <em>axiomes<\u002Fem> produit<\u002Fh2>\n        <p class=\"lead\">Distincts des trois axiomes de marque. Ils répondent à la question : <em>« qu'est-ce que cet outil refuse de faire ? »<\u002Fem><\u002Fp>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <div class=\"axioms\">\n    <div class=\"axiom\">\n      <div class=\"num\">A1<\u002Fdiv>\n      <h3>Le calme est <em>l'état par défaut.<\u002Fem><\u002Fh3>\n      <p>L'optimal n'a pas de couleur. Pas de badge vert, pas de coche, pas de « ✓ tout va bien ». L'absence de signal <em>est<\u002Fem> le signal. Un jumeau qui crie en permanence devient illisible.<\u002Fp>\n      <div class=\"tail\">Corollaire — Pas plus de 3 alertes visibles simultanément par écran.<\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"axiom\">\n      <div class=\"num\">A2<\u002Fdiv>\n      <h3>L'argent <em>est la connexion.<\u002Fem><\u002Fh3>\n      <p>La couleur dit l'<em>état<\u002Fem>. L'argent dit le <em>lien<\u002Fem>. Tout filament entre objets, toute sélection, tout focus actif passe par l'argent. Jamais d'argent comme couleur d'état, jamais de couleur d'état sur un trait de liaison.<\u002Fp>\n      <div class=\"tail\">Corollaire — Les graphes sont monochromes en argent ; seuls les nœuds portent l'état.<\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"axiom\">\n      <div class=\"num\">A3<\u002Fdiv>\n      <h3>La gravité <em>par la patine.<\u002Fem><\u002Fh3>\n      <p>De l'optimal au critique, on parcourt une chaîne tonale unique — du navy au terre-brûlée en passant par l'or. Pas de saut de teinte, pas de famille décorrelée. La gravité se lit comme un <em>vieillissement<\u002Fem>, pas comme un changement de famille.<\u002Fp>\n      <div class=\"tail\">Corollaire — Une seule échelle pour tous les modules : santé, conformité, charge.<\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ============== SURFACES ============== -->\n<section id=\"surfaces\">\n  <div class=\"wrap\">\n    <div class=\"head\">\n      <p class=\"eyebrow\">02 · Surfaces<\u002Fp>\n      <div>\n        <h2 class=\"title\">Deux <em>scènes.<\u002Fem><\u002Fh2>\n        <p class=\"lead\">Le produit alterne entre une scène <em>jour<\u002Fem> (lecture, fiche, tableau, formulaire) et une scène <em>instrument<\u002Fem> (graphe, modélisation, cartographie). Pas d'autres surfaces de premier niveau.<\u002Fp>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <div class=\"surf-grid\">\n      <div class=\"surf-card jour\">\n        <div class=\"surf-tag\">02 · A — Scène <strong style=\"color:var(--ink);font-weight:500;\">jour<\u002Fstrong><\u002Fdiv>\n        <div class=\"surf-name\">Ivoire éditorial<\u002Fdiv>\n        <p class=\"surf-desc\">Surface de travail. Lecture longue, édition de fiches, navigation hiérarchique, tableaux. La densité respire. Les états apparaissent avec retenue.<\u002Fp>\n        <div class=\"surf-stack\">\n          <div class=\"surf-row\"><span class=\"chip\" style=\"background:var(--ivory);\"><\u002Fspan><span><strong>Ivory<\u002Fstrong> — surface principale<\u002Fspan><span>#F4EFE5<\u002Fspan><\u002Fdiv>\n          <div class=\"surf-row\"><span class=\"chip\" style=\"background:var(--ivory-2);\"><\u002Fspan><span><strong>Ivory-2<\u002Fstrong> — surface sélectionnée<\u002Fspan><span>#F8F4EB<\u002Fspan><\u002Fdiv>\n          <div class=\"surf-row\"><span class=\"chip\" style=\"background:var(--paper);\"><\u002Fspan><span><strong>Paper<\u002Fstrong> — fond de cadre<\u002Fspan><span>#FBFAF6<\u002Fspan><\u002Fdiv>\n          <div class=\"surf-row\"><span class=\"chip\" style=\"background:var(--paper-2);\"><\u002Fspan><span><strong>Paper-2<\u002Fstrong> — séparateur dense<\u002Fspan><span>#ECE6D8<\u002Fspan><\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"surf-card instrument\">\n        <div class=\"surf-tag\">02 · B — Scène <strong style=\"color:var(--ink-on-navy);font-weight:500;\">instrument<\u002Fstrong><\u002Fdiv>\n        <div class=\"surf-name\">Navy de visualisation<\u002Fdiv>\n        <p class=\"surf-desc\">Surface de système. Graphes, pyramide WSF, cartographie d'objets, vue 3D. La couleur respire ; les filaments d'argent et les nœuds patinés y prennent leur juste poids.<\u002Fp>\n        <div class=\"surf-stack\">\n          <div class=\"surf-row\"><span class=\"chip\" style=\"background:var(--navy);\"><\u002Fspan><span><strong>Navy<\u002Fstrong> — scène de visualisation<\u002Fspan><span>#1A2333<\u002Fspan><\u002Fdiv>\n          <div class=\"surf-row\"><span class=\"chip\" style=\"background:var(--navy-2);\"><\u002Fspan><span><strong>Navy-2<\u002Fstrong> — panneau latéral<\u002Fspan><span>#232B41<\u002Fspan><\u002Fdiv>\n          <div class=\"surf-row\"><span class=\"chip\" style=\"background:var(--navy-3);\"><\u002Fspan><span><strong>Navy-3<\u002Fstrong> — surface élevée<\u002Fspan><span>#2D364F<\u002Fspan><\u002Fdiv>\n          <div class=\"surf-row\"><span class=\"chip\" style=\"border:1px solid var(--line-navy-mid);background:transparent;\"><\u002Fspan><span><strong>Ligne<\u002Fstrong> — séparateur sur navy<\u002Fspan><span>rgba ivory 18%<\u002Fspan><\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- ARGENT — FILAMENTS -->\n    <div class=\"head\" style=\"margin-top:96px;\">\n      <p class=\"eyebrow\">03 · Argent<\u002Fp>\n      <div>\n        <h2 class=\"title\">Le matériau <em>du lien.<\u002Fem><\u002Fh2>\n        <p class=\"lead\">Trois rôles, jamais plus. Chaque emploi de l'argent répond à <em>« qu'est-ce qui est relié, sélectionné ou focalisé ici ? »<\u002Fem><\u002Fp>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <div class=\"argent-row\">\n\n      <div class=\"argent-card\">\n        <div class=\"ar-tag\">03 · A — Filament<\u002Fdiv>\n        <div class=\"ar-name\">Lien entre objets<\u002Fdiv>\n        <p class=\"ar-desc\">Les arêtes des graphes, les lignes entre composants WSF, les liens de dépendance. Toujours un trait fin (0.5–1px) en argent dégradé. Jamais coloré.<\u002Fp>\n        <div class=\"argent-demo filament-demo\">\n          <svg viewBox=\"0 0 280 80\">\n            <defs>\n              <linearGradient id=\"argentGrad\" x1=\"0\" x2=\"1\">\n                <stop offset=\"0\" stop-color=\"#8E8E91\" stop-opacity=\"0\"><\u002Fstop>\n                <stop offset=\"0.2\" stop-color=\"#B5B5B8\" stop-opacity=\"0.7\"><\u002Fstop>\n                <stop offset=\"0.5\" stop-color=\"#ECECEE\"><\u002Fstop>\n                <stop offset=\"0.8\" stop-color=\"#B5B5B8\" stop-opacity=\"0.7\"><\u002Fstop>\n                <stop offset=\"1\" stop-color=\"#8E8E91\" stop-opacity=\"0\"><\u002Fstop>\n              <\u002FlinearGradient>\n            <\u002Fdefs>\n            <circle cx=\"20\" cy=\"40\" r=\"8\" fill=\"none\" stroke=\"#1A2333\" stroke-width=\"1\"><\u002Fcircle>\n            <circle cx=\"140\" cy=\"22\" r=\"8\" fill=\"none\" stroke=\"#1A2333\" stroke-width=\"1\"><\u002Fcircle>\n            <circle cx=\"140\" cy=\"58\" r=\"8\" fill=\"none\" stroke=\"#1A2333\" stroke-width=\"1\"><\u002Fcircle>\n            <circle cx=\"260\" cy=\"40\" r=\"8\" fill=\"none\" stroke=\"#1A2333\" stroke-width=\"1\"><\u002Fcircle>\n            <path d=\"M28 38 C 70 38, 100 22, 132 22\" class=\"filament shimmer\"><\u002Fpath>\n            <path d=\"M28 42 C 70 42, 100 58, 132 58\" class=\"filament shimmer\"><\u002Fpath>\n            <path d=\"M148 22 C 180 22, 220 40, 252 40\" class=\"filament shimmer\"><\u002Fpath>\n            <path d=\"M148 58 C 180 58, 220 40, 252 40\" class=\"filament shimmer\"><\u002Fpath>\n          <\u002Fsvg>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div class=\"argent-card\">\n        <div class=\"ar-tag\">03 · B — Focus<\u002Fdiv>\n        <div class=\"ar-name\">Élément actif<\u002Fdiv>\n        <p class=\"ar-desc\">Hover lourd, élément focalisé clavier, vignette en exploration. Bordure 1px en argent + halo 2px en argent clair. <em>Pas de fond coloré.<\u002Fem><\u002Fp>\n        <div class=\"argent-demo focus-demo\">\n          <div class=\"focus-tile\"><\u002Fdiv>\n          <div class=\"focus-tile active\"><\u002Fdiv>\n          <div class=\"focus-tile\"><\u002Fdiv>\n          <div class=\"focus-tile\"><\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div class=\"argent-card\">\n        <div class=\"ar-tag\">03 · C — Sélection<\u002Fdiv>\n        <div class=\"ar-name\">Élément sélectionné<\u002Fdiv>\n        <p class=\"ar-desc\">Item de liste choisi, ligne sélectionnée dans un tableau. Surface ivory-2 + bordure argent-dark + petit filet 2px gauche en argent.<\u002Fp>\n        <div class=\"argent-demo selection-demo\">\n          <div class=\"sel-item\">Processus · Consultation<span class=\"meta\">P-012<\u002Fspan><\u002Fdiv>\n          <div class=\"sel-item active\">Participants · Médecin<span class=\"meta\">P-004<\u002Fspan><\u002Fdiv>\n          <div class=\"sel-item\">Information · DPI<span class=\"meta\">P-021<\u002Fspan><\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ============== ÉTATS ============== -->\n<section id=\"etats\">\n  <div class=\"wrap\">\n    <div class=\"head\">\n      <p class=\"eyebrow\">04 · États<\u002Fp>\n      <div>\n        <h2 class=\"title\">L'échelle <em>de patine.<\u002Fem><\u002Fh2>\n        <p class=\"lead\">Six paliers, une chaîne tonale unique. L'optimal est silencieux. Le critique a la chaleur d'une terre brûlée, jamais l'urgence d'un vermillon. <em>Aucune autre échelle ne coexiste<\u002Fem> dans le produit — santé, conformité, charge, maturité partagent la même grammaire.<\u002Fp>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- jour -->\n    <div class=\"echelle\">\n      <div class=\"et-cell optimal\">\n        <div class=\"et-num\">00<\u002Fdiv>\n        <div class=\"et-name\">Optimal<\u002Fdiv>\n        <div class=\"et-badge\">Silence<\u002Fdiv>\n        <p class=\"et-desc\">L'état par défaut. <em>Pas de badge dans l'interface<\u002Fem>. Le calme se traduit par l'absence de signal.<\u002Fp>\n        <div class=\"et-codes\"><b>navy<\u002Fb> #1A2333<br>bord 0 · fond 0<\u002Fdiv>\n        <div class=\"et-arc\"><\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"et-cell fonctionnel\">\n        <div class=\"et-num\">01<\u002Fdiv>\n        <div class=\"et-name\">Fonctionnel<\u002Fdiv>\n        <div class=\"et-badge\">Documenté<\u002Fdiv>\n        <p class=\"et-desc\">L'objet est connu, modélisé, sans alerte. Marqué en argent quand un affichage explicite est requis.<\u002Fp>\n        <div class=\"et-codes\"><b>argent-d<\u002Fb> #8E8E91<br>bord 60% · fond 16%<\u002Fdiv>\n        <div class=\"et-arc\"><\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"et-cell vigilance\">\n        <div class=\"et-num\">02<\u002Fdiv>\n        <div class=\"et-name\">Vigilance<\u002Fdiv>\n        <div class=\"et-badge\">À surveiller<\u002Fdiv>\n        <p class=\"et-desc\">Pas de problème, mais une dérive possible. Un seuil approché, une donnée vieillissante.<\u002Fp>\n        <div class=\"et-codes\"><b>patine sage<\u002Fb> #6B6630<br>bord 36% · fond 10%<\u002Fdiv>\n        <div class=\"et-arc\"><\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"et-cell risque\">\n        <div class=\"et-num\">03<\u002Fdiv>\n        <div class=\"et-name\">Risque<\u002Fdiv>\n        <div class=\"et-badge\">Chantier<\u002Fdiv>\n        <p class=\"et-desc\">Un problème identifié, non bloquant. C'est le palier <em>signal-or<\u002Fem> de la marque, étendu au produit.<\u002Fp>\n        <div class=\"et-codes\"><b>signal-or<\u002Fb> #7A6030<br>bord 40% · fond 12%<\u002Fdiv>\n        <div class=\"et-arc\"><\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"et-cell critique\">\n        <div class=\"et-num\">04<\u002Fdiv>\n        <div class=\"et-name\">Critique<\u002Fdiv>\n        <div class=\"et-badge\">À traiter<\u002Fdiv>\n        <p class=\"et-desc\">Bloquant, non-conforme, ou rupture probable. Chaleur de terre brûlée — dense mais jamais hystérique.<\u002Fp>\n        <div class=\"et-codes\"><b>terre brûlée<\u002Fb> #7A3320<br>bord 48% · fond 14%<\u002Fdiv>\n        <div class=\"et-arc\"><\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"et-cell nondoc\">\n        <div class=\"et-num\">05<\u002Fdiv>\n        <div class=\"et-name\">Non-documenté<\u002Fdiv>\n        <div class=\"et-badge\">À renseigner<\u002Fdiv>\n        <p class=\"et-desc\">L'objet existe dans le modèle mais l'information manque. Hachuré en argent — visible, mais ni rassurant ni alarmant.<\u002Fp>\n        <div class=\"et-codes\"><b>argent rayé<\u002Fb> #B5B5B8<br>bord 50% · fond hachuré<\u002Fdiv>\n        <div class=\"et-arc\"><\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- night -->\n    <p class=\"eyebrow\" style=\"margin-top:40px;margin-bottom:12px;\">Même échelle, sur scène instrument<\u002Fp>\n    <div class=\"echelle instrument\">\n      <div class=\"et-cell optimal\">\n        <div class=\"et-num\">00<\u002Fdiv>\n        <div class=\"et-name\">Optimal<\u002Fdiv>\n        <div class=\"et-badge\">Silence<\u002Fdiv>\n        <p class=\"et-desc\">Nœud en ivoire pur, sans badge, sans halo.<\u002Fp>\n        <div class=\"et-codes\"><b>ivoire<\u002Fb> #F4EFE5<\u002Fdiv>\n        <div class=\"et-arc\"><\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"et-cell fonctionnel\">\n        <div class=\"et-num\">01<\u002Fdiv>\n        <div class=\"et-name\">Fonctionnel<\u002Fdiv>\n        <div class=\"et-badge\">Documenté<\u002Fdiv>\n        <p class=\"et-desc\">Argent clair, pas de surface colorée.<\u002Fp>\n        <div class=\"et-codes\"><b>argent-l<\u002Fb> #C9C9CC<\u002Fdiv>\n        <div class=\"et-arc\"><\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"et-cell vigilance\">\n        <div class=\"et-num\">02<\u002Fdiv>\n        <div class=\"et-name\">Vigilance<\u002Fdiv>\n        <div class=\"et-badge\">À surveiller<\u002Fdiv>\n        <p class=\"et-desc\">Sage clair sur navy.<\u002Fp>\n        <div class=\"et-codes\"><b>sage night<\u002Fb> #C4B870<\u002Fdiv>\n        <div class=\"et-arc\"><\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"et-cell risque\">\n        <div class=\"et-num\">03<\u002Fdiv>\n        <div class=\"et-name\">Risque<\u002Fdiv>\n        <div class=\"et-badge\">Chantier<\u002Fdiv>\n        <p class=\"et-desc\">Signal-or nuit (#C4A055) — c'est la teinte du signal sur navy de la marque.<\u002Fp>\n        <div class=\"et-codes\"><b>signal-night<\u002Fb> #C4A055<\u002Fdiv>\n        <div class=\"et-arc\"><\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"et-cell critique\">\n        <div class=\"et-num\">04<\u002Fdiv>\n        <div class=\"et-name\">Critique<\u002Fdiv>\n        <div class=\"et-badge\">À traiter<\u002Fdiv>\n        <p class=\"et-desc\">Terracotta nuit, dense et chaude.<\u002Fp>\n        <div class=\"et-codes\"><b>terracotta<\u002Fb> #C46850<\u002Fdiv>\n        <div class=\"et-arc\"><\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"et-cell nondoc\">\n        <div class=\"et-num\">05<\u002Fdiv>\n        <div class=\"et-name\">Non-documenté<\u002Fdiv>\n        <div class=\"et-badge\">À renseigner<\u002Fdiv>\n        <p class=\"et-desc\">Ivoire atténuée à 35%, rayures argent.<\u002Fp>\n        <div class=\"et-codes\"><b>ivory-35<\u002Fb> rgba(244,239,229,0.35)<\u002Fdiv>\n        <div class=\"et-arc\"><\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- règles d'application -->\n    <div class=\"echelle-rules\">\n      <div class=\"echelle-rule\">\n        <div class=\"er-num\">RG-01<\u002Fdiv>\n        <div class=\"er-text\"><strong>Jamais d'aplat.<\u002Fstrong> Toujours bordure + fond translucide. Reprise de la règle marque pour le signal-or, étendue à toute la patine.<\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"echelle-rule\">\n        <div class=\"er-num\">RG-02<\u002Fdiv>\n        <div class=\"er-text\"><strong>Optimal = silence.<\u002Fstrong> Pas de badge \"OK\" affiché dans l'UI. Le manager doit pouvoir survoler une zone sans lire 40 vignettes vertes.<\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"echelle-rule\">\n        <div class=\"er-num\">RG-03<\u002Fdiv>\n        <div class=\"er-text\"><strong>Le dot précède le mot.<\u002Fstrong> Le badge dérive d'un pictogramme de 7px : la couleur seule porte l'information avant la lecture.<\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"echelle-rule\">\n        <div class=\"er-num\">RG-04<\u002Fdiv>\n        <div class=\"er-text\"><strong>Une seule échelle.<\u002Fstrong> Charge, coût et maturité ne créent pas de nouvelle palette : ils <em>réutilisent<\u002Fem> la même chaîne tonale, avec une légende lentille explicite.<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ============== POLYCHROME ============== -->\n<section id=\"polychrome\">\n  <div class=\"wrap\">\n    <div class=\"head\">\n      <p class=\"eyebrow\">05 · Polychrome<\u002Fp>\n      <div>\n        <h2 class=\"title\">La marque <em>est l'instrument.<\u002Fem><\u002Fh2>\n        <p class=\"lead\">Le pictogramme Lugia est un sommet de pyramide. Il coïncide exactement avec la métaphore du Work System Framework — un système qui culmine. <em>Le mark teinté est réservé à l'état global du système<\u002Fem> — jamais aux objets individuels. Pour les objets, la couleur du cercle ou du bloc suffit ; le mark se réserve aux indicateurs d'ensemble.<\u002Fp>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <p class=\"eyebrow\" style=\"margin-bottom:14px;\">Sur scène jour<\u002Fp>\n    <div class=\"poly-row\">\n      <div class=\"poly-card\">\n        <div class=\"poly-mark\"><span class=\"mark-state s-optimal\"><\u002Fspan><\u002Fdiv>\n        <div class=\"poly-meta\">\n          <div class=\"poly-tag\">00<\u002Fdiv>\n          <div class=\"poly-name\">Optimal<\u002Fdiv>\n          <div class=\"poly-hex\">#1A2333<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"poly-card\">\n        <div class=\"poly-mark\"><span class=\"mark-state s-fonctionnel\"><\u002Fspan><\u002Fdiv>\n        <div class=\"poly-meta\">\n          <div class=\"poly-tag\">01<\u002Fdiv>\n          <div class=\"poly-name\">Fonctionnel<\u002Fdiv>\n          <div class=\"poly-hex\">#8E8E91<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"poly-card\">\n        <div class=\"poly-mark\"><span class=\"mark-state s-vigilance\"><\u002Fspan><\u002Fdiv>\n        <div class=\"poly-meta\">\n          <div class=\"poly-tag\">02<\u002Fdiv>\n          <div class=\"poly-name\">Vigilance<\u002Fdiv>\n          <div class=\"poly-hex\">#6B6630<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"poly-card\">\n        <div class=\"poly-mark\"><span class=\"mark-state s-risque\"><\u002Fspan><\u002Fdiv>\n        <div class=\"poly-meta\">\n          <div class=\"poly-tag\">03<\u002Fdiv>\n          <div class=\"poly-name\">Risque<\u002Fdiv>\n          <div class=\"poly-hex\">#7A6030<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"poly-card\">\n        <div class=\"poly-mark\"><span class=\"mark-state s-critique\"><\u002Fspan><\u002Fdiv>\n        <div class=\"poly-meta\">\n          <div class=\"poly-tag\">04<\u002Fdiv>\n          <div class=\"poly-name\">Critique<\u002Fdiv>\n          <div class=\"poly-hex\">#7A3320<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"poly-card\">\n        <div class=\"poly-mark\"><span class=\"mark-state s-nondoc\"><\u002Fspan><\u002Fdiv>\n        <div class=\"poly-meta\">\n          <div class=\"poly-tag\">05<\u002Fdiv>\n          <div class=\"poly-name\">Non‑documenté<\u002Fdiv>\n          <div class=\"poly-hex\">#B5B5B8<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <p class=\"eyebrow\" style=\"margin-top:36px;margin-bottom:14px;\">Sur scène instrument<\u002Fp>\n    <div class=\"poly-row dark\">\n      <div class=\"poly-card\">\n        <div class=\"poly-mark\"><span class=\"mark-state s-optimal\"><\u002Fspan><\u002Fdiv>\n        <div class=\"poly-meta\">\n          <div class=\"poly-tag\">00<\u002Fdiv>\n          <div class=\"poly-name\">Optimal<\u002Fdiv>\n          <div class=\"poly-hex\">#F4EFE5<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"poly-card\">\n        <div class=\"poly-mark\"><span class=\"mark-state s-fonctionnel\"><\u002Fspan><\u002Fdiv>\n        <div class=\"poly-meta\">\n          <div class=\"poly-tag\">01<\u002Fdiv>\n          <div class=\"poly-name\">Fonctionnel<\u002Fdiv>\n          <div class=\"poly-hex\">#C9C9CC<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"poly-card\">\n        <div class=\"poly-mark\"><span class=\"mark-state s-vigilance\"><\u002Fspan><\u002Fdiv>\n        <div class=\"poly-meta\">\n          <div class=\"poly-tag\">02<\u002Fdiv>\n          <div class=\"poly-name\">Vigilance<\u002Fdiv>\n          <div class=\"poly-hex\">#C4B870<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"poly-card\">\n        <div class=\"poly-mark\"><span class=\"mark-state s-risque\"><\u002Fspan><\u002Fdiv>\n        <div class=\"poly-meta\">\n          <div class=\"poly-tag\">03<\u002Fdiv>\n          <div class=\"poly-name\">Risque<\u002Fdiv>\n          <div class=\"poly-hex\">#C4A055<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"poly-card\">\n        <div class=\"poly-mark\"><span class=\"mark-state s-critique\"><\u002Fspan><\u002Fdiv>\n        <div class=\"poly-meta\">\n          <div class=\"poly-tag\">04<\u002Fdiv>\n          <div class=\"poly-name\">Critique<\u002Fdiv>\n          <div class=\"poly-hex\">#C46850<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"poly-card\">\n        <div class=\"poly-mark\"><span class=\"mark-state s-nondoc\"><\u002Fspan><\u002Fdiv>\n        <div class=\"poly-meta\">\n          <div class=\"poly-tag\">05<\u002Fdiv>\n          <div class=\"poly-name\">Non‑documenté<\u002Fdiv>\n          <div class=\"poly-hex\">ivory 35 %<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <div class=\"echelle-rules\" style=\"margin-top:32px;\">\n      <div class=\"echelle-rule\">\n        <div class=\"er-num\">RG-05<\u002Fdiv>\n        <div class=\"er-text\"><strong>Le mark est réservé à l'état global.<\u002Fstrong> Santé du cabinet, du module, de l'organisation. <em>Jamais posé sur un objet individuel<\u002Fem> — pour les objets, la couleur de la bordure suffit.<\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"echelle-rule\">\n        <div class=\"er-num\">RG-06<\u002Fdiv>\n        <div class=\"er-text\"><strong>Trois tailles canoniques.<\u002Fstrong> 12 px (badge inline dans le texte), 26 px (vignette d'état global compacte), 156 px (vignette macro plein cadre). Masque PNG, ratio respecté.<\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"echelle-rule\">\n        <div class=\"er-num\">RG-07<\u002Fdiv>\n        <div class=\"er-text\"><strong>L'optimal reste navy.<\u002Fstrong> Sur scène jour il se confond presque avec l'encre — c'est précisément le silence du palier optimal. Aucun outline, aucun traitement décoratif.<\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"echelle-rule\">\n        <div class=\"er-num\">RG-08<\u002Fdiv>\n        <div class=\"er-text\"><strong>Un seul mark par écran.<\u002Fstrong> La vignette d'état global est unique à son niveau de zoom. Pas de prolifération — un système, une jauge.<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- vignette macro — démo de l'usage « état global » -->\n    <div class=\"macro-vignette\">\n      <div class=\"mv-mark\"><span class=\"mark-state\"><\u002Fspan><\u002Fdiv>\n      <div class=\"mv-meta\">\n        <div class=\"mv-tag\">Vignette macro · accueil du cabinet pilote<\u002Fdiv>\n        <div class=\"mv-name\">Cabinet pilote — <em>vigilance<\u002Fem><\u002Fdiv>\n        <p class=\"mv-desc\">État global du système. Le mark Lugia teinté dans la patine du palier le plus critique, agrégé sur l'ensemble des composants WSF. Ici, la présence d'un outil IA non documenté fait basculer l'organisation en vigilance — même si la majorité des objets sont fonctionnels.<\u002Fp>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ============== VERRE ============== -->\n<section id=\"verre\">\n  <div class=\"wrap\">\n    <div class=\"head\">\n      <p class=\"eyebrow\">06 · Verre<\u002Fp>\n      <div>\n        <h2 class=\"title\">Trois <em>épaisseurs<\u002Fem> de transparence<\u002Fh2>\n        <p class=\"lead\">Le verre est la matière des éléments qui flottent au-dessus de la scène instrument — nœuds de graphes, panneaux contextuels, fiches en surimpression. <em>Trois épaisseurs, jamais plus<\u002Fem>, chacune pour un degré d'importance. Le verre est <em>navy-only<\u002Fem> : sur ivoire, on revient à des aplats sobres. La transparence ne se révèle que sur un fond où la lumière colorée bouge.<\u002Fp>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <div class=\"verre-row\">\n      <div class=\"verre-card\">\n        <div class=\"verre-tag\">06 · A — Voile<\u002Fdiv>\n        <div class=\"verre-name\">Surface secondaire<\u002Fdiv>\n        <p class=\"verre-desc\">Panneaux contextuels légers, infobulles, légendes. À peine flouté — on devine la scène derrière sans la perdre. Le voile reste discret.<\u002Fp>\n        <div class=\"verre-stage\">\n          <div class=\"vd-noise\"><\u002Fdiv>\n          <div class=\"vd-thing glass-voile\"><\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"verre-spec\">blur 8 · sat 120 · ivoire 4 % · bord 18 %<\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"verre-card\">\n        <div class=\"verre-tag\">06 · B — Lentille<\u002Fdiv>\n        <div class=\"verre-name\">Surface principale<\u002Fdiv>\n        <p class=\"verre-desc\">Les nœuds de graphes, les fiches contextuelles, les panneaux d'analyse. Floue franche, un filet de lumière en haut, une légère ombre portée.<\u002Fp>\n        <div class=\"verre-stage\">\n          <div class=\"vd-noise\"><\u002Fdiv>\n          <div class=\"vd-thing glass-lentille\"><\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"verre-spec\">blur 14 · sat 140 · ivoire 6 % · bord 32 % · highlight haut<\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"verre-card\">\n        <div class=\"verre-tag\">06 · C — Dôme<\u002Fdiv>\n        <div class=\"verre-name\">Surface focale<\u002Fdiv>\n        <p class=\"verre-desc\">L'élément actif — nœud sélectionné, modale, focus. Bord lumineux marqué, halo argent extérieur, élévation visible.<\u002Fp>\n        <div class=\"verre-stage\">\n          <div class=\"vd-noise\"><\u002Fdiv>\n          <div class=\"vd-thing glass-dome\"><\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"verre-spec\">blur 20 · sat 160 · ivoire 9 % · bord 48 % · halo argent<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <div class=\"echelle-rules\" style=\"margin-top:32px;\">\n      <div class=\"echelle-rule\">\n        <div class=\"er-num\">RG-09<\u002Fdiv>\n        <div class=\"er-text\"><strong>Verre navy-only.<\u002Fstrong> Sur ivoire, on garde des aplats. La transparence ne fait sens que sur une scène où la lumière colorée des nœuds passe à travers.<\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"echelle-rule\">\n        <div class=\"er-num\">RG-10<\u002Fdiv>\n        <div class=\"er-text\"><strong>L'état porte la couleur, le verre porte la matière.<\u002Fstrong> Le verre n'est jamais teinté en couleur d'état. La patine reste sur la bordure et sur le mark interne.<\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"echelle-rule\">\n        <div class=\"er-num\">RG-11<\u002Fdiv>\n        <div class=\"er-text\"><strong>Pas de verre en lecture longue.<\u002Fstrong> Une fiche pleine page, un formulaire, un tableau restent opaques. Le verre est réservé aux éléments qui flottent sur une carte.<\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"echelle-rule\">\n        <div class=\"er-num\">RG-12<\u002Fdiv>\n        <div class=\"er-text\"><strong>Trois épaisseurs, pas plus.<\u002Fstrong> Voile pour le secondaire, lentille pour le principal, dôme pour le focal. Toute hiérarchie supplémentaire passe par la position ou la couleur, pas par une 4ᵉ épaisseur.<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ============== TYPOGRAPHIE PRODUIT ============== -->\n<section id=\"typo\">\n  <div class=\"wrap\">\n    <div class=\"head\">\n      <p class=\"eyebrow\">07 · Typographie<\u002Fp>\n      <div>\n        <h2 class=\"title\">Trois polices, <em>cinq rôles.<\u002Fem><\u002Fh2>\n        <p class=\"lead\">Onest structure. Lora révèle. IBM Plex Mono qualifie. La règle de la marque tient : <em>Lora regular uniquement, jamais italique<\u002Fem>. Dans le produit, elle se réserve aux moments où le chiffre ou la voix humaine doit ralentir le regard.<\u002Fp>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <div class=\"typo-grid\">\n\n      <div class=\"typo-card\">\n        <div class=\"tk-tag\">07 · A — Display<\u002Fdiv>\n        <div class=\"tk-sample tk-display\">42<em>%<\u002Fem><\u002Fdiv>\n        <p class=\"surf-desc\">KPI de cadre. Le chiffre est en serif Lora, la <em>magnitude<\u002Fem> en serif aussi. Le produit emprunte à la presse économique l'idée que le chiffre est un récit.<\u002Fp>\n        <div class=\"tk-spec\"><b>Lora 500<\u002Fb> · 88px · -0.04em · interligne 0.95<\u002Fdiv>\n      <\u002Fdiv>\n\n      <div class=\"typo-card\">\n        <div class=\"tk-tag\">07 · B — Titre de fiche<\u002Fdiv>\n        <div class=\"tk-sample tk-h2\">Outil IA · <em>diagnostic<\u002Fem><\u002Fdiv>\n        <p class=\"surf-desc\">Nom d'objet, titre de module. Onest medium en corps principal, Lora regular pour le qualificatif. Permet une <em>respiration éditoriale<\u002Fem> dans une UI dense.<\u002Fp>\n        <div class=\"tk-spec\"><b>Onest 500 + Lora 400<\u002Fb> · 36px · -0.025em<\u002Fdiv>\n      <\u002Fdiv>\n\n      <div class=\"typo-card\">\n        <div class=\"tk-tag\">07 · C — Métadonnée<\u002Fdiv>\n        <div class=\"tk-sample tk-meta\">REF-P004 · MIS-À-JOUR 12.05.2026 · LENTILLE SANTÉ<\u002Fdiv>\n        <p class=\"surf-desc\">Code d'identifiant, breadcrumb technique, date, statut machine. <em>IBM Plex Mono, capitales, lettrage espacé.<\u002Fem> Toute donnée non-humaine porte la mono.<\u002Fp>\n        <div class=\"tk-spec\"><b>IBM Plex Mono 400<\u002Fb> · 11px · letter-spacing 0.16em · UPPERCASE<\u002Fdiv>\n      <\u002Fdiv>\n\n      <div class=\"typo-card\">\n        <div class=\"tk-tag\">07 · D — Verbatim<\u002Fdiv>\n        <div class=\"tk-sample tk-quote\">L'outil IA est utilisé mais aucun de nous n'a tracé ce qu'il fait des notes du patient.<\u002Fdiv>\n        <div class=\"tk-attribution\">Cabinet pilote · entretien du 03 mai 2026<\u002Fdiv>\n        <p class=\"surf-desc\" style=\"margin-top:auto;\">Citation utilisateur, observation qualitative, note d'auditeur. <em>Lora regular, jamais italique<\u002Fem>. Crée un moment d'écoute dans le flux des données.<\u002Fp>\n        <div class=\"tk-spec\"><b>Lora 400<\u002Fb> · 22px · interligne 1.45<\u002Fdiv>\n      <\u002Fdiv>\n\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ============== GRAPHES ============== -->\n<section id=\"graphes\">\n  <div class=\"wrap\">\n    <div class=\"head\">\n      <p class=\"eyebrow\">08 · Modélisation<\u002Fp>\n      <div>\n        <h2 class=\"title\">Trois <em>traitements<\u002Fem> de visualisation<\u002Fh2>\n        <p class=\"lead\">Le jumeau a trois manières canoniques de montrer un système. Toutes partagent la même grammaire : <em>navy<\u002Fem> en scène, <em>argent<\u002Fem> en lien, <em>patine<\u002Fem> en nœud. La différence porte sur la géométrie : verticale stratifiée, libre relationnelle, ou ramassée fiche.<\u002Fp>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- Traitement 1 — Pyramide WSF -->\n    <div class=\"graphes-row\">\n      <div class=\"graphe-stage luminous-pyramid\">\n        <div class=\"g-scene wsf-grid\">\n          <!-- en-têtes de colonne -->\n          <div class=\"wsf-col-header\" style=\"left:18%;top:12%;\">Orientation<\u002Fdiv>\n          <div class=\"wsf-col-header\" style=\"left:50%;top:12%;\">Opération<\u002Fdiv>\n          <div class=\"wsf-col-header\" style=\"left:82%;top:12%;\">Support<\u002Fdiv>\n\n          <!-- séparateurs verticaux subtils -->\n          <div class=\"wsf-vdiv\" style=\"left:34%;\"><\u002Fdiv>\n          <div class=\"wsf-vdiv\" style=\"left:66%;\"><\u002Fdiv>\n\n          <!-- Colonne 1 : Orientation -->\n          <div class=\"wsf-block s-optimal\" style=\"left:18%;top:30%;width:22%;height:14%;\">\n            <div class=\"wsf-name\">Clients<\u002Fdiv>\n            <div class=\"wsf-st\">optimal<\u002Fdiv>\n          <\u002Fdiv>\n          <div class=\"wsf-block s-fonctionnel\" style=\"left:18%;top:55%;width:22%;height:14%;\">\n            <div class=\"wsf-name\">Stratégies<\u002Fdiv>\n            <div class=\"wsf-st\">fonctionnel<\u002Fdiv>\n          <\u002Fdiv>\n          <div class=\"wsf-block s-risque\" style=\"left:18%;top:80%;width:22%;height:14%;\">\n            <div class=\"wsf-name\">Environnement<\u002Fdiv>\n            <div class=\"wsf-st\">risque<\u002Fdiv>\n          <\u002Fdiv>\n\n          <!-- Colonne 2 : Opération -->\n          <div class=\"wsf-block s-vigilance\" style=\"left:50%;top:30%;width:22%;height:14%;\">\n            <div class=\"wsf-name\">Processus<\u002Fdiv>\n            <div class=\"wsf-st\">vigilance<\u002Fdiv>\n          <\u002Fdiv>\n          <div class=\"wsf-block s-fonctionnel\" style=\"left:50%;top:55%;width:22%;height:14%;\">\n            <div class=\"wsf-name\">Participants<\u002Fdiv>\n            <div class=\"wsf-st\">fonctionnel<\u002Fdiv>\n          <\u002Fdiv>\n          <div class=\"wsf-block s-fonctionnel\" style=\"left:50%;top:80%;width:22%;height:14%;\">\n            <div class=\"wsf-name\">Produits / Services<\u002Fdiv>\n            <div class=\"wsf-st\">fonctionnel<\u002Fdiv>\n          <\u002Fdiv>\n\n          <!-- Colonne 3 : Support -->\n          <div class=\"wsf-block s-risque\" style=\"left:82%;top:30%;width:22%;height:14%;\">\n            <div class=\"wsf-name\">Information<\u002Fdiv>\n            <div class=\"wsf-st\">risque<\u002Fdiv>\n          <\u002Fdiv>\n          <div class=\"wsf-block s-critique\" style=\"left:82%;top:55%;width:22%;height:14%;\">\n            <div class=\"wsf-name\">Technologies<\u002Fdiv>\n            <div class=\"wsf-st\">critique<\u002Fdiv>\n          <\u002Fdiv>\n          <div class=\"wsf-block s-fonctionnel dashed\" style=\"left:82%;top:80%;width:22%;height:14%;\">\n            <div class=\"wsf-name\">Infrastructure<\u002Fdiv>\n            <div class=\"wsf-st\">fonctionnel<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div class=\"graphe-side\">\n        <div class=\"gs-tag\">08 · A · Z2 — Cartographie<\u002Fdiv>\n        <div class=\"gs-name\">Système <em>WSF<\u002Fem><\u002Fdiv>\n        <p class=\"gs-desc\">Les neuf composants d'un système de travail, organisés en grille 3×3 selon leur fonction. <em>Orientation<\u002Fem> (à qui, pour quoi, sous quelle contrainte), <em>opération<\u002Fem> (comment, par qui, vers quoi), <em>support<\u002Fem> (sur quoi, avec quels outils, avec quelle donnée). Chaque carte est un pan de verre transparent ; sa bordure dit l'état.<\u002Fp>\n        <div class=\"gs-rules\">\n          <div class=\"gs-rule\"><div class=\"k\">Colonnes<\u002Fdiv><div class=\"v\"><strong>Orientation<\u002Fstrong> · Clients, Stratégies, Environnement.<br><strong>Opération<\u002Fstrong> · Processus, Participants, Produits/Services.<br><strong>Support<\u002Fstrong> · Information, Technologies, Infrastructure.<\u002Fdiv><\u002Fdiv>\n          <div class=\"gs-rule\"><div class=\"k\">Cartes<\u002Fdiv><div class=\"v\">Neuf cartes <strong>rectangulaires homogènes<\u002Fstrong>. La taille uniforme dit l'égale dignité de chaque composant ; la lecture se fait par colonne et par rang.<\u002Fdiv><\u002Fdiv>\n          <div class=\"gs-rule\"><div class=\"k\">Verre<\u002Fdiv><div class=\"v\">Corps totalement transparent. <strong>Bordure 1px en patine d'état<\u002Fstrong> + biseau brillant + halo coloré subtil. La couleur dit tout.<\u002Fdiv><\u002Fdiv>\n          <div class=\"gs-rule\"><div class=\"k\">Libellés<\u002Fdiv><div class=\"v\">Nom en mono IBM Plex (capitales espacées). État en sans-serif Onest, en patine.<\u002Fdiv><\u002Fdiv>\n          <div class=\"gs-rule\"><div class=\"k\">Lecture rapide<\u002Fdiv><div class=\"v\">La <strong>couleur dominante d'une colonne<\u002Fstrong> renseigne sur la fonction la plus à risque dans le système.<\u002Fdiv><\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- Traitement 2 — Graphe d'objets -->\n    <div class=\"graphes-row\" style=\"margin-top:32px;\">\n      <div class=\"graphe-stage luminous-graph\">\n        <div class=\"g-scene\">\n          <svg viewBox=\"0 0 760 540\" xmlns=\"http://www.w3.org/2000/svg\" preserveAspectRatio=\"xMidYMid meet\">\n            <defs>\n              <linearGradient id=\"argentLinkObj\" x1=\"0\" x2=\"1\">\n                <stop offset=\"0\" stop-color=\"#8E8E91\" stop-opacity=\"0.20\"><\u002Fstop>\n                <stop offset=\"0.5\" stop-color=\"#D4D4D6\" stop-opacity=\"0.85\"><\u002Fstop>\n                <stop offset=\"1\" stop-color=\"#8E8E91\" stop-opacity=\"0.20\"><\u002Fstop>\n              <\u002FlinearGradient>\n            <\u002Fdefs>\n\n            <!-- liens en filaments argent -->\n            <g stroke=\"url(#argentLinkObj)\" stroke-width=\"0.75\" fill=\"none\">\n              <path d=\"M180 200 C 260 200, 300 130, 380 130\"><\u002Fpath>\n              <path d=\"M180 200 C 280 200, 320 270, 380 280\"><\u002Fpath>\n              <path d=\"M180 200 C 280 200, 320 380, 380 410\"><\u002Fpath>\n              <path d=\"M380 130 C 460 130, 500 200, 580 200\"><\u002Fpath>\n              <path d=\"M380 280 C 460 280, 520 240, 580 200\"><\u002Fpath>\n              <path d=\"M380 410 C 460 410, 520 320, 580 340\"><\u002Fpath>\n              <path d=\"M380 130 C 380 200, 380 220, 380 280\"><\u002Fpath>\n              <path d=\"M380 280 C 380 340, 380 380, 380 410\"><\u002Fpath>\n              <path d=\"M580 200 C 580 260, 580 300, 580 340\"><\u002Fpath>\n            <\u002Fg>\n\n            <!-- étiquettes des liens -->\n            <text class=\"obj-link-label\" x=\"290\" y=\"155\">utilise<\u002Ftext>\n            <text class=\"obj-link-label\" x=\"290\" y=\"245\">manipule<\u002Ftext>\n            <text class=\"obj-link-label\" x=\"290\" y=\"335\">contraint<\u002Ftext>\n            <text class=\"obj-link-label\" x=\"490\" y=\"155\">traite<\u002Ftext>\n            <text class=\"obj-link-label\" x=\"490\" y=\"245\">interroge<\u002Ftext>\n            <text class=\"obj-link-label\" x=\"490\" y=\"365\">supporte<\u002Ftext>\n\n            <!-- légende mono dans le coin -->\n            <g transform=\"translate(40 510)\" font-family=\"IBM Plex Mono, monospace\" font-size=\"9\" fill=\"rgba(244,239,229,0.45)\">\n              <text>GRAPHE D'OBJETS · 6 NŒUDS · 9 LIENS<\u002Ftext>\n              <text y=\"14\" fill=\"rgba(244,239,229,0.30)\">LENTILLE · SANTÉ<\u002Ftext>\n            <\u002Fg>\n          <\u002Fsvg>\n\n          <!-- nœuds : bulles en verre + mark patiné -->\n          <div class=\"g-node\" style=\"left:23.7%;top:37.0%;\">\n            <div class=\"g-bubble s-fonctionnel\"><\u002Fdiv>\n            <div class=\"g-label\">Médecin<small>P-04<\u002Fsmall><\u002Fdiv>\n          <\u002Fdiv>\n          <div class=\"g-node\" style=\"left:50.0%;top:24.1%;\">\n            <div class=\"g-bubble s-critique\"><\u002Fdiv>\n            <div class=\"g-label\">Outil IA<small>T-12<\u002Fsmall><\u002Fdiv>\n          <\u002Fdiv>\n          <div class=\"g-node\" style=\"left:50.0%;top:51.9%;\">\n            <div class=\"g-bubble s-risque\"><\u002Fdiv>\n            <div class=\"g-label\">DPI<small>T-08<\u002Fsmall><\u002Fdiv>\n          <\u002Fdiv>\n          <div class=\"g-node\" style=\"left:50.0%;top:75.9%;\">\n            <div class=\"g-bubble s-vigilance\"><\u002Fdiv>\n            <div class=\"g-label\">RGPD<small>E-01<\u002Fsmall><\u002Fdiv>\n          <\u002Fdiv>\n          <div class=\"g-node\" style=\"left:76.3%;top:37.0%;\">\n            <div class=\"g-bubble s-critique\"><\u002Fdiv>\n            <div class=\"g-label\">Données pat.<small>I-03<\u002Fsmall><\u002Fdiv>\n          <\u002Fdiv>\n          <div class=\"g-node\" style=\"left:76.3%;top:63.0%;\">\n            <div class=\"g-bubble s-fonctionnel\"><\u002Fdiv>\n            <div class=\"g-label\">HDS<small>I-08<\u002Fsmall><\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div class=\"graphe-side\">\n        <div class=\"gs-tag\">08 · B · Z3 — Relation<\u002Fdiv>\n        <div class=\"gs-name\">Graphe <em>d'objets<\u002Fem><\u002Fdiv>\n        <p class=\"gs-desc\">Le tissu vivant du système. Les <em>objets<\u002Fem> (un outil, une donnée, un acteur, une norme) et leurs liens nommés. Force-directed sur une grille douce — pas de mise en page géométrique stricte.<\u002Fp>\n        <div class=\"gs-rules\">\n          <div class=\"gs-rule\"><div class=\"k\">Nœuds<\u002Fdiv><div class=\"v\"><strong>Bulle en verre transparent<\u002Fstrong>, bordure 1.2–1.4px en patine d'état. <em>Pas de pictogramme à l'intérieur<\u002Fem> — la couleur de la bordure suffit à dire l'état de l'objet.<\u002Fdiv><\u002Fdiv>\n          <div class=\"gs-rule\"><div class=\"k\">Liens<\u002Fdiv><div class=\"v\">Bezier doux en argent dégradé. <strong>Toujours étiqueté<\u002Fstrong> en mono (verbe : utilise, traite, supporte…).<\u002Fdiv><\u002Fdiv>\n          <div class=\"gs-rule\"><div class=\"k\">Sélection<\u002Fdiv><div class=\"v\">Le nœud actif gagne un halo argent 2px. Les liens non-connectés tombent à <strong>12 % d'opacité.<\u002Fstrong><\u002Fdiv><\u002Fdiv>\n          <div class=\"gs-rule\"><div class=\"k\">Densité<\u002Fdiv><div class=\"v\">Au-delà de 30 nœuds : agréger en clusters par composant WSF, déplier au clic.<\u002Fdiv><\u002Fdiv>\n          <div class=\"gs-rule\"><div class=\"k\">Identifiant<\u002Fdiv><div class=\"v\">Code mono court (P-04, T-12, I-03…) sous le label, lisible à pleine vue.<\u002Fdiv><\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- Traitement 3 — Fiche objet -->\n    <div class=\"graphes-row\" style=\"margin-top:32px;\">\n      <div class=\"graphe-stage pale\" style=\"background:var(--paper);\">\n        <div class=\"fiche\">\n          <div class=\"fiche-header\">\n            <div class=\"fiche-eyebrow\">Technologies · T-12<\u002Fdiv>\n            <div class=\"fiche-title\">Outil IA · <em>diagnostic<\u002Fem><\u002Fdiv>\n            <div class=\"fiche-state\">Critique<\u002Fdiv>\n          <\u002Fdiv>\n          <div class=\"fiche-body\">\n            <div class=\"fiche-row\">\n              <div class=\"fiche-key\">Fournisseur<\u002Fdiv>\n              <div class=\"fiche-val\">Provider non documenté <span class=\"meta\">à renseigner<\u002Fspan><\u002Fdiv>\n            <\u002Fdiv>\n            <div class=\"fiche-row\">\n              <div class=\"fiche-key\">Manipule<\u002Fdiv>\n              <div class=\"fiche-val\"><em>Données patient<\u002Fem> · I-03 · sensibilité critique<\u002Fdiv>\n            <\u002Fdiv>\n            <div class=\"fiche-row\">\n              <div class=\"fiche-key\">Tokenisation<\u002Fdiv>\n              <div class=\"fiche-val\">Aucune trace · <span class=\"meta\">⨯<\u002Fspan><\u002Fdiv>\n            <\u002Fdiv>\n            <div class=\"fiche-row\">\n              <div class=\"fiche-key\">Utilisé par<\u002Fdiv>\n              <div class=\"fiche-val\">Médecin (P-04) · Secrétaire (P-07)<\u002Fdiv>\n            <\u002Fdiv>\n            <div class=\"fiche-row\">\n              <div class=\"fiche-key\">Contraintes<\u002Fdiv>\n              <div class=\"fiche-val\">AI Act · RGPD art. 22 · <em>conformité non démontrée<\u002Fem><\u002Fdiv>\n            <\u002Fdiv>\n            <div class=\"fiche-row\">\n              <div class=\"fiche-key\">Dernière revue<\u002Fdiv>\n              <div class=\"fiche-val\"><span class=\"meta\">12.05.2026 · Cabinet pilote<\u002Fspan><\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n          <div class=\"fiche-action\">\n            <span class=\"fa-kicker\">Chantier proposé<\u002Fspan>\n            <p class=\"fa-text\">Documenter le fournisseur, vérifier la tokenisation des prompts, <em>cadrer l'usage par une charte interne<\u002Fem>.<\u002Fp>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div class=\"graphe-side\">\n        <div class=\"gs-tag\">08 · C · Z4 — Fiche objet<\u002Fdiv>\n        <div class=\"gs-name\">Une <em>identité<\u002Fem>, un état<\u002Fdiv>\n        <p class=\"gs-desc\">La fiche est <em>la seule surface ivory<\u002Fem> de la triade visualisation. Elle ramène l'objet du système au document — au sens éditorial du terme. C'est ici que la marque reprend la main.<\u002Fp>\n        <div class=\"gs-rules\">\n          <div class=\"gs-rule\"><div class=\"k\">Surface<\u002Fdiv><div class=\"v\">Ivoire éditorial. La fiche se lit comme un encart de presse, pas comme un dashboard.<\u002Fdiv><\u002Fdiv>\n          <div class=\"gs-rule\"><div class=\"k\">Titre<\u002Fdiv><div class=\"v\">Onest 500 + <strong>qualificatif en Lora regular<\u002Fstrong>. C'est le moment où la serif parle.<\u002Fdiv><\u002Fdiv>\n          <div class=\"gs-rule\"><div class=\"k\">État<\u002Fdiv><div class=\"v\">Badge en haut à droite, <strong>seule occurrence colorée<\u002Fstrong> de la fiche. Le reste est en encre.<\u002Fdiv><\u002Fdiv>\n          <div class=\"gs-rule\"><div class=\"k\">Lignes<\u002Fdiv><div class=\"v\">Clé en mono / valeur en sans. Les références d'autres objets (P-04, I-03) sont cliquables.<\u002Fdiv><\u002Fdiv>\n          <div class=\"gs-rule\"><div class=\"k\">Chantier<\u002Fdiv><div class=\"v\">Si un état autre qu'optimal existe : un encart d'action <strong>en patine correspondante<\u002Fstrong>, jamais ailleurs.<\u002Fdiv><\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ============== LENTILLES ============== -->\n<section id=\"lentilles\">\n  <div class=\"wrap\">\n    <div class=\"head\">\n      <p class=\"eyebrow\">09 · Lentilles<\u002Fp>\n      <div>\n        <h2 class=\"title\">Quatre <em>questions<\u002Fem>, une grammaire<\u002Fh2>\n        <p class=\"lead\">L'utilisateur consulte le jumeau à travers <em>une lentille<\u002Fem> à la fois — une question qu'il pose au système. La même échelle de patine sert toutes les lentilles : on change ce qu'on mesure, pas comment on l'affiche.<\u002Fp>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <div class=\"lens-grid\">\n      <div class=\"lens-card\">\n        <div class=\"lc-tag\">09 · A<\u002Fdiv>\n        <div class=\"lc-name\">Santé<\u002Fdiv>\n        <p class=\"lc-desc\">Lentille par défaut. Mesure le bon fonctionnement opérationnel — pannes, ruptures, latences.<\u002Fp>\n        <p class=\"lc-q\">Mon système fonctionne-t-il aujourd'hui ?<\u002Fp>\n      <\u002Fdiv>\n      <div class=\"lens-card\">\n        <div class=\"lc-tag\">09 · B<\u002Fdiv>\n        <div class=\"lc-name\">Conformité<\u002Fdiv>\n        <p class=\"lc-desc\">Mesure le respect des règles externes — RGPD, AI Act, normes sectorielles. Risque et critique sont fréquents ici.<\u002Fp>\n        <p class=\"lc-q\">Suis-je en règle ?<\u002Fp>\n      <\u002Fdiv>\n      <div class=\"lens-card\">\n        <div class=\"lc-tag\">09 · C<\u002Fdiv>\n        <div class=\"lc-name\">Charge<\u002Fdiv>\n        <p class=\"lc-desc\">Mesure le poids opérationnel — heures, coût cognitif, pression sur les équipes. Échelle inversée (forte charge → critique).<\u002Fp>\n        <p class=\"lc-q\">Qui porte le système ?<\u002Fp>\n      <\u002Fdiv>\n      <div class=\"lens-card\">\n        <div class=\"lc-tag\">09 · D<\u002Fdiv>\n        <div class=\"lc-name\">Maturité<\u002Fdiv>\n        <p class=\"lc-desc\">Mesure le degré de documentation et de cadrage. Le non-documenté domine ; c'est la lentille des chantiers structurels.<\u002Fp>\n        <p class=\"lc-q\">Que sait-on réellement de ce qu'on fait ?<\u002Fp>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ============== ÉCRAN DE RÉFÉRENCE ============== -->\n<section id=\"ref\">\n  <div class=\"wrap\">\n    <div class=\"head\">\n      <p class=\"eyebrow\">10 · Écran de référence<\u002Fp>\n      <div>\n        <h2 class=\"title\">L'écran <em>canonique.<\u002Fem><\u002Fh2>\n        <p class=\"lead\">Toute la grammaire de la charte assemblée — scène instrument à gauche (graphe d'objets, lentille Santé), panneau ivory en colonne droite (fiche du nœud sélectionné). C'est le mode <em>exploration<\u002Fem> du jumeau.<\u002Fp>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <div class=\"ref-frame\">\n      <div class=\"ref-topbar\">\n        <div class=\"ref-brand\">\n          <span class=\"mark\"><\u002Fspan>\n          <span>Lugia · Atelier<\u002Fspan>\n        <\u002Fdiv>\n        <div class=\"ref-global-state\">\n          <span class=\"mark-state\"><\u002Fspan>\n          <div class=\"rgs-text\">\n            <div class=\"rgs-label\">État global<\u002Fdiv>\n            <div class=\"rgs-value\">vigilance<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"ref-crumb\">\n          <span>Cabinet pil on. Une seule entité, ses neuf composants WSF résumés en grille, ses chantiers actifs, son activité récente. C'est l'écran qu'un dirigeant garde ouvert quand il suit un cabinet de près.<\u002Fp>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <div class=\"graphes-row\">\n      <div class=\"cabinet-stage\">\n        <div class=\"cab-header\">\n          <span class=\"mark-state s-risque\"><\u002Fspan>\n          <div class=\"cab-header-info\">\n            <div class=\"cab-header-title\">Cabinet Renaud<\u002Fdiv>\n            <div class=\"cab-header-meta\">Médecine générale · 4 praticiens · Lyon 6ᵉ<\u002Fdiv>\n          <\u002Fdiv>\n          <div class=\"cab-header-stat\">\n            <div class=\"cab-header-stat-label\">État global<\u002Fdiv>\n            <div class=\"cab-header-stat-value t-risque\">Risque<\u002Fdiv>\n          <\u002Fdiv>\n          <div class=\"cab-header-stat\">\n            <div class=\"cab-header-stat-label\">Dernière maj<\u002Fdiv>\n            <div class=\"cab-header-stat-value\">il y a 12 min<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n\n        <div class=\"cab-body\">\n          <div class=\"cab-main\">\n            <div class=\"cab-block-tag\">Points actifs <b>(3)<\u002Fb><\u002Fdiv>\n            <div class=\"cab-point s-critique\">\n              <span class=\"mark-state s-critique\"><\u002Fspan>\n              <div class=\"cp-body\">\n                <div class=\"cp-comp\">Technologies<\u002Fdiv>\n                <div class=\"cp-title\">Outil IA · fournisseur non documenté<\u002Fdiv>\n                <div class=\"cp-meta\">depuis 4 min · Cabinet pilote<\u002Fdiv>\n              <\u002Fdiv>\n              <div class=\"cp-state\">Critique<\u002Fdiv>\n            <\u002Fdiv>\n            <div class=\"cab-point s-risque\">\n              <span class=\"mark-state s-risque\"><\u002Fspan>\n              <div class=\"cp-body\">\n                <div class=\"cp-comp\">Information<\u002Fdiv>\n                <div class=\"cp-title\">Donn

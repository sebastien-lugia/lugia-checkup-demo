<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>V2.0 — Démo interactive complète</title>
<style>
  :root {
    --bg: #faf9f5; --bg-card: #fbf9f1; --bg-card-alt: #f5f4ef;
    --text: #111; --text-soft: #1a1a1a;
    --text-secondary: #595959; --text-tertiary: #444; --text-muted: #888780;
    --border: #d4cfbf; --border-soft: #e0dccc; --border-very-soft: #e8e3d3;
    --accent: #1a56a0; --accent-bg: #e6edf6;
    --axis-a: #2e7d4f; --axis-a-bg: #e8f1ec;
    --axis-b: #a85d2b; --axis-b-bg: #f6ece2;
    --axis-c: #1a56a0; --axis-c-bg: #e6edf6;
    --bench-bg: #fbf3e3; --bench-border: #c48a2a;
    --bench-text: #5a3d10; --bench-eyebrow: #8a5a14;
    --alert-bg: #fbeae0; --alert-border: #a85d2b; --alert-text: #8a3a14;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; background: var(--bg); color: var(--text-soft); font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Helvetica Neue", Arial, sans-serif; font-size: 15px; line-height: 1.5; }
  .serif { font-family: "Iowan Old Style", "Palatino Linotype", Georgia, serif; }
  .app-header { padding: 14px 24px; border-bottom: 1px solid var(--border-very-soft); display: flex; align-items: center; justify-content: space-between; }
  .logo { font-family: "Iowan Old Style", Georgia, serif; font-size: 22px; font-weight: 500; }
  .header-right { font-size: 13px; color: var(--text-tertiary); display: flex; gap: 16px; align-items: center; }
  .email { color: var(--text-muted); }
  .reset-btn { background: none; border: 1px solid var(--border); color: var(--text-tertiary); font-size: 11px; padding: 4px 10px; border-radius: 12px; cursor: pointer; }
  .reset-btn:hover { border-color: var(--text-muted); }
  .btn-primary { background: #1f1f1f; color: #fff; font-weight: 500; font-size: 15px; border-radius: 999px; padding: 12px 28px; border: none; cursor: pointer; font-family: inherit; transition: background .15s; }
  .btn-primary:hover:not(:disabled) { background: #2c2c2c; }
  .btn-primary:disabled { opacity: .4; cursor: not-allowed; }
  .btn-link { background: none; border: none; color: var(--text-secondary); font-size: 14px; cursor: pointer; padding: 6px 0; font-family: inherit; }
  .btn-link:hover { color: var(--text); text-decoration: underline; text-underline-offset: 4px; }

  .intro { max-width: 820px; margin: 0 auto; padding: 64px 32px; }
  .intro-eyebrow { font-size: 12px; text-transform: uppercase; letter-spacing: .18em; font-weight: 600; color: var(--accent); margin-bottom: 32px; }
  .intro-h1 { font-size: clamp(40px, 6vw, 64px); font-weight: 500; line-height: 1.05; letter-spacing: -.02em; margin: 0 0 28px; }
  .intro-h1 em { font-style: italic; color: var(--accent); }
  .intro-sub { font-size: 19px; line-height: 1.55; color: var(--text-secondary); max-width: 680px; margin: 0 0 40px; }
  .axis-chips { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 48px; }
  .axis-chip { font-size: 12px; font-weight: 500; padding: 6px 14px; border-radius: 999px; border: 1px solid; }
  .axis-chip.a { color: var(--axis-a); background: var(--axis-a-bg); border-color: rgba(46,125,79,.25); }
  .axis-chip.b { color: var(--axis-b); background: var(--axis-b-bg); border-color: rgba(168,93,43,.25); }
  .axis-chip.c { color: var(--axis-c); background: var(--axis-c-bg); border-color: rgba(26,86,160,.25); }
  .promesses { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 56px; }
  .promesse { border: 1px solid var(--border-very-soft); background: rgba(255,255,255,.4); border-radius: 8px; padding: 24px; }
  .promesse h3 { font-size: 20px; font-weight: 500; margin: 0 0 8px; }
  .promesse p { font-size: 14px; line-height: 1.55; color: var(--text-secondary); margin: 0; }

  .profil { max-width: 680px; margin: 0 auto; padding: 48px 32px; }
  .small-eyebrow { font-size: 11px; text-transform: uppercase; letter-spacing: .16em; font-weight: 600; color: var(--text-muted); margin-bottom: 16px; }
  .profil h1 { font-size: clamp(28px, 5vw, 40px); font-weight: 500; line-height: 1.15; letter-spacing: -.015em; margin: 0 0 12px; }
  .profil-intro { font-size: 15px; line-height: 1.6; color: var(--text-secondary); max-width: 580px; margin: 0 0 40px; }
  .field { margin-bottom: 28px; }
  .field-label { font-size: 15px; font-weight: 500; margin-bottom: 12px; }
  .chips-row { display: flex; flex-wrap: wrap; gap: 8px; }
  .chip { font-size: 14px; padding: 8px 16px; border-radius: 999px; border: 1px solid var(--border); background: rgba(255,255,255,.6); color: var(--text-soft); cursor: pointer; font-family: inherit; transition: all .15s; }
  .chip:hover { border-color: var(--text-muted); background: #fff; }
  .chip.sel { background: #1f1f1f; color: #fff; border-color: #1f1f1f; }
  .other-input { margin-top: 10px; max-width: 420px; width: 100%; font-size: 14px; padding: 8px 12px; border: 1px solid var(--border); border-radius: 6px; background: rgba(255,255,255,.8); }
  .other-input:focus { outline: none; border-color: var(--accent); }
  .cta-row { display: flex; align-items: center; gap: 16px; margin-top: 40px; }
  .cta-hint { font-size: 13px; color: var(--text-muted); }

  .energie { max-width: 680px; margin: 0 auto; padding: 48px 32px; }
  .energie-q { font-size: clamp(26px, 4vw, 36px); font-weight: 500; line-height: 1.2; letter-spacing: -.01em; margin: 0 0 12px; }
  .energie-note { font-size: 14px; line-height: 1.55; color: var(--text-muted); font-style: italic; margin: 0 0 36px; max-width: 560px; }
  .opt-big { display: block; width: 100%; text-align: left; background: rgba(255,255,255,.6); border: 1px solid var(--border); border-radius: 8px; padding: 16px 20px; margin-bottom: 10px; cursor: pointer; transition: all .15s; font-size: 15px; line-height: 1.5; color: var(--text-soft); font-family: inherit; }
  .opt-big:hover { border-color: var(--text-muted); background: #fff; }
  .opt-big.sel { background: var(--bg-card); border-color: var(--accent); box-shadow: 0 0 0 3px rgba(26,86,160,.08); }
  .opt-big-inner { display: inline-flex; align-items: center; gap: 12px; }
  .radio { width: 20px; height: 20px; border-radius: 50%; border: 2px solid var(--border); background: #fff; flex-shrink: 0; display: flex; align-items: center; justify-content: center; }
  .opt-big.sel .radio, .opt.sel .opt-radio { border-color: var(--accent); background: var(--accent); }
  .radio svg, .opt-radio svg { width: 12px; height: 12px; color: #fff; display: none; }
  .opt-big.sel .radio svg, .opt.sel .opt-radio svg { display: block; }

  .topbar { border-bottom: 1px solid var(--border-very-soft); }
  .topbar-inner { max-width: 680px; margin: 0 auto; padding: 12px 24px; display: flex; align-items: center; gap: 12px; }
  .chapter-num { font-size: 11px; text-transform: uppercase; letter-spacing: .16em; font-weight: 600; color: var(--text-muted); }
  .chapter-label { font-size: 13px; color: var(--text-tertiary); }
  .bloc-layout { max-width: 1080px; margin: 0 auto; display: flex; gap: 32px; }
  .bloc-main { flex: 1; max-width: 680px; margin: 0 auto; padding: 40px 32px; }
  .bloc-section-header { margin-bottom: 40px; }
  .bloc-section-header h1 { font-size: clamp(28px, 5vw, 40px); font-weight: 500; line-height: 1.15; letter-spacing: -.015em; margin: 12px 0 0; }
  .question { margin-bottom: 56px; scroll-margin-top: 80px; }
  .q-eyebrow { font-size: 11px; text-transform: uppercase; letter-spacing: .14em; font-weight: 600; color: var(--text-muted); margin-bottom: 12px; }
  .q-title { font-size: clamp(20px, 3vw, 26px); font-weight: 500; line-height: 1.3; margin: 0 0 8px; }
  .q-context { font-size: 13px; color: var(--text-muted); font-style: italic; margin: 0 0 20px; }
  .opt { display: block; width: 100%; text-align: left; background: rgba(255,255,255,.6); border: 1px solid var(--border); border-radius: 8px; padding: 14px 20px; margin-bottom: 8px; cursor: pointer; transition: all .15s; font-family: inherit; }
  .opt:hover { border-color: var(--text-muted); background: #fff; }
  .opt.sel { background: var(--bg-card); border-color: var(--accent); box-shadow: 0 0 0 3px rgba(26,86,160,.08); }
  .opt-flex { display: flex; align-items: flex-start; gap: 12px; }
  .opt-radio { width: 20px; height: 20px; border-radius: 50%; border: 2px solid var(--border); background: #fff; flex-shrink: 0; margin-top: 2px; display: flex; align-items: center; justify-content: center; }
  .opt-text { font-size: 15px; line-height: 1.5; }
  .reformulation { margin-top: 12px; padding-left: 32px; font-size: 14px; line-height: 1.6; color: var(--text-tertiary); font-style: italic; animation: fadeIn .22s ease-out; }
  .benchmark { margin-top: 12px; margin-left: 32px; background: var(--bench-bg); border-left: 3px solid var(--bench-border); border-radius: 4px; padding: 12px 16px; animation: fadeIn .3s ease-out; }
  .b-eyebrow { font-size: 10px; text-transform: uppercase; letter-spacing: .12em; font-weight: 600; color: var(--bench-eyebrow); margin-bottom: 4px; }
  .b-text { font-size: 13px; line-height: 1.5; color: var(--bench-text); }
  .b-source { font-size: 11px; color: var(--bench-eyebrow); font-style: italic; margin-top: 4px; }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(-4px); } to { opacity: 1; transform: translateY(0); } }
  @keyframes revealUp { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
  @media (prefers-reduced-motion: reduce) {
    .reformulation, .benchmark, .transition-niveau, .transition-quote { animation: none !important; }
  }

  .radar-aside { width: 220px; flex-shrink: 0; position: sticky; top: 24px; align-self: flex-start; padding-top: 40px; }
  .radar-svg-wrap { text-align: center; margin-bottom: 16px; }
  .radar-axes { border-top: 1px solid var(--border-soft); padding-top: 16px; }
  .radar-axis-row { margin-bottom: 12px; }
  .axis-line1 { display: flex; align-items: center; gap: 8px; margin-bottom: 4px; }
  .axis-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
  .axis-dot.a { background: var(--axis-a); }
  .axis-dot.b { background: var(--axis-b); }
  .axis-dot.c { background: var(--axis-c); }
  .axis-name { font-size: 11px; font-weight: 500; color: var(--text-tertiary); }
  .axis-niveau { font-size: 12px; font-weight: 500; padding-left: 16px; margin-bottom: 6px; }
  .axis-bar { margin-left: 16px; height: 2px; background: var(--border-very-soft); border-radius: 1px; overflow: hidden; }
  .axis-bar-fill { height: 100%; border-radius: 1px; transition: width .4s ease-out; }
  .bloc-footer { margin-top: 56px; padding-top: 32px; border-top: 1px solid var(--border-soft); display: flex; align-items: center; gap: 16px; }

    .radar-aside { display: none; }
    .topbar-mini-radar { background: rgba(251, 249, 241, .4); border-bottom: 1px solid var(--border-very-soft); }
    .topbar-mini-radar-inner { max-width: 680px; margin: 0 auto; padding: 8px 24px; display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; font-size: 11px; }
  }
  @media (min-width: 1080px) { .topbar-mini-radar { display: none; } }
  .mini-axis-row .axis-line1 { margin-bottom: 0; }
  .mini-axis-niveau { padding-left: 12px; color: var(--text-soft); font-weight: 500; }

  .transition-screen { max-width: 640px; margin: 0 auto; padding: 80px 32px; text-align: center; }
  .transition-eyebrow { font-size: 12px; text-transform: uppercase; letter-spacing: .16em; font-weight: 600; color: var(--text-muted); margin-bottom: 24px; }
  .transition-h1 { font-size: clamp(32px, 5vw, 44px); font-weight: 500; line-height: 1.15; letter-spacing: -.015em; margin: 0 0 12px; }
  .transition-niveau { font-size: 18px; line-height: 1.55; color: var(--text-tertiary); margin: 0 0 28px; animation: revealUp .5s ease-out .2s both; }
  .transition-niveau strong { color: var(--text-soft); font-weight: 500; }
  .transition-quote { font-size: 20px; font-style: italic; line-height: 1.4; color: var(--text-tertiary); max-width: 520px; margin: 0 auto 48px; animation: revealUp .5s ease-out .35s both; }
  .transition-suite { border-top: 1px solid var(--border-soft); padding-top: 32px; }
  .ts-eyebrow { font-size: 12px; text-transform: uppercase; letter-spacing: .14em; font-weight: 600; color: var(--text-muted); margin-bottom: 8px; }
  .ts-label { font-size: 18px; font-weight: 500; margin-bottom: 28px; }

  .resultats { max-width: 840px; margin: 0 auto; padding: 56px 32px; }
  .res-eyebrow { font-size: 11px; text-transform: uppercase; letter-spacing: .16em; font-weight: 600; color: var(--accent); margin-bottom: 20px; }
  .res-h1 { font-size: clamp(32px, 5vw, 44px); font-weight: 500; line-height: 1.1; letter-spacing: -.015em; margin: 0 0 16px; }
  .res-intro { font-size: 19px; line-height: 1.5; color: var(--text-tertiary); font-style: italic; max-width: 680px; margin: 0 0 48px; }
  .radar-result { margin: 48px 0; text-align: center; }
  .signal-banner { margin: 40px 0; padding: 20px 24px; border-radius: 6px; border-left: 3px solid; }
  .signal-banner.alerte { background: var(--alert-bg); border-left-color: var(--alert-border); }
  .signal-banner.recadrage { background: var(--accent-bg); border-left-color: var(--accent); }
  .signal-banner.positif { background: var(--axis-a-bg); border-left-color: var(--axis-a); }
  .signal-eyebrow { font-size: 11px; text-transform: uppercase; letter-spacing: .14em; font-weight: 600; color: var(--text-tertiary); margin-bottom: 8px; }
  .signal-title { font-size: 20px; font-weight: 500; line-height: 1.3; margin: 0 0 8px; }
  .signal-msg { font-size: 14px; line-height: 1.55; color: var(--text-tertiary); margin: 0; }
  .tonalite-aside { font-size: 14px; font-style: italic; color: #666; border-left: 3px solid var(--border); padding-left: 16px; margin: 40px 0; max-width: 640px; }
  .section-title { border-top: 1px solid var(--border-soft); padding-top: 32px; margin-top: 56px; display: flex; align-items: baseline; gap: 16px; }
  .section-number { font-size: 36px; color: var(--border); font-weight: 500; }
  .section-title h2 { font-size: 28px; font-weight: 500; margin: 0; }
  .section-intro { font-size: 14px; color: var(--text-secondary); font-style: italic; margin: 8px 0 0; max-width: 560px; }
  .facet-card { border: 1px solid var(--border-soft); background: rgba(255,255,255,.4); border-radius: 8px; padding: 20px 24px; margin-bottom: 16px; }
  .facet-card-row { display: flex; align-items: flex-start; gap: 16px; }
  .facet-meta { display: flex; align-items: center; gap: 12px; margin-bottom: 4px; }
  .facet-axe { font-size: 11px; text-transform: uppercase; letter-spacing: .14em; font-weight: 600; color: var(--text-muted); }
  .facet-badge { font-size: 10px; font-weight: 500; text-transform: uppercase; letter-spacing: .08em; padding: 2px 8px; border-radius: 999px; }
  .facet-badge.surveiller { background: #f0f0f0; color: var(--text-tertiary); }
  .facet-badge.risque { background: var(--alert-bg); color: var(--alert-text); }
  .facet-title { font-size: 22px; font-weight: 500; line-height: 1.3; margin: 0; }
  .facet-level-soft { font-size: 13px; color: var(--text-secondary); margin-top: 4px; }
  .bench-combi-box { margin-bottom: 16px; background: var(--bench-bg); border-left: 3px solid var(--bench-border); border-radius: 4px; padding: 16px 20px; }
  .chantier-card { background: rgba(255,255,255,.4); border: 1px solid var(--border-soft); border-radius: 8px; padding: 20px 24px; margin-bottom: 12px; transition: all .15s; display: block; cursor: pointer; text-decoration: none; color: inherit; }
  .chantier-card.reco { border-color: var(--accent); box-shadow: 0 0 0 2px rgba(26,86,160,.06); }
  .chantier-card:hover { background: rgba(255,255,255,.7); border-color: var(--text-muted); }
  .chantier-row { display: flex; align-items: flex-start; gap: 20px; }
  .chantier-num { font-size: 44px; line-height: 1; color: var(--border); font-weight: 500; flex-shrink: 0; }
  .chantier-reco-tag { font-size: 10px; text-transform: uppercase; letter-spacing: .12em; font-weight: 600; color: var(--accent); margin-bottom: 4px; }
  .chantier-title { font-size: 20px; font-weight: 500; line-height: 1.3; margin: 0 0 8px; }
  .chantier-meta { display: flex; align-items: center; gap: 12px; font-size: 12px; color: var(--text-muted); }
  .effort-pips { display: inline-flex; gap: 2px; }
  .pip { width: 8px; height: 8px; border-radius: 50%; background: var(--border-soft); }
  .pip.on { background: var(--text-muted); }
  .chantier-cta { margin-top: 12px; font-size: 13px; font-weight: 500; color: var(--accent); }
  .modules-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .module-tile { border: 1px solid var(--border-soft); border-radius: 6px; background: rgba(255,255,255,.3); padding: 14px 16px; text-decoration: none; color: inherit; transition: all .15s; display: block; cursor: pointer; }
  .module-tile:hover { border-color: var(--text-muted); background: rgba(255,255,255,.7); }
  .module-tile-title { font-size: 15px; font-weight: 500; margin-bottom: 4px; }
  .module-tile-meta { display: flex; align-items: center; gap: 8px; font-size: 11px; color: var(--text-muted); }

  .module-detail { max-width: 760px; margin: 0 auto; padding: 56px 32px; }
  .module-back { font-size: 13px; color: var(--text-secondary); margin-bottom: 32px; cursor: pointer; background: none; border: none; padding: 0; font-family: inherit; }
  .module-back:hover { color: var(--text); text-decoration: underline; text-underline-offset: 4px; }
  .module-eyebrow { font-size: 11px; text-transform: uppercase; letter-spacing: .16em; font-weight: 600; color: var(--accent); margin-bottom: 20px; }
  .module-h1 { font-size: clamp(32px, 5vw, 44px); font-weight: 500; line-height: 1.15; letter-spacing: -.015em; margin: 0 0 16px; }
  .module-meta { display: flex; flex-wrap: wrap; align-items: center; gap: 12px; font-size: 13px; color: var(--text-secondary); margin-bottom: 40px; }
  .module-etapes { border-top: 1px solid var(--border-soft); padding-top: 40px; margin-bottom: 48px; }
  .module-etape { display: flex; align-items: baseline; gap: 20px; margin-bottom: 40px; }
  .module-etape-num { font-size: 40px; line-height: 1; color: var(--border); font-weight: 500; flex-shrink: 0; }
  .module-etape-title { font-size: 22px; font-weight: 500; line-height: 1.3; margin: 0 0 8px; }
  .tag-temp { display: inline-block; font-size: 10px; text-transform: uppercase; letter-spacing: .12em; font-weight: 600; padding: 4px 10px; border-radius: 999px; margin-bottom: 12px; }
  .tag-temp.quick { background: var(--axis-a-bg); color: var(--axis-a); }
  .tag-temp.medium { background: var(--bench-bg); color: var(--bench-eyebrow); }
  .tag-temp.invest { background: var(--accent-bg); color: var(--accent); }
  .module-etape-body { font-size: 15px; line-height: 1.65; color: var(--text-tertiary); margin: 0; }
  .module-share { margin-top: 48px; padding-top: 32px; border-top: 1px solid var(--border-soft); font-size: 13px; color: var(--text-muted); font-style: italic; }
  .module-share code { background: var(--bg-card-alt); padding: 2px 6px; border-radius: 3px; font-size: 12px; font-style: normal; }

  @media (max-width: 1079px) {
    .promesses { grid-template-columns: 1fr; }
    .modules-grid { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>

<div class="app-header">
  <span class="logo">Lugia</span>
  <div class="header-right">
    <span class="email">[email protected]</span>
    <button class="reset-btn" onclick="resetDemo()">↺ Réinitialiser</button>
  </div>
</div>

<div id="app"></div>

<script>
const DB = /*__DATA__*/;
const PROTOCOL = DB.protocol;
const DIAGNOSTICS = DB.diagnostics;
const MODULES_DATA = DB.modules;

const initialState = () => ({ step: 'intro', profile: {}, answers: {}, moduleId: null });
let state = initialState();

function resetDemo() {
  if (!confirm('Réinitialiser la démo ? (toutes les réponses seront effacées)')) return;
  state = initialState();
  render();
}

function isSolo() { return (state.profile.cabinet_type || '').toLowerCase() === 'solo'; }

function getVisibleQuestions(blockId) {
  const block = PROTOCOL.blocks.find(b => b.id === blockId);
  if (!block) return [];
  if (blockId !== 'B') return block.questions;
  const solo = isSolo();
  return block.questions.filter(q => {
    if (!q.routing) return true;
    if (q.routing === 'cabinet_type==solo') return solo;
    if (q.routing === 'cabinet_type!=solo') return !solo;
    return true;
  });
}

function scoreBlock(blockId) {
  const visible = getVisibleQuestions(blockId);
  if (visible.length === 0) return null;
  const optionScore = {};
  visible.forEach(q => q.options.forEach(o => { optionScore[o.id] = o.s; }));
  let sum = 0, answered = 0;
  visible.forEach(q => {
    const ans = state.answers[q.id];
    if (ans && optionScore[ans.selected_option] != null) {
      sum += optionScore[ans.selected_option];
      answered++;
    }
  });
  if (answered === 0) return null;
  return { pct: Math.round((sum / (visible.length * 4)) * 100), answered, total: visible.length };
}

function scoreToLevel(pct) {
  if (pct >= 78) return { id: 'maitrise', label: 'Maîtrisé' };
  if (pct >= 55) return { id: 'operationnel', label: 'Opérationnel' };
  if (pct >= 35) return { id: 'a_surveiller', label: 'À surveiller' };
  return { id: 'a_risque', label: 'À risque' };
}

function computeAllScores() {
  const out = { A: null, B: null, C: null, completeness: { A: 0, B: 0, C: 0 } };
  ['A', 'B', 'C'].forEach(b => {
    const s = scoreBlock(b);
    if (s) {
      const level = scoreToLevel(s.pct);
      out[b] = { pct: s.pct, level: level.id, label: level.label, title: DIAGNOSTICS.titres_diagnostic[b][level.id], axe_label: DIAGNOSTICS.titres_diagnostic[b].axe };
      out.completeness[b] = s.answered / s.total;
    }
  });
  if (out.A && out.B && out.C) {
    out.global_score = Math.round((out.A.pct + out.B.pct + out.C.pct) / 3);
  }
  return out;
}

function evaluateSignal(scores) {
  if (!scores.A || !scores.B || !scores.C) return null;
  const A = scores.A.pct, B = scores.B.pct, C = scores.C.pct;
  const sorted = [...DIAGNOSTICS.signaux_croises].sort((a, b) => a.ordre_priorite - b.ordre_priorite);
  for (const sig of sorted) { if (matches(sig.condition, A, B, C)) return sig; }
  return null;
}
function matches(cond, A, B, C) {
  return cond.split('AND').map(s => s.trim()).every(c => evalClause(c, A, B, C));
}
function evalClause(c, A, B, C) {
  for (const op of ['<=', '>=', '==', '<', '>']) {
    if (c.includes(op)) {
      const [l, r] = c.split(op).map(s => s.trim());
      const lv = ({ A, B, C })[l]; const rv = parseInt(r, 10);
      if (op === '<=') return lv <= rv;
      if (op === '>=') return lv >= rv;
      if (op === '<') return lv < rv;
      if (op === '>') return lv > rv;
      if (op === '==') return lv === rv;
    }
  }
  return false;
}

function computeOpportunities(scores) {
  const axisFor = { urgences: 'A', chroniques: 'A', delegation: 'B', comm: 'B', logiciel: 'C', admin: 'C', pilotage: 'C' };
  return [...MODULES_DATA.modules]
    .map(m => ({ ...m, axisPct: scores[axisFor[m.id]] ? scores[axisFor[m.id]].pct : 100 }))
    .sort((a, b) => a.axisPct - b.axisPct || a.effort - b.effort);
}

function applyRules(scores) {
  const p = state.profile; const out = { tonality: {}, benchmarks: [] };
  const motivIntros = {
    charge: "Vous avez démarré ce check-up pour identifier ce qui pèse le plus dans votre semaine. Voici ce qui ressort.",
    evenement: "Vous avez démarré ce check-up pour préparer un événement à venir dans votre cabinet. Voici ce que ce diagnostic met en lumière.",
    risque: "Vous avez démarré ce check-up pour sécuriser un risque identifié. Voici les points sur lesquels concentrer votre attention.",
    curiosite: "Voici la lecture que ce check-up produit de votre cabinet.",
  };
  out.tonality.motivation_intro = motivIntros[p.motivation] || motivIntros.curiosite;
  if (p.status === 'recent') out.tonality.status_msg = "C'est courant à ce stade d'installation — la plupart des cabinets prennent 2 à 3 ans à construire leurs routines.";
  else if (p.status === 'senior' || p.status === 'approche_transmission') out.tonality.status_msg = "À votre stade, les chantiers utiles sont souvent ceux qui rendent le cabinet transmissible — pas ceux qui le complexifient.";
  if (p.cabinet_type === 'solo' && scores.B && scores.B.pct <= 34) out.benchmarks.push({ id: 'R-bench-solo-charge', message: "À votre profil, sans équipe formalisée, vous portez seul l'équivalent d'1,5 ETP d'organisation." });
  if (p.volume === 'gt_120' && scores.C && scores.C.pct <= 54) out.benchmarks.push({ id: 'R-bench-volume-admin', message: "À votre volume hebdomadaire, la moyenne du temps administratif est de 2 h 45 par jour — vous êtes probablement au-dessus." });
  if (p.status === 'approche_transmission' && scores.B && scores.B.pct <= 54) out.benchmarks.push({ id: 'R-bench-transmission', message: "Un cabinet bien organisé se valorise 30 à 40 % mieux à la transmission." });
  if (p.cabinet_type === 'solo' && p.paramedical_team === 'non' && scores.A && scores.A.pct >= 55 && scores.B && scores.B.pct <= 34) out.benchmarks.push({ id: 'R-bench-soloHero', message: "Vous tenez votre cabinet à bout de bras, et vous le tenez bien. La question : pour combien de temps encore, sans relai ?" });
  return out;
}

function polar(angleDeg, r, cx, cy) {
  const rad = (angleDeg * Math.PI) / 180;
  return { x: cx + r * Math.cos(rad), y: cy - r * Math.sin(rad) };
}
function ringPath(level, R, cx, cy) {
  const angles = { A: 0, C: 120, B: 240 };
  return 'M ' + ['A','C','B'].map(a => { const p = polar(angles[a], R * level, cx, cy); return `${p.x.toFixed(2)},${p.y.toFixed(2)}`; }).join(' L ') + ' Z';
}
function polyPath(scores, R, cx, cy) {
  const angles = { A: 0, C: 120, B: 240 };
  return 'M ' + ['A','C','B'].map(a => {
    const pct = scores[a] ? scores[a].pct / 100 : 0.04;
    const p = polar(angles[a], R * pct, cx, cy);
    return `${p.x.toFixed(2)},${p.y.toFixed(2)}`;
  }).join(' L ') + ' Z';
}

            <div class="facet-meta">
              <span class="facet-axe">${b.axe_label}</span>
              ${showBadge ? `<span class="facet-badge ${badgeClass}">${b.label}</span>` : ''}
            </div>
            <h3 class="serif facet-title">${escapeHtml(b.title)}</h3>
            ${showBadge ? '' : `<div class="facet-level-soft">${b.label}</div>`}
          </div>
        </div>
      </div>
    `;
  }).join('');
  const benchCombiCards = rules.benchmarks.length > 0 ? rules.benchmarks.map(b => `
    <div class="bench-combi-box">
      <p style="margin: 0; font-size: 14px; line-height: 1.55; color: var(--bench-text);">${escapeHtml(b.message)}</p>
    </div>
  `).join('') : '';
  const opportunityCards = top4.map((m, idx) => `
    <a class="chantier-card ${idx === 0 ? 'reco' : ''}" onclick="openModule('${m.id}')">
      <div class="chantier-row">
        <span class="serif chantier-num">${String(idx + 1).padStart(2, '0')}</span>
        <div style="flex: 1;">
          ${idx === 0 ? `<div class="chantier-reco-tag">Recommandé pour vous</div>` : ''}
          <h3 class="serif chantier-title">${m.icone} ${escapeHtml(m.label)}</h3>
          <div class="chantier-meta">
            ${effortPipsHtml(m.effort)}
            <span>·</span><span>${impactLabel(m.impact)}</span>
            <span>·</span><span>${m.etapes.length} étapes</span>
          </div>
          <div class="chantier-cta">Voir le détail →</div>
        </div>
      </div>
    </a>
  `).join('');
  const allModulesGrid = MODULES_DATA.modules.map(m => `
    <a class="module-tile" onclick="openModule('${m.id}')">
      <div class="module-tile-title">${m.icone} ${escapeHtml(m.label)}</div>
      <div class="module-tile-meta">${effortPipsHtml(m.effort)}<span>· ${m.etapes.length} étapes</span></div>
    </a>
  `).join('');
  let secCounter = 1;
  return `
    <main class="resultats">
      <div class="res-eyebrow">Résultats — diagnostic V2</div>
      <h1 class="serif res-h1">Votre cabinet, vu du diagnostic</h1>
      <p class="serif res-intro">« ${escapeHtml(rules.tonality.motivation_intro)} »</p>
      <div class="radar-result">${radarSvg}</div>
      ${signal ? `
        <div class="signal-banner ${signalToneClass(signal.tonalite)}">
          <div class="signal-eyebrow">Signal croisé</div>
          <h3 class="serif signal-title">${escapeHtml(signal.titre)}</h3>
          <p class="signal-msg">${escapeHtml(signal.message)}</p>
        </div>
      ` : ''}
      ${rules.tonality.status_msg ? `<p class="tonalite-aside">${escapeHtml(rules.tonality.status_msg)}</p>` : ''}
      <section>
        <div class="section-title"><span class="serif section-number">I</span><h2 class="serif">Les trois axes</h2></div>
        <div style="margin-top: 24px;">${facetCards}</div>
      </section>
      ${rules.benchmarks.length > 0 ? `
        <section>
          <div class="section-title"><span class="serif section-number">II</span><h2 class="serif">Repères terrain personnalisés</h2></div>
          <div style="margin-top: 24px;">${benchCombiCards}</div>
        </section>
      ` : ''}
      <section>
        <div class="section-title"><span class="serif section-number">${rules.benchmarks.length > 0 ? 'III' : 'II'}</span><h2 class="serif">Opportunités d'action</h2></div>
        <p class="section-intro">Sélection ordonnée selon votre profil et votre niveau d'énergie. La première carte est la plus alignée avec ce que vous avez déclaré.</p>
        <div style="margin-top: 24px;">${opportunityCards}</div>
      </section>
      <section>
        <div class="section-title"><span class="serif section-number">${rules.benchmarks.length > 0 ? 'IV' : 'III'}</span><h2 class="serif">Tous les chantiers</h2></div>
        <div class="modules-grid" style="margin-top: 24px;">${allModulesGrid}</div>
      </section>
    </main>
  `;
}

function renderModuleDetail() {
  const m = MODULES_DATA.modules.find(x => x.id === state.moduleId);
  if (!m) return `<main class="module-detail"><p>Module introuvable.</p></main>`;
  const etapes = m.etapes.map(e => `
    <article class="module-etape">
      <span class="serif module-etape-num">${e.num}</span>
      <div style="flex: 1;">
        <h2 class="serif module-etape-title">${escapeHtml(e.titre)}</h2>
        <span class="tag-temp ${e.tag}">${tagLabel(e.tag)}</span>
        <p class="module-etape-body">${escapeHtml(e.body)}</p>
      </div>
    </article>
  `).join('');
  return `
    <main class="module-detail">
      <button class="module-back" onclick="setStep('resultats')">← Retour aux résultats</button>
      <div class="module-eyebrow">Module d'approfondissement</div>
      <h1 class="serif module-h1">${m.icone} ${escapeHtml(m.label)}</h1>
      <div class="module-meta">
        <span>${effortPipsHtml(m.effort)} ${effortLabel(m.effort)}</span>
        <span style="color: var(--border);">·</span>
        <span>${impactLabel(m.impact)}</span>
        <span style="color: var(--border);">·</span>
        <span>${m.etapes.length} étapes</span>
      </div>
      <section class="module-etapes">${etapes}</section>
      <div style="background: var(--bench-bg); border-left: 3px solid var(--bench-border); border-radius: 4px; padding: 20px 24px;">
        <div class="b-eyebrow">Repère terrain</div>
        <p class="b-text" style="margin: 0; font-size: 14px; line-height: 1.6;">${escapeHtml(m.benchmark_conclusion.texte)}</p>
        ${m.benchmark_conclusion.source_status === 'to_confirm' ? `<div class="b-source" style="margin-top: 12px;">[À confirmer${m.benchmark_conclusion.source_hint ? ' — source : ' + escapeHtml(m.benchmark_conclusion.source_hint) : ''}]</div>` : ''}
      </div>
      <p class="module-share">Vous pouvez partager ce module avec un membre de votre équipe ou l'un de vos associés — l'adresse <code>/modules/${m.id}</code> est publique et ne nécessite pas de connexion.</p>
    </main>
  `;
}

function render() {
  const app = document.getElementById('app');
  let html = '';
  switch (state.step) {
    case 'intro': html = renderIntro(); break;
    case 'profil_step1': html = renderProfilStep1(); break;
    case 'profil_step2': html = renderProfilStep2(); break;
    case 'energy': html = renderEnergy(); break;
    case 'bloc_A': html = renderBloc('A'); break;
    case 'bloc_B': html = renderBloc('B'); break;
    case 'bloc_C': html = renderBloc('C'); break;
    case 'transition_A': html = renderTransition('A'); break;
    case 'transition_B': html = renderTransition('B'); break;
    case 'transition_C': html = renderTransition('C'); break;
    case 'resultats': html = renderResultats(); break;
    case 'module_detail': html = renderModuleDetail(); break;
    default: html = renderIntro();
  }
  app.innerHTML = html;
}

render();
</script>
</body>
</html>

document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<meta name="apple-mobile-web-app-capable" content="yes"><meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"><meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover"><script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

c\") format('woff2');\n  unicode-range: U+0301, U+0400-045F, U+0490-0491, U+04B0-04B1, U+2116;\n}\n/* latin-ext */\n@font-face {\n  font-family: 'Onest';\n  font-style: normal;\n  font-weight: 600;\n  font-display: swap;\n  src: url(\"90787dca-2e49-42eb-b033-f56706941806\") format('woff2');\n  unicode-range: U+0100-02BA, U+02BD-02C5, U+02C7-02CC, U+02CE-02D7, U+02DD-02FF, U+0304, U+0308, U+0329, U+1D00-1DBF, U+1E00-1E9F, U+1EF2-1EFF, U+2020, U+20A0-20AB, U+20AD-20C0, U+2113, U+2C60-2C7F, U+A720-A7FF;\n}\n/* latin */\n@font-face {\n  font-family: 'Onest';\n  font-style: normal;\n  font-weight: 600;\n  font-display: swap;\n  src: url(\"a59fcefe-e4b5-469f-a9b6-5a60e81132c9\") format('woff2');\n  unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n<\u002Fstyle>\n<style>/* =====================================================================\n   LUGIA — Mobile v3 · le compagnon embarqué\n   Argent sur nuit ; la couleur n'apparaît que si une information doit\n   être vue. Trois écrans, des gestes courts — les moyens du terrain.\n   ===================================================================== */\n:root{\n  --navy:#0B1022; --line:rgba(205,214,234,0.14); --line-soft:rgba(205,214,234,0.08);\n  --on:#E8EAF2; --on-6:#9AA3BC; --on-4:#6A7390; --argent:#CDD6EA;\n  --optimal:#5BC8A0; --vigilance:#E0B45C; --risque:#E07A5F;\n  --mono:'IBM Plex Mono', monospace; --serif:'Lora', serif;\n}\n*{ box-sizing:border-box; margin:0; -webkit-tap-highlight-color:transparent; }\nhtml,body{ height:100%; }\nbody{\n  background:radial-gradient(ellipse 90% 55% at 50% -10%, #141B38, var(--navy) 62%);\n  color:var(--on); font-family:'Onest', sans-serif; font-weight:300;\n  font-size:15px; line-height:1.6;\n  display:flex; align-items:center; justify-content:center;\n  padding:24px; -webkit-font-smoothing:antialiased;\n  user-select:none;\n}\n\n/* ============ téléphone ============ */\n.phone{\n  width:min(390px, 100vw - 32px); height:min(844px, 100vh - 40px);\n  border-radius:48px; padding:10px;\n  background:linear-gradient(160deg, #1c2340, #0c1124);\n  box-shadow:0 40px 90px rgba(0,0,0,0.5), inset 0 0 0 1px rgba(205,214,234,0.08);\n  flex:none;\n}\n.screen{\n  position:relative; width:100%; height:100%;\n  border-radius:39px; overflow:hidden;\n  background:radial-gradient(ellipse 100% 45% at 50% -5%, #161d3a, #0a1020 60%);\n  display:flex; flex-direction:column;\n}\n.notch{ position:absolute; top:12px; left:50%; transform:translateX(-50%); width:96px; height:26px; border-radius:16px; background:#05080f; z-index:50; }\n.sb{ display:flex; justify-content:space-between; align-items:center; padding:16px 28px 0; font-family:var(--mono); font-size:12px; color:var(--on); z-index:40; flex:none; }\n.sb-sync{ display:flex; align-items:center; gap:7px; font-size:9px; letter-spacing:0.12em; text-transform:uppercase; color:var(--on-4); cursor:pointer; }\n.sb-sync i{\n  width:7px; height:7px; border-radius:50%; background:var(--optimal); flex:none;\n  box-shadow:0 0 8px rgba(91,200,160,0.6);\n  transition:transform .2s ease;\n}\n.sb-sync.pulse i{ animation:syncpulse .9s ease; }\n@keyframes syncpulse{ 0%{ transform:scale(1); } 35%{ transform:scale(1.8); } 100%{ transform:scale(1); } }\n\n/* ============ vue ============ */\n#view{ flex:1; display:flex; flex-direction:column; overflow:hidden; position:relative; }\n.scr{ flex:1; display:flex; flex-direction:column; overflow:hidden; padding:24px 22px 12px; animation:scrin .32s ease; }\n@keyframes scrin{ from{ opacity:0; transform:translateY(10px); } to{ opacity:1; transform:none; } }\n.scr.scroll{ overflow-y:auto; }\n.scr.scroll::-webkit-scrollbar{ width:0; }\n\n.k{ font-family:var(--mono); font-size:10px; letter-spacing:0.16em; text-transform:uppercase; color:var(--on-6); flex:none; }\n.sk{ font-family:var(--mono); font-size:9px; letter-spacing:0.14em; text-transform:uppercase; color:var(--on-4); margin:20px 0 10px; flex:none; }\n.sk:first-of-type{ margin-top:16px; }\n\n/* la voix de Lugia */\n.voice{ display:flex; gap:11px; align-items:flex-start; margin-top:14px; }\n.vorb{ width:34px; height:34px; flex:none; position:relative; margin-top:2px; }\n.vorb svg{ position:absolute; inset:10%; filter:drop-shadow(0 0 8px rgba(244,239,229,0.45)); }\n.vtxt{\n  font-family:var(--serif); font-size:16px; line-height:1.5; color:var(--argent);\n  border:1px solid var(--line); border-radius:16px 16px 16px 4px;\n  background:rgba(205,214,234,0.04);\n  padding:12px 15px;\n}\n.vtxt b{ font-weight:500; color:var(--on); }\n\n/* points-signaux */\n.adot{ display:inline-block; width:7px; height:7px; border-radius:50%; flex:none; }\n.adot.r{ background:var(--risque); }\n.adot.v{ background:var(--vigilance); }\n.adot.o{ background:var(--optimal); }\n\n/* boutons */\n.btn{\n  text-align:center; border:1px solid var(--line); border-radius:12px;\n  padding:12px 14px; font-size:13.5px; color:var(--on); cursor:pointer;\n  background:none; -webkit-appearance:none; appearance:none; font-family:'Onest', sans-serif; font-weight:400;\n  transition:background .15s ease, transform .1s ease;\n}\n.btn:active{ transform:scale(0.97); }\n.btn.p{ background:var(--argent); color:#0c1124; font-weight:500; border-color:var(--argent); }\n.btn.ghost{ border:none; color:var(--on-6); padding:12px 8px; }\n.btn-row{ display:flex; gap:8px; }\n.btn-row .btn{ flex:1; }\n.btn-row .btn.ghost{ flex:0 0 auto; }\n\n/* ============ cartes de tâches ============ */\n.tc{\n  border:1px solid var(--line); border-radius:15px; padding:14px 15px;\n  margin-bottom:10px; flex:none;\n  transition:border-color .25s ease, opacity .25s ease;\n}\n.tc-top{ display:flex; align-items:baseline; gap:9px; }\n.tc-top .adot{ transform:translateY(-1px); }\n.tc-top b{ font-size:14.5px; font-weight:500; line-height:1.35; }\n.tc-meta{ font-family:var(--mono); font-size:8.5px; letter-spacing:0.05em; color:var(--on-4); margin-top:6px; }\n.tc-p{ font-size:12.5px; color:var(--on-6); line-height:1.5; margin-top:6px; }\n.tc-acts{ display:flex; gap:8px; margin-top:12px; }\n.tc-acts .btn{ flex:1; padding:10px 8px; font-size:12.5px; }\n.tc-acts .btn.ghost{ flex:0 0 auto; font-size:12px; }\n.tc.done, .tc.moved{ opacity:0.78; }\n.tc-state{\n  display:flex; align-items:center; gap:8px; margin-top:11px;\n  font-size:12px; color:var(--on-6);\n}\n.tc-state .st-ic{\n  width:20px; height:20px; border-radius:50%; flex:none;\n  display:flex; align-items:center; justify-content:center;\n  border:1px solid var(--line);\n}\n.tc-state .st-ic svg{ width:11px; height:11px; }\n.tc-state.ok .st-ic{ border-color:rgba(91,200,160,0.5); color:var(--optimal); }\n.tc-state.ok{ color:var(--optimal); }\n.tc-state.lug .st-ic{ border-color:rgba(205,214,234,0.4); color:var(--argent); }\n\n/* étapes d'une délégation */\n.steps{ display:flex; flex-direction:column; gap:7px; margin-top:11px; }\n.step{ display:flex; align-items:center; gap:9px; font-size:12px; color:var(--on-6); }\n.step i{\n  width:14px; height:14px; border-radius:50%; flex:none;\n  border:1px solid var(--line); position:relative;\n}\n.step.ok{ color:var(--on); }\n.step.ok i{ border-color:var(--optimal); background:rgba(91,200,160,0.15); }\n.step.ok i::after{\n  content:''; position:absolute; inset:4px; border-radius:50%; background:var(--optimal);\n}\n.step small{ margin-left:auto; font-family:var(--mono); font-size:8.5px; color:var(--on-4); white-space:nowrap; padding-left:10px; }\n\n/* carte calme (tout est rangé) */\n.calm{\n  border:1px solid rgba(91,200,160,0.25); border-radius:15px;\n  background:rgba(91,200,160,0.05);\n  padding:16px; margin-bottom:10px; flex:none;\n  font-size:13px; color:var(--on-6); line-height:1.55;\n}\n.calm b{ color:var(--optimal); font-weight:500; }\n\n/* bandeau demain */\n.morrow{\n  border:1px solid rgba(205,214,234,0.3); border-radius:15px;\n  background:linear-gradient(160deg, rgba(205,214,234,0.07), rgba(205,214,234,0.02));\n  padding:15px; margin:14px 0 4px; flex:none;\n}\n.morrow .mk{ font-family:var(--mono); font-size:8.5px; letter-spacing:0.14em; text-transform:uppercase; color:var(--argent); margin-bottom:8px; }\n.morrow .mit{ display:flex; gap:9px; align-items:baseline; padding:5px 0; font-size:13px; }\n.morrow .mit .n{\n  font-family:var(--mono); font-size:8.5px; color:var(--on-6);\n  border:1px solid var(--line); border-radius:5px; width:17px; height:17px; flex:none;\n  display:flex; align-items:center; justify-content:center;\n}\n.morrow .btn{ width:100%; margin-top:10px; }\n\n/* ============ capturer ============ */\n.qcard{\n  border:1px solid rgba(224,180,92,0.35); border-radius:15px; padding:14px 15px;\n  margin-bottom:12px; flex:none;\n}\n.qcard .qk{ font-family:var(--mono); font-size:8.5px; letter-spacing:0.12em; text-transform:uppercase; color:var(--vigilance); margin-bottom:7px; }\n.qcard .qt{ font-size:14px; line-height:1.5; }\n.qcard .qt b{ font-weight:500; }\n.qopts{ display:flex; flex-direction:column; gap:7px; margin-top:12px; }\n.qopt{\n  border:1px solid var(--line); border-radius:10px; padding:11px 13px;\n  font-size:13px; display:flex; align-items:center; gap:10px; cursor:pointer;\n  background:none; color:var(--on); font-family:'Onest', sans-serif; text-align:left;\n  transition:border-color .15s ease;\n}\n.qopt:active{ transform:scale(0.98); }\n.qopt .tk{ width:14px; height:14px; border-radius:50%; border:1px solid var(--on-4); flex:none; }\n\n.meet{\n  border:1px solid var(--line); border-radius:15px; padding:14px 15px;\n  margin-bottom:12px; flex:none;\n}\n.meet .qk{ font-family:var(--mono); font-size:8.5px; letter-spacing:0.12em; text-transform:uppercase; color:var(--argent); margin-bottom:7px; }\n.meet .qt{ font-size:13.5px; line-height:1.5; color:var(--on-6); }\n.meet .qt b{ font-weight:500; color:var(--on); }\n.meet .src{ font-family:var(--mono); font-size:8.5px; color:var(--on-4); margin-top:8px; }\n.meet .btn-row{ margin-top:12px; }\n\n.modes{ display:flex; flex-direction:column; gap:9px; }\n.mode{\n  display:flex; align-items:center; gap:14px;\n  border:1px solid var(--line); border-radius:15px; padding:15px;\n  cursor:pointer; background:none; color:var(--on); font-family:'Onest', sans-serif; text-align:left;\n  transition:background .15s ease;\n}\n.mode:active{ transform:scale(0.98); }\n.mode .mi{\n  width:42px; height:42px; border-radius:13px; flex:none;\n  border:1px solid var(--line); display:flex; align-items:center; justify-content:center;\n  color:var(--argent);\n}\n.mode .mi svg{ width:19px; height:19px; }\n.mode b{ display:block; font-size:14.5px; font-weight:500; }\n.mode small{ display:block; font-size:12px; color:var(--on-6); font-weight:300; margin-top:1px; }\n\n.sent{ margin-top:4px; }\n.sent-it{ display:flex; align-items:center; gap:10px; padding:8px 2px; border-top:1px solid var(--line-soft); font-size:12.5px; color:var(--on-6); }\n.sent-it:first-child{ border-top:none; }\n.sent-it .si{ width:24px; height:24px; border-radius:8px; border:1px solid var(--line); flex:none; display:flex; align-items:center; justify-content:center; color:var(--on-6); }\n.sent-it .si svg{ width:12px; height:12px; }\n.sent-it small{ margin-left:auto; font-family:var(--mono); font-size:8.5px; color:var(--on-4); flex:none; }\n\n/* ============ sac ============ */\n.bag-it{\n  display:flex; gap:11px; align-items:flex-start;\n  border:1px solid var(--line); border-radius:13px; padding:12px 13px; margin-bottom:8px; flex:none;\n}\n.bag-it .si{\n  width:32px; height:32px; border-radius:10px; flex:none;\n  border:1px solid var(--line); display:flex; align-items:center; justify-content:center; color:var(--on-6);\n}\n.bag-it .si svg{ width:15px; height:15px; }\n.bag-it .si.o{ border-color:rgba(91,200,160,0.4); color:var(--optimal); }\n.bag-it .si.r{ border-color:rgba(224,122,95,0.4); color:var(--risque); }\n.bag-body{ min-width:0; flex:1; }\n.bag-body b{ font-size:13px; font-weight:500; line-height:1.35; display:block; }\n.b ateY(8px); }\n.onb-bubble.top.show{ transform:translateX(-50%); }\n.onb-bubble.top .onb-tail{ display:none; }\n\n.onb-head{ display:flex; align-items:center; gap:10px; margin-bottom:10px; }\n.onb-orb{ width:30px; height:30px; flex:none; position:relative; }\n.onb-orb svg{ position:absolute; inset:8%; filter:drop-shadow(0 0 8px rgba(244,239,229,0.5)); }\n.onb-orb svg path{ fill:#F4EFE5; }\n.onb-orb::after{\n  content:''; position:absolute; inset:-5px; border-radius:50%;\n  background:radial-gradient(circle, rgba(205,214,234,0.22), transparent 68%);\n  animation:onborb 4s ease-in-out infinite;\n}\n@keyframes onborb{ 0%,100%{ opacity:.5; transform:scale(1); } 50%{ opacity:1; transform:scale(1.12); } }\n.onb-k{ font-family:var(--mono); font-size:8.5px; letter-spacing:0.16em; text-transform:uppercase; color:var(--argent); }\n.onb-step{ margin-left:auto; font-family:var(--mono); font-size:8px; letter-spacing:0.1em; color:var(--on-4); flex:none; }\n\n.onb-msg{ font-family:var(--serif); font-size:15px; line-height:1.55; color:var(--argent); }\n.onb-msg b{ font-weight:500; color:var(--on); font-style:normal; }\n.onb-msg em{ color:var(--on); font-style:italic; }\n.onb-sub{ font-size:12px; line-height:1.5; color:var(--on-6); margin-top:9px; font-family:'Onest',sans-serif; font-weight:300; }\n.onb-sub b{ color:var(--on); font-weight:500; }\n\n.onb-cta-row{ display:flex; gap:8px; margin-top:14px; }\n.onb-cta{\n  flex:1; text-align:center; border-radius:12px; padding:11px 14px; cursor:pointer;\n  font-family:'Onest',sans-serif; font-weight:500; font-size:13.5px;\n  background:var(--argent); color:#0c1124; border:1px solid var(--argent);\n  transition:transform .1s ease, filter .15s ease;\n}\n.onb-cta:active{ transform:scale(0.97); }\n.onb-cta.ghost{ background:none; color:var(--on-6); border:1px solid var(--line); font-weight:400; flex:0 0 auto; }\n.onb-cta.ghost:hover{ color:var(--on); }\n\n/* la queue de la bulle (pointe vers la cible) */\n.onb-tail{ position:absolute; width:13px; height:13px; transform:rotate(45deg);\n  background:rgba(15,21,42,0.97); border:1px solid var(--line); }\n.onb-bubble.tail-down .onb-tail{ bottom:-7px; border-top:none; border-left:none; }\n.onb-bubble.tail-up   .onb-tail{ top:-7px;   border-bottom:none; border-right:none; }\n\n/* progression des gestes (constellation) ------------------------------ */\n.onb-prog{ display:flex; align-items:center; gap:6px; margin-top:13px; padding-top:12px; border-top:1px solid var(--line-soft); }\n.onb-pip{ width:7px; height:7px; border-radius:50%; border:1px solid var(--on-4); flex:none; transition:all .3s ease; }\n.onb-pip.done{ background:var(--argent); border-color:var(--argent); box-shadow:0 0 8px rgba(205,214,234,0.55); }\n.onb-pip.cur{ border-color:var(--argent); }\n.onb-prog small{ margin-left:auto; font-family:var(--mono); font-size:8px; letter-spacing:0.08em; color:var(--on-4); }\n\n/* la récompense -------------------------------------------------------- */\n.onb-reward{\n  position:absolute; inset:0; z-index:90; display:flex; flex-direction:column;\n  align-items:center; justify-content:center; gap:16px; text-align:center;\n  background:radial-gradient(ellipse 80% 50% at 50% 42%, rgba(11,16,34,0.86), rgba(6,9,18,0.94));\n  backdrop-filter:blur(6px); -webkit-backdrop-filter:blur(6px);\n  opacity:1; pointer-events:none; transition:opacity .3s ease;\n}\n.onb-reward.show{ opacity:1; }\n.onb-seal{ position:relative; width:108px; height:108px; }\n.onb-seal svg.ring{ position:absolute; inset:0; width:100%; height:100%; transform:rotate(-90deg); }\n.onb-seal .ring circle{ fill:none; stroke-width:2; }\n.onb-seal .ring .bg{ stroke:rgba(205,214,234,0.12); }\n.onb-seal .ring .fg{ stroke:var(--argent); stroke-linecap:round;\n  stroke-dasharray:301; stroke-dashoffset:301; filter:drop-shadow(0 0 6px rgba(205,214,234,0.5)); }\n.onb-reward.show .ring .fg{ animation:onbdraw 1s cubic-bezier(.3,.7,.2,1) forwards; }\n@keyframes onbdraw{ to{ stroke-dashoffset:0; } }\n.onb-seal .glyph{ position:absolute; inset:30px; }\n.onb-seal .glyph svg{ width:100%; height:100%; filter:drop-shadow(0 0 10px rgba(244,239,229,0.55)); }\n.onb-seal .glyph svg path{ fill:#F4EFE5; }\n.onb-seal.spark::before, .onb-seal.spark::after{\n  content:'✦'; position:absolute; color:var(--argent); font-size:13px; opacity:0;\n  animation:onbspark 1.1s ease forwards;\n}\n.onb-seal.spark::before{ top:6px; right:10px; animation-delay:.5s; }\n.onb-seal.spark::after{ bottom:12px; left:6px; font-size:9px; animation-delay:.72s; }\n@keyframes onbspark{ 0%{ opacity:0; transform:scale(.3); } 40%{ opacity:1; transform:scale(1.1); } 100%{ opacity:.85; transform:scale(1); } }\n\n.onb-rk{ font-family:var(--mono); font-size:9px; letter-spacing:0.22em; text-transform:uppercase; color:var(--argent); }\n.onb-rt{ font-family:var(--serif); font-size:21px; color:var(--on); margin-top:-4px; }\n.onb-rs{ font-size:12.5px; color:var(--on-6); max-width:250px; line-height:1.5; padding:0 24px; }\n.onb-rprog{ display:flex; gap:7px; margin-top:4px; }\n.onb-rprog .onb-pip{ width:8px; height:8px; }\n\n/* glisser-déposer ------------------------------------------------------ */\n.onb-chip{\n  position:absolute; z-index:78; display:flex; align-items:center; gap:9px;\n  border:1px solid var(--argent); border-radius:13px; padding:11px 13px;\n  background:linear-gradient(160deg, rgba(28,35,64,0.98), rgba(14,18,38,0.98));\n  box-shadow:0 14px 30px rgba(0,0,0,0.5), 0 0 22px rgba(205,214,234,0.18);\n  cursor:grab; touch-action:none; max-width:230px;\n  transition:box-shadow .2s ease;\n}\n.onb-chip.grab{ cursor:grabbing; box-shadow:0 20px 44px rgba(0,0,0,0.6), 0 0 30px rgba(205,214,234,0.35); }\n.onb-chip .ci{ width:30px; height:30px; border-radius:9px; flex:none; border:1px solid var(--line);\n  display:flex; align-items:center; justify-content:center; color:var(--argent); }\n.onb-chip .ci svg{ width:15px; height:15px; }\n.onb-chip .cb{ min-width:0; }\n.onb-chip .cb b{ display:block; font-size:12.5px; font-weight:500; line-height:1.3; }\n.onb-chip .cb small{ display:block; font-family:var(--mono); font-size:8px; letter-spacing:0.06em; color:var(--on-4); margin-top:2px; }\n\n.onb-drop{\n  position:absolute; z-index:72; border-radius:16px; pointer-events:none;\n  border:1.5px dashed rgba(205,214,234,0.45);\n  box-shadow:0 0 0 5px rgba(205,214,234,0.06);\n  transition:all .25s ease;\n}\n.onb-drop.hot{ border-color:var(--argent); border-style:solid;\n  box-shadow:0 0 0 6px rgba(205,214,234,0.16), 0 0 28px 4px rgba(205,214,234,0.3); }\n\n/* la main qui montre le geste */\n.onb-hand{ position:absolute; z-index:79; width:30px; height:30px; pointer-events:none; opacity:0;\n  filter:drop-shadow(0 4px 8px rgba(0,0,0,0.5)); }\n.onb-hand svg{ width:100%; height:100%; }\n@keyframes onbhand{ 0%,100%{ transform:scale(1); } 50%{ transform:scale(0.82); } }\n.onb-hand.tap{ animation:onbhand 1s ease-in-out infinite; }\n\n/* l'assistant — cible de glisser (geste « demander à Lugia ») */\n.onb-assistant{\n  position:absolute; right:16px; bottom:96px; z-index:74;\n  width:58px; height:58px; border-radius:50%;\n  display:flex; align-items:center; justify-content:center;\n  background:radial-gradient(circle at 38% 32%, rgba(28,35,64,0.95), rgba(11,16,34,0.95));\n  border:1px solid rgba(205,214,234,0.35);\n  box-shadow:0 10px 28px rgba(0,0,0,0.5), 0 0 24px rgba(205,214,234,0.18);\n}\n.onb-assistant svg{ width:30px; height:30px; }\n.onb-assistant svg path{ fill:#F4EFE5; filter:drop-shadow(0 0 6px rgba(244,239,229,0.45)); }\n.onb-assistant .alab{ position:absolute; bottom:-17px; left:50%; transform:translateX(-50%);\n  font-family:var(--mono); font-size:7.5px; letter-spacing:0.14em; text-transform:uppercase; color:var(--on-4); white-space:nowrap; }\n.onb-assistant.hot{ border-color:var(--argent);\n  box-shadow:0 12px 32px rgba(0,0,0,0.55), 0 0 32px 6px rgba(205,214,234,0.4); }\n\n/* ============ feuilles guidées (analyse IA, rattachement) ============ */\n.onb-lugia-line{ display:flex; gap:10px; align-items:flex-start; margin:2px 0 14px; }\n.onb-lugia-line .ll-orb{ width:26px; height:26px; flex:none; position:relative; margin-top:1px; }\n.onb-lugia-line .ll-orb svg{ position:absolute; inset:6%; filter:drop-shadow(0 0 7px rgba(244,239,229,0.45)); }\n.onb-lugia-line .ll-orb svg path{ fill:#F4EFE5; }\n.onb-lugia-line .ll-txt{ font-family:var(--serif); font-size:13.5px; line-height:1.5; color:var(--argent); }\n.onb-lugia-line .ll-txt b{ font-weight:500; color:var(--on); font-style:normal; }\n\n/* analyse en cours — balayage du cliché */\n.onb-shot{ position:relative; height:172px; border-radius:16px; overflow:hidden; border:1px solid var(--line);\n  background:repeating-linear-gradient(38deg, rgba(205,214,234,0.06) 0 11px, rgba(205,214,234,0.02) 11px 22px);\n  display:flex; align-items:center; justify-content:center;\n  font-family:var(--mono); font-size:9px; letter-spacing:0.12em; text-transform:uppercase; color:var(--on-4); }\n.onb-shot .scan{ position:absolute; left:0; right:0; height:34%;\n  background:linear-gradient(180deg, transparent, rgba(205,214,234,0.22), transparent);\n  box-shadow:0 0 18px rgba(205,214,234,0.3); top:-34%; }\n.onb-shot.run .scan{ animation:onbscan 1.5s ease-in-out infinite; }\n@keyframes onbscan{ 0%{ top:-34%; } 100%{ top:100%; } }\n.onb-shot .grid{ position:absolute; inset:0; opacity:0; transition:opacity .4s ease;\n  background-image:linear-gradient(rgba(205,214,234,0.12) 1px, transparent 1px), linear-gradient(90deg, rgba(205,214,234,0.12) 1px, transparent 1px);\n  background-size:26px 26px; }\n.onb-shot.run .grid{ opacity:1; }\n.onb-shot .tag{ position:absolute; padding:3px 7px; border-radius:6px; font-family:var(--mono); font-size:8px;\n  letter-spacing:0.06em; background:rgba(11,16,34,0.85); border:1px solid var(--argent); color:var(--on);\n  opacity:0; transform:scale(.8); }\n.onb-shot.found .tag{ animation:onbtag .4s ease forwards; }\n.onb-shot .tag.t1{ top:38%; left:24%; animation-delay:.05s; }\n.onb-shot .tag.t2{ top:60%; left:52%; animation-delay:.2s; }\n@keyframes onbtag{ to{ opacity:1; transform:scale(1); } }\n.onb-analyse-bar{ display:flex; align-items:center; gap:9px; margin-top:13px; font-size:12px; color:var(--on-6); }\n.onb-analyse-bar .spin{ width:15px; height:15px; border-radius:50%; border:1.5px solid var(--line); border-top-color:var(--argent); animation:onbspin .8s linear infinite; flex:none; }\n@keyframes onbspin{ to{ transform:rotate(360deg); } }\n\n/* résumé IA */\n.onb-summary{ border:1px solid rgba(205,214,234,0.28); border-radius:14px; padding:13px 14px; margin-top:13px;\n  background:rgba(205,214,234,0.04); }\n.onb-summary .sk2{ font-family:var(--mono); font-size:8px; letter-spacing:0.14em; text-transform:uppercase; color:var(--argent); margin-bottom:7px; }\n.onb-summary p{ font-size:13px; line-height:1.55; color:var(--on); }\n.onb-summary .tags{ display:flex; flex-wrap:wrap; gap:6px; margin-top:10px; }\n.onb-summary .tg{ font-family:var(--mono); font-size:8.5px; letter-spacing:0.04em; color:var(--on-6);\n  border:1px solid var(--line); border-radius:99px; padding:4px 9px; }\n\n/* chooser de rattachement (proposé par l'IA) */\n.onb-ratt{ display:flex; flex-direction:column; gap:8px; margin-top:4px; max-height:236px; overflow-y:auto; padding:2px; }\n.onb-ratt::-webkit-scrollbar{ width:0; }\n.onb-opt{ display:flex; align-items:center; gap:11px; text-align:left;\n  border:1px solid var(--line); border-radius:12px; padding:11px 12px; cursor:pointer;\n  background:none; color:var(--on); font-family:'Onest',sans-serif; transition:border-color .15s ease, background .15s ease; }\n.onb-opt:active{ transform:scale(.99); }\n.onb-opt.on{ border-color:var(--argent); background:rgba(205,214,234,0.06); }\n.onb-opt .tk{ width:16px; height:16px; border-radius:50%; border:1px solid var(--on-4); flex:none; position:relative; }\n.onb-opt.on .tk{ border-color:var(--argent); background:var(--argent); }\n.onb-opt.on .tk::after{ content:''; position:absolute; inset:4px; border-radius:50%; background:#0c1124; }\n.onb-opt .ob{ min-width:0; flex:1; }\n.onb-opt .ob b{ display:block; font-size:13.5px; font-weight:500; line-height:1.3; }\n.onb-opt .ob small{ display:block; font-family:var(--mono); font-size:8px; letter-spacing:0.05em; color:var(--on-4); margin-top:3px; }\n.onb-opt .sugg{ flex:none; font-family:var(--mono); font-size:7.5px; letter-spacing:0.1em; text-transform:uppercase;\n  color:var(--argent); border:1px solid rgba(205,214,234,0.4); border-radius:99px; padding:3px 7px; }\n.onb-doc-note{ display:flex; gap:9px; align-items:flex-start; margin-top:12px; padding:11px 12px;\n  border:1px dashed var(--line); border-radius:12px; font-size:11.5px; color:var(--on-6); line-height:1.5; }\n.onb-doc-note .di{ width:16px; height:16px; flex:none; color:var(--on-4); margin-top:1px; }\n.onb-doc-note .di svg{ width:100%; height:100%; }\n.onb-doc-note b{ color:var(--on); font-weight:500; }\n\n/* exécution / délégation finale */\n.onb-exec{ display:flex; flex-direction:column; gap:9px; margin-top:6px; }\n.onb-exec .ex{ display:flex; align-items:center; gap:10px; font-size:12.5px; color:var(--on-6);\n  opacity:0.35; transition:opacity .3s ease, color .3s ease; }\n.onb-exec .ex.on{ opacity:1; color:var(--on); }\n.onb-exec .ex i{ width:15px; height:15px; border-radius:50%; border:1px solid var(--line); flex:none; position:relative; }\n.onb-exec .ex.on i{ border-color:var(--optimal); background:rgba(91,200,160,0.15); }\n.onb-exec .ex.on i::after{ content:''; position:absolute; inset:4px; border-radius:50%; background:var(--optimal); }\n\n/* alerte « aujourd'hui » dans le sac */\n.onb-flag{ display:inline-flex; align-items:center; gap:6px; font-family:var(--mono); font-size:8px;\n  letter-spacing:0.1em; text-transform:uppercase; color:var(--risque);\n  border:1px solid rgba(224,122,95,0.45); border-radius:99px; padding:3px 9px; margin-top:8px; }\n.onb-flag i{ width:5px; height:5px; border-radius:50%; background:var(--risque); flex:none; }\n\n/* masque la bébête flottante d'origine pendant le tour */\nbody.onb-on .bebete, body.onb-on .bebete-say{ display:none !important; }\n\n/* bouton rejouer / quitter le tour */\n.onb-skip{ position:absolute; top:54px; right:18px; z-index:81;\n  font-family:var(--mono); font-size:8px; letter-spacing:0.1em; text-transform:uppercase; color:var(--on-4);\n  border:1px solid var(--line); border-radius:99px; padding:5px 10px; cursor:pointer; background:rgba(11,16,34,0.6); }\n.onb-skip:hover{ color:var(--on); border-color:var(--line); }\n\n/* ============ mail d'une consœur · réponse auto-rédigée ============ */\n.onb-mail{ border:1px solid var(--line); border-radius:13px; padding:12px 13px; background:rgba(205,214,234,0.03); margin-bottom:11px; }\n.onb-mail .mfrom{ display:flex; align-items:center; gap:9px; font-family:var(--mono); font-size:9px; letter-spacing:0.06em; text-transform:uppercase; color:var(--on-6); }\n.onb-mail .mfrom .mav{ width:24px; height:24px; border-radius:50%; flex:none; display:flex; align-items:center; justify-content:center; font-size:9px; letter-spacing:0; color:var(--argent); border:1px solid var(--line); background:rgba(205,214,234,0.06); }\n.onb-mail .mfrom small{ margin-left:auto; color:var(--on-4); }\n.onb-mail p{ font-family:var(--serif); font-size:14px; line-height:1.5; color:var(--on); margin-top:9px; font-style:italic; }\n.onb-mail p b{ font-style:normal; font-weight:500; }\n.onb-draft{ border:1px solid rgba(205,214,234,0.28); border-radius:13px; padding:12px 13px; background:rgba(205,214,234,0.05); }\n.onb-draft .dk{ font-family:var(--mono); font-size:8px; letter-spacing:0.12em; text-transform:uppercase; color:var(--argent); margin-bottom:7px; display:flex; align-items:center; gap:6px; }\n.onb-draft p{ font-size:13px; line-height:1.55; color:var(--on); font-family:'Onest',sans-serif; font-weight:300; font-style:normal; }\n.onb-draft p b{ font-weight:500; }\n.onb-draft .dtags{ display:flex; flex-wrap:wrap; gap:6px; margin-top:10px; }\n.onb-draft .tg{ font-family:var(--mono); font-size:8px; letter-spacing:0.04em; color:var(--on-6); border:1px solid var(--line); border-radius:99px; padding:3px 8px; }\n<\u002Fstyle>\n<style>/* =====================================================================\n   LUGIA — Mobile · Essai libre · styles propres au mode interactif\n   (s'ajoute à onb.css — réutilise au maximum onb-summary, onb-ratt, etc.)\n   ===================================================================== */\n\n/* segmenté Note / Photo / Voix */\n.live-seg{ display:flex; gap:6px; margin-bottom:13px; }\n.live-seg button{\n  flex:1; display:flex; align-items:center; justify-content:center; gap:6px;\n  border:1px solid var(--line); border-radius:11px; padding:9px 6px; cursor:pointer;\n  background:none; color:var(--on-6); font-family:'Onest',sans-serif; font-weight:500; font-size:12.5px;\n  transition:border-color .15s ease, color .15s ease, background .15s ease;\n}\n.live-seg button svg{ width:15px; height:15px; }\n.live-seg button.on{ border-color:var(--argent); color:var(--on); background:rgba(205,214,234,0.06); }\n\n.live-input{\n  width:100%; border:1px solid var(--line); border-radius:12px; padding:13px 14px;\n  background:rgba(205,214,234,0.04); color:var(--on); font-family:'Onest',sans-serif; font-size:14px;\n}\n.live-input:focus{ outline:none; border-color:var(--argent); }\n.finder.mini{ height:120px; margin-bottom:11px; }\n\n.live-mic{ display:flex; flex-direction:column; align-items:center; gap:9px; padding:6px 0 12px; }\n\n/* exemples tappables */\n.live-ex{ display:flex; flex-wrap:wrap; gap:7px; margin-top:12px; align-items:center; }\n.live-ex > span{ width:100%; font-size:11px; color:var(--on-4); font-family:var(--mono); letter-spacing:0.04em; }\n.live-chip{\n  border:1px solid var(--line); border-radius:99px; padding:7px 12px; cursor:pointer;\n  background:none; color:var(--on-6); font-family:'Onest',sans-serif; font-size:12px;\n  transition:border-color .15s ease, color .15s ease;\n}\n.live-chip:hover{ color:var(--on); border-color:var(--argent); }\n\n/* badge mode IA */\n.live-mode{ font-family:var(--mono); font-size:7.5px; letter-spacing:0.1em; text-transform:uppercase;\n  border-radius:99px; padding:3px 7px; margin-left:8px; vertical-align:middle; white-space:nowrap; }\n.live-mode.on{ color:var(--optimal); border:1px solid rgba(91,200,160,0.4); }\n.live-mode.off{ color:var(--on-4); border:1px solid var(--line); }\n\n/* priorité — urgence / importance */\n.live-prio{ display:flex; align-items:center; gap:14px; flex-wrap:wrap; margin-top:13px;\n  border:1px solid var(--line); border-radius:13px; padding:12px 13px; background:rgba(205,214,234,0.03); }\n.live-prio .lp{ display:flex; align-items:center; gap:8px; }\n.live-prio .lp > span{ font-family:var(--mono); font-size:8.5px; letter-spacing:0.08em; text-transform:uppercase; color:var(--on-6); }\n.live-meter{ display:inline-flex; gap:3px; }\n.live-meter i{ width:7px; height:7px; border-radius:50%; border:1px solid var(--on-4); }\n.live-meter i.f{ background:var(--argent); border-color:var(--argent); box-shadow:0 0 6px rgba(205,214,234,0.5); }\n.live-prio .lp-badge{ margin-left:auto; font-family:'Onest',sans-serif; font-weight:600; font-size:11.5px; color:var(--on);\n  border:1px solid var(--argent); border-radius:99px; padding:5px 12px; background:rgba(205,214,234,0.06); white-space:nowrap; }\n\n/* la fiche capturée mise en avant dans la journée (atterrissage) */\n#view .tc._live, #view .tc:first-of-type{ /* pas de style agressif — le spotlight suffit */ }\n<\u002Fstyle>\n<\u002Fhead>\n<body>\n<script>\n/* état isolé : l'essai libre n'utilise jamais le même jumeau que le tutoriel\n   ou le bureau — il ne peut donc pas être contaminé par une autre page ouverte. */\nwindow.LUGIA_JUMEAU_KEY = 'lugia-jumeau-essai-v1';\n<\u002Fscript>\n<script>\n/* shim standalone : capter les écouteurs DOMContentLoaded si la page est déjà chargée */\n(function(){\n  if (document.readyState === 'loading') return;\n  var q = [], orig = document.addEvent
